body:
  text: 金壇居士王肯堂證義成唯識論者此論成立唯識故名成唯識論梵云毗若底識也麼怛喇多唯也悉底成也奢薩怛羅論也應云識唯成論而譯為成唯識論者彼方先所後能此方先能後所是以唐梵次序不同今順梵文先明唯識後明成字唯識二字之中又先明識識之名義約有幾何若約同門自相不可分別若約異門共相隨義似分名約性相有九義包內外具五名有九者一眼識二耳識三鼻識四舌識五身識六意識七末那識八阿賴耶識九淨識義具五者一識自相謂識自證分二識所變故一切境界從心現起三識相應故同時受想等心法四識分位故識上四相等五識實相故謂二空真如是識實性自上諸法皆不離識總名唯識故知若相若住若境若心乃至差別分位皆是唯識卷舒匪離總別同時猶雲霧之依空若波瀾之湧海又古德廣釋唯識義有十門明此唯識二字先離解次合解先且離解初唯後識初唯字者有三義一者揀持之義揀謂揀去揀去我法所執持謂持取持取依圓二性論云唯言為遣離識我法非無不離識心所無為等二者決定義決無離心之境定有內識之心謂小乘離心有境清辨撥無內心三者顯勝義謂心王勝心所等劣今但顯勝不彰於劣瞿波論師二十唯識云此說唯識但舉王勝理兼心所如言王來非無臣佐次解識字者即了別義謂八種心王是識自性等五位百法理之與事皆不離識不爾真如應非唯識攝餘歸識總立識名經云三界唯心次合釋唯識者唯謂揀去遮無外境境無非有識能了別詮有內心心有非無合名唯識唯謂遮無是用識表詮有是體攝用歸體唯即識持業釋也問此言唯遮外境不有為遮離心之境為遮不離心之境答設爾何失難二俱有過若遮離心之境是無餘有不離心相分在何以但言唯識不言唯境識若遮不離心境是無應但有能變三分闕所變相分過如何通釋答所言唯識者遮心外境無不遮內境不離識相分是無問內境與識既並非無如何但言唯識不言唯境識耶答以護法菩薩云境名通於內外謂有離心境不離心境恐濫外境但言唯識所以論云謂諸愚夫迷執外境起煩惱業生死輪回不解觀心非謂內境相分如外都無又云唯言識者是了別義意云五位一百法理之與事不離識今攝歸識總言識名以萬法由心起故然即非唯一人之識亦非唯一識更無餘識等出唯識體者一所觀出體者即取五位一百法為體以通觀有為無為法故即以識相識性合為唯識體皆不離識故二能觀出體者即唯取心心所為體心所與識常相應故即唯能非所若約唯識觀即取別境中慧為體於所觀境觀察勝故又明唯識差別總攝諸緣及理有其十種一遣虗存實義者遣為除遣虗為虗妄觀遍計所執唯虗妄起都無體用應正除遣為情有理無故存者留義實謂實有即觀依圓法體是實有是本後二智境應正存留為理有情無故良由一切異生小乘無始時來妄執我法為有清辨菩薩等妄撥理事為空今於唯識觀中遣虗者空觀對遣有執存實者有觀對遣空執非有非空法無分別離言詮故二者捨濫留純義捨為捨離濫即相濫留謂存留純為無雜雖觀事理有境有心為心不孤起仗境方生境不自生識變方起由境有濫捨之不稱唯心體既純留說唯識故論云識唯內有境亦通外恐濫外境但言唯識非為內境如外都無華嚴經云三界唯心故三攝末歸本義攝謂綰攝末即見相二分歸即向本謂識自證分是所依體故今攝末見相分歸本自證分體故言唯識故解深密云諸識所緣唯識所現四隱劣顯勝義謂王所俱能示現心所即劣依他起故隱劣不取心王即勝所依體故故言唯識即名顯勝故莊嚴論云許心似二現如是似貪等五遣相證性義識言所表具有事理事謂相用遣而不取理為體性應求作證故攝論偈云依繩起蛇解見蛇知是無證見彼分明方知明性亂六境義境謂所觀境識即能觀心此所觀境由識變現境不離識立境唯識故阿毗達磨經云鬼人天等所見各異七教義即能詮教說有唯識義故楞伽經偈云由自心執著心似外境轉彼所見非有是故說唯心八理義道理唯識唯識頌云是諸識轉變分別所分別由此彼皆無故一切唯識九行義行謂觀行即菩薩在定位作四尋伺觀等即觀行及定俱不離識故瑜伽論偈云菩薩於定位觀境唯是心等十果義謂佛果四智菩薩所有功德皆不離識故莊嚴論云真如無境識是淨無漏界等如上十義性相境智教理行果等皆唯是識無有一法而非所標故稱羣經了義中王諸聖所依之父若有遇者頓息希望無一法而可求無一事而不足全獲如來無上之珍寶寧同荊岫璞中已探教海祕密之靈珠豈比驪龍頷下遂得盡衆生之苦際斷煩惱之病原一念功全千途自正已釋唯識竟今當釋成字成者安立之義故樞要云安教立理名之為成問成立唯識有何義利答我佛法中以心為宗凡夫外道背覺合塵馳流生死菩薩憫之故造此論成立唯識令歸本源解脫生死所以成立問以何方便得歸本源答有五觀門令自觀心得本源故五觀門者即前十義中遣虗存實為初觀捨濫留純為二觀攝末歸本為三觀隱劣顯勝為四觀遣相證性為五觀也問論者何義答教誡學徒決擇性相激揚宗極藻義攸歸垂範後昆名之為論問論題四字何字能所答論字為能成唯識為所成成字通能所問當作何釋答若成目能成成屬論字唯識之成或成唯識之論依主釋也或論體之上有能成之用以用隨體成即是論持業釋也若成目所成成屬唯識唯識即成或所成即唯識亦持業釋也問論字唯能唯識唯所論有本末何論能成答本末皆能若本論為能成佛經唯識為所成若末論為能成本論唯識為所成問能成所成皆有教理此當何句答當以教成理之句何以故論是其教唯識是理故問此論以何為宗答唯識為宗何以故識有非空境無非有以為宗故問以何為體答護法正義實能所詮文義為體問憑何教理答二十論云展轉增上力二識成決定問論有宗論釋論此論是何答此宗論也正憑六經橫該大藏明唯識理故為宗論不單解釋別一本經故非釋論問教有三藏一素怛囕經藏二毗奈耶律藏三阿毗達摩論藏此於何攝答此當第三對法藏攝問教說一乘或三乘謂菩薩緣覺聲聞或說五乘加人與天此何乘收答正是一乘三中菩薩五內第一天親菩薩造頌按婆藪槃豆傳云北天竺富樓沙富羅此云丈夫國此土有國師婆羅門姓嬌尸迦有三子同名婆藪槃豆此云天親原為帝釋遣弟生閻浮提名毗搜扭天王降阿修羅故有此苗裔故名天親雖同一名復立別名顯之第三子於薩婆多部出家得阿羅漢果別云比鄰持跋婆此云母兒長子是菩薩根性亦於薩婆多部出家於後修定即得離欲思惟空義不能得入欲自殺身賓頭盧阿羅漢在東毗提訶觀見此事從彼方來為說小乘空觀如教觀之即便得入意猶未安謂理不應止爾因乘神通往兜率陀天咨問彌勒菩薩為說大乘空觀還閻浮提如說思惟即便得悟於思惟時地六種動既得大乘空觀因此別名阿僧伽譯為無著爾後數上兜率陀天咨問彌勒大乘經義隨有所得還閻浮提為餘人說聞者多不生信無著法師即自發願我今欲令衆生信解大乘惟願大師下閻浮提解說大乘令諸衆生皆得信解彌勒即如其願於夜時下閻浮提放大光明廣集有緣衆於說法堂誦出十七地經隨所誦出無著法師隨解其義經四月夜解十七地經方竟雖同一堂聽法唯無著法師得近彌勒菩薩餘人但得遙聞因此衆人皆信大乘第二子婆藪槃豆亦於薩婆多部出家博學多聞遍通墳籍神才俊朗無可為儔戒行清高難以相匹兄弟皆兼別名法師但名婆藪槃豆後住阿踰闍國遍通十八部義妙解小乘執小乘為是不信大乘無著法師既見此弟聰明過人識解深廣該通內外恐彼造論破壞大乘遣使報天親云我今疾篤汝可急來天親即隨使還丈夫國與兄相見咨問疾源兄云我今心病由汝而生汝不信大乘恆生毀謗以此惡業必永沉淪我今愁苦命將不全天親聞此驚懼即請兄解說大乘法師聰明殊有深識即得解悟知大乘理應過小乘於是就兄廣學大乘悉得通達憶昔毀謗深自咎責往至兄所陳其愚迷我昔由舌故生毀謗今當割舌以謝其罪兄云汝舌善巧毀謗大乘欲滅此罪亦當善巧解說大乘因此遂製十地論攝大乘論故此二論菩薩創歸大乘之作既而久蘊玄宗情奧旨更為宏論用暢深極採撮幽機提控精邃著唯識三十頌以暢大乘之妙趣也護法等菩薩造論梵言達磨波羅唐言護法本達羅毗茶國大臣之子少而爽慧弱冠之後王愛其才欲妻以公主菩薩久修離欲無心愛染將成之夕特起憂煩乃於佛像前請祈加護願脫茲難志誠所感有大神王𢹂負而出送離此城數百里置一山寺佛堂中僧徒來見謂之為盜菩薩自陳由委聞者驚嗟無不重其高志因即出家爾後專精正法遂能究通諸部間於著述等者該親勝火辨德慧安慧難陀淨月勝友陳那智月九大論師也佛圓寂後九百年中天親造頌親勝火辨同時造釋千一百年後餘八論師相次造釋各成十卷故卷有百三藏翻後糅成十卷故掌中樞要云雖分峰昆岫竦幹瓊枝而獨擅光輝穎標芬馥者其唯護法一人乎菩薩果成先劫位克今賢撫物潛資隨機利見春秋二十有九知息化之有期厭無常以禪習誓不離於菩提樹以終三載禪禮之暇注裁斯釋文邁旨遠智贍名高執破畢於一言紛解窮於半頌文殊水火則會符膠漆義等江湖乃疏成清濁平郊弭弭聳層峰而接漢堆阜峨峨夷穹窿以坦蕩俯鑽邃而無底仰尋高而靡際疏文淺義派演不窮浩句宏宗陶甄有極功逾千聖道合百王時有玄鑒居士識鳳鵷之斂羽委麟龍之潛跡每罄所資恆為供養深誠固志物竭積年菩薩誘接多端答遺茲釋而誡之曰我滅之後凡有來觀即取金一兩脫逢神頴當可傳通終期既漸奄絶玄遵菩薩名振此州論釋聲超彼土有靈之類誰不懷歡朝聞夕殞豈吝金璧若市趨賢如丘疊貨五天鶴望未輒流行唐三藏法師玄奘奉詔譯唐者李氏有天下之號以其奮迹晉陽為陶唐氏故都故國號唐焉三藏者一素怛囕經藏二毗奈耶律藏三阿毗達摩論藏前已具列法師玄奘生洛州偃師陳氏隋季出家受具戒廣學經論博參耆宿鈎深致遠開微發伏衆所不至獨悟於奧者固非一義矣既遍謁衆師備餐其說詳考其義各擅宗途驗之聖典亦隱顯有異莫知適從乃誓從西方以問所惑并取十七地論以釋衆疑即今之瑜伽師地論也結侶陳表有詔不許諸人咸退唯法師不屈孑身獨邁遍歷艱辛具載慈恩傳中故掌中樞要云大師睿發天資識假循謁無神迹而不瞻禮何聖教而不披諷聞斯妙理殷俯諦求居士記先聖之遺言必今賢之是囑乃奉茲草本并五蘊論釋大師賞玩猶覩聖容每置掌中不殊真說自西霏玉牒東馳素象雖復廣演微詮賞之以為祕訣及乎神栖別館景阻炎輝清耳目以徵思蕩心靈而繹妙乃曰今者方怡我心耳宣尼云我有美玉韞匱藏諸誰為善價我今沽諸基夙運單舛九歲丁艱自爾志託煙霞加每庶幾緇服浮俗塵賞幼絶情分至年十七遂預緇林別奉明詔得為門侍自參預三千即欣規七十必諧善願福果函丈不以散材之質遂得隨伍譯僚即事操觚餐受此論初功之際十釋別翻昉尚光基四人同受潤飾執筆檢文纂義既為令範務各有司數朝之後基求退迹大師固問基殷勤請曰自夕夢金容晨趨白馬英髦間出靈智肩隨聞五分以心祈攬八藏而遐望雖得法門之槽粕然失玄源之淳粹今東土榮賚並目擊玄宗幸復擢秀萬方穎超千古不立功於參糅可謂失時者也況羣聖制作各馳譽於五天雖文具傳於貝葉而義不備於一本情見各異稟者無依況時漸人澆命促慧舛討支離而頗究攬殊指而難悟請錯綜羣言以為一本楷定真謬權衡盛則久而遂許故得此論行焉大師理遣三賢獨授庸拙此論也括衆經之祕包群聖之旨何滯不融無幽不燭仰之不極俯之不測遠之無智近之有識其有隱括五明搜揚八藏幽關每壅玄路未通囑猶毫毳丘盈投之以炎爍霜氷㵎積沃之以畏景信巨夜之銀輝昏旦之金鏡矣雖復本出五天然彼無茲糅釋直爾十師之別作鳩集猶難況更托此幽文誠為未有斯乃此論之因起也此論十卷總三十二頌依頌分科約為三分前後各一頌乃護法等菩薩所造故以前一頌名宗前敬敘分即同常經序分也後一頌名釋結施願分即流通分也中三十頌乃天親菩薩所造故名依教廣成分即正宗分也以依瑜伽五分論中略集要義成三十頌施諸學者名集施頌初宗前敬敘分分二一頌二釋頌意稽首唯識性滿分清淨者我今釋彼說利樂諸有情一頌前二句敬禮三寶後二句言所以造論之意稽者至也以頭至地故云稽首問禮者三業皆敬以首至地此唯身業何得盡敬答既舉動身必有語意何以故若無心口何得動身故動身時必有語意故唯識性法也滿清淨佛也分清淨僧也三寶有同體別體同體者法界為體一真體上有覺照為佛有軌持為法有和合為僧別體者法報化三身名佛三乘教理行果名法五果四向十地三賢名僧問唯識者性與相通何偏敬性答唯無漏故唯真諦故聖所證故迷悟依故所以偏敬問常言三寶佛在法先今敘何以法在佛先答顯說相因佛先法後師資相因法先佛後問何故以法得為佛師答諸佛所師所謂法也般若云一切諸佛皆從此經出所以法為佛師也問何故論初須歸敬三寶答最吉祥故真福田故有大力故起希求故故須敬之問何故但敬三寶不敬餘天等答性調善故具方便故有大悲故不喜財利故所以偏敬利對害言樂對苦言有情二障起惑造業流浪生死受無量苦今因此論生解斷障得二聖果利益安樂諸有情故故曰利益也今造此論為於二空至所知障故得大菩提自此至故作斯論明頌中利樂有情之意先總後別今初二空者我空法空也外道不解名迷小乘邪解名謬迷者昧於二空謬者執於我法外道我有三種法有十三種小乘我亦三種法有七十五種我法之義下文詳之執者封著之義謂同時一聚心心所法封閉人法堅著不捨名之為執障者覆礙之義謂覆蔽真心礙智不起名之為障以執我故生煩惱障障大涅槃令諸有情流轉生死以執法故生所知障障大菩提令諸有情不得滿覺今以生解而得斷障以斷障而得解脫菩提二聖果豈非利樂乎煩惱者擾也亂也謂見思惑見思惑者即見愛煩惱見煩惱者邪心觀理名之曰見若於假實之理情迷而倒想邪求隨見偏理妄執為實通名為見即五利使見諦所斷八十八使及六十二見也愛煩惱者貪染之心名之為愛若於假實二事情迷隨心所對一切事境染著纏綿通名為愛即五鈍使思惟所斷十使及所斷結流愛扼纏蓋纏等也擾亂有情故名煩惱煩惱即障持業釋也所知者智所知境名為所知被此染法障所知境令智不知名所知障所知之障依主釋也所知不是障被障障所知故非持業問二障頭數是同是別答同是根隨二十六惑問既同根隨何稱二障答由貪上有擾惱用名煩惱障有覆蓋用名所知障問執之與障是同是別答根梢有異何以故我法二執為障根本生餘障類問執生障時為通為別答別謂我執為根生諸煩惱法執為根餘障得生問此二障染有殊否答有分別者名之為粗有俱生者名之為細問何名分別答強思計度而生起故何名俱生答與身俱生任運起故問分別俱生孰為先斷答分別之障先斷於見道一時頓斷俱生之障修道位中分分漸斷至金剛心時方能斷盡問斷此二障於大小乘差別如何答二乘唯斷煩惱障大乘雙斷問此二障染以何方便能斷答見前先伏入見方斷其斷伏道三乘有異如後三乘五位中辨總明竟又為開示謬執我法至於唯識理如實知故此約二執別顯世間迷也開發我法本空去其謬執指示唯識實理出之迷途復有迷謬唯識理者至得如實解故作斯論此約四執別顯聖教迷也或執外境如識非無者此即有宗依十二處教執心境俱有或執內識如境非有者此破清辨依密意空教撥識亦無或執諸識用別體同者即大乘一類菩薩言八識用雖不同體唯是一如一水鏡多波像生或執離心無別心所者此即經部覺天所計但有心王都無心所以經言士夫六界染淨由心無心所故雖於蘊中亦有心所但於識上分位假立無別實有然清辨計雖撥皆空強違中道而立唯境順世亦立唯四大種成有情故若依此義應有四句一清辨順世有境無心二中道大乘有心無境三小乘多部有境有心四邪見一說都無心境士夫即作者以心能造物故名作者六界謂地水火風空識六法各別故名為界此皆迷實有之唯識謬執假設之我法為遮此等令得悟入唯識深妙理深妙理即唯識性也如則非穿鑿之見實則非影響之知能證唯識方為能解唯識如是而解可以言正解矣已上宗前敬敘分竟下依教廣成分分三種三科一略廣位三科初一頌半略答外難略標識相次二十三頌半廣明識相顯前頌意後五頌明修行之位二境行果三科前二十五頌明唯識境次四頌明唯識行後一頌明唯識果三性相位三科前二十四頌明唯識相第二十五頌明唯識性後五頌明唯識位今依性相位分科初明唯識相次明唯識性初又分二初一頌半略辨唯識次二十二頌半廣辨唯識若唯有識云何世間及諸聖教說有我法第一頌半破我法此天親假設問詞謂若唯有識一切法皆無則云何世間與聖教中皆說有我及有法耶世間或是妄執聖教豈是謬談頌曰由假說我法至謂異熟思量及了別境識頌意謂聖教雖有我法之名對機假設非同情執假有二種一者無體隨情假即世間外道所執雖無如彼所執我法隨執心緣亦名我法故說為假二者有體施設假聖教所說雖有法體而非我法本體無名強名我法不稱法體隨緣施設故說為假此假說我法一句古疏有二解初解言說由後解我法由言說由者言說與我法為由由言說故有假我法我法由者我法與言說為由由有我法方起言說問言說由者因何便能起得言說說彼我法答由妄情故執著我法依此便起假我法言方有所詮假我假法此名說擔情我法也何以故先有執情次起言說後有我法言說在中名說擔情我法也此世間者若聖教我法即云說擔證得及我法也問我法由者因何便有我法依之起說答由證得故強名施設假我假法後起言說此是假我假法此名我法擔證說也先有證得施設為我法後起言說此是聖教若世間者應云我法擔情說也長行問在有字上頌家答在說字上名言說由長行問在說字上頌家答在假字上名我法由既無實我法則假依何而立故云彼依識所變謂依識所變相見分立也首二句總答問意中二句釋上我法為所變顯識為能變後二句釋能變三名論曰世間聖教說有我法至我謂主宰法謂執持從此直至第二卷非謂一切止並護法等解釋頌意分二一釋我法即前三句頌二釋三能變即後三句頌一又分三一釋由假說我法我謂主宰主有自在力宰有割斷力義同我故主是我體宰是我用或是我所主是俱生我無分別故屬第七識我宰是分別我有斷割故屬第六識我法謂軌持軌者軌範可生物解持者任持不捨自相彼二俱有種種相轉至轉謂隨緣施設有異二釋有種種相轉世間我種種相謂我有情異生摩納縛迦養育者數取趣命者生者知者見者外道別執作者受者神我等也聖教我種種相謂預流等人三賢十地三乘五性二十五有是也世間法種種相謂勝論六句數論二十五諦及順世外道七種外道執梵王執時執方執本際執自然執虗空執我等是也聖教法種種相謂蘊處界等緣起根諦善巧等法是也問世間我法率己妄情聖教我法有何益用答有四緣故一言說易故二順世間故三能除無我怖故四有自他染淨信解事業等故有此益用聖說我法耳隨緣施設有異即解轉字施設即假立義隨主宰緣假立為我隨執持緣假立為法如是諸相若由假說至緣此執為實有外境三釋彼依識所變設問云是種種相既由假說則此假依何而得成立故答云彼相皆依識所轉變而假施設轉變與變現不同變現者唯現心等能起見相名之為變不通於種相分色等轉變者通於種現現能熏種種能生種種生現行名轉變也識謂了別別釋頌中識字義顯了分明辨別境相故名為識凡所言識必攝心所以心所與心王同一所依根同一所緣境同一時同一事同一行相具足五義故曰定相應也變謂識體轉似二分識體即自證分二分即相分見分論明諸識體即自證分轉似相見二分而生此說識體是依他性轉似相見二分非無亦依他起依此二分執實二取聖說為無非謂依他中無此二分論說唯二依他性故此除真智緣於真如無相分故餘皆有相不爾如何名他心智後得智等不外取故許有相見二體性故說相見種或同或異若同種者即一識體轉似二分相用而生如一蝸牛變生二角此說影像相見離體更無別性是識用故若言相見各別種者見是自體義用分之故離識更無別種即一識體轉似見分別用而生識為所依轉相分種似相而起以作用別性各不同故相別種生於理為勝故言識體轉似二分此依他起非有似有實非二分似計所執二分相見故立似名問相別有種何名識變答不離識故內識變時相方生故問此顯能變相見二分用體別有何故又說識似二分生答論說相見俱依自證起故若無自證二定不生如無頭時角定非有及無鏡時面影不起皆於識上現相貌故故說二分依實體生世間聖教依此見分施設言我依此相分施設言法何以故我法若離相見二分無由起故我法為能依相見為所依故或復者更端之詞前言轉似二分後言轉似外境故言或復以第八識頓變根身器界種子轉生七識各能變現自分所緣故曰變似外境問如何變耶曰我法分別熏習力故諸識生時變似我法此我法相雖在內識而以分別故似外境現耳此二種轉似俱依他起性俱屬聖教諸有情下方是遍計所執相方屬世間諸有情類六七二識無明覆故緣此執為實我實法如患夢者患夢力故心似種種外境相現夢時執為實有外物寤來方知唯夢所變我此身相及外世界亦復如是唯識所變迷故執有我及諸境患即病也但云似者即屬聖教但云實者即是世間或為內識二字所障以轉似二分為世間轉似外境為聖教非是愚夫所計實我實法至所依事故亦勝義有此結前義總釋前三句意愚夫所計實我實法是遍計所執體實都無猶如龜毛非與依他內識相似但隨妄情強施設耳故說為假內識所變似我似法即依他性必依種子因緣所生非體全無如遍計境彼實我法然非我法即我法名亦是聖教強施設故名不稱法故說為假然則外境定無而非能如識之有也內識定有而不至如境之無也便遮外計離心之境實有增益執及遮邪見惡取空者撥識亦無減損執即離空有設唯識教境唯世俗之有識通勝義之門由此二諦之名立焉釋頌意略辨我法竟云何應知實無外境至境生問也實我實法不可得故二設問答廣辨我法分二一總問總答如何實我不可得耶問也至潛轉身中作事業故二別問別答分四一別破我執分五一破外道三種我諸所執我以下皆是答詞現見世人知覺運動作業受果明有主人公潛施默運如何實我不可得耶曰世間所執我雖多總而言之略有三種一同太虗立我即勝論所計作者我數論所計受者我二卷舒不定我即無慚外道尼虔子計隨身大小有卷舒故三量小極微我即獸主遍出二宗所計潛轉身中有自在用此名六師三計餘九十種所計我等不出此三故曰略有三種初且非理所以者何至所修證法一切我合故先破同太虗空我應出外量云我是有法體常周遍是宗因云隨處造業受苦樂故同喻如虗空此因唯於異品中有同品定無又宗犯能別不極成過因犯法自相相違過喻犯能立法不成過立量破云我是有法非常非遍為宗因云隨處造業受苦樂故同喻如心所異喻如虗空又諸有情同一我耶各一我耶若同一我者則一作業時一切應作一受果時一切應受一解脫時一切應解脫如今現見四生六道三賢十聖各各不同而立此論便成大過若各一我者我既常遍則一切我更相涉入各一我中具有一切我亦當一作業時一切應作一受業時一切應受若言彼作彼受此作此受作業受果於諸我中不相紊亂無他作我受之過者理亦不然常遍之我不分彼此既分彼此不為常遍今既執常遍則業果及身一即一切而云屬此非彼有是理乎故一解脫時一切應解脫何以故一修即一切修一證即一切證故中亦非理所以者何至故彼所言如童豎戲次破卷舒不定我我體常住應不卷舒既有卷舒應如橐籥橐籥中豈有常住之風耶立量破云我體非常住宗因云有卷舒故喻如橐籥風又我既隨身則身有多物應可分析何者為我色是我耶受等是我耶分析之後便成多體而猶執我體是一是常真兒戲之談矣後亦非理所以者何至諸有往來非常一故三破量小極微我廣百論云是故我體住於身內形量極細如一極微不可分析體常無變動慮動身能作能受此亦不然以違理故衆微聚積成極大身我住其中形量甚小云何小我能轉大身舉體同時皆見動作若汝意謂我量雖小而於身中往來擊發漸次周匝如旋火輪以速疾故謂言俱動若爾我體巡歷身中應有生滅及成衆分但是遷流至餘處者定歸生滅必有衆分既言我轉所至非恆如彼燈光豈有常一常必非動動即非常我動而常深違正理又所執我有住有行何得說為是常是一若行時我不捨住性應如住位則無所行若行時我捨其住性別體即生常一何在又所執我復有三種至三者與蘊非即非離二破小乘三種我即離二我正量經部二宗所計非即離我犢子部計正量部等亦作此計蘊是聚義聚為身故亦是覆義覆真如故即色受想行識五法合聚為身即蘊我者謂色是我色等即身為我離身之外無我義故離蘊我者彼執我體離蘊別有非即離我者彼執我體即蘊非即離蘊非離則知蘊有生滅我體常一初即蘊我理且不然至故彼所執實我不成凡執我者皆以常一為宗若言即蘊我者蘊取聚義則非常矣五法合成則非一矣量云我若即蘊非常一故喻如五蘊次約五位破五根六塵皆屬色蘊此云內色即五根也此云外色即六塵也餘行即得等二十四法與五十一心所除受想二俱屬行蘊故曰餘行餘色即長短方圓粗細高下正不正等色色有質礙我無質礙故我非即色量云內諸色定非實我有質礙故如外諸色心待衆緣不恆相續我恆相續應不待緣故我非即受想行量云心心所法亦非實我不恆相續待衆緣故喻如聲等餘行餘色無有覺性我有覺性故我非即餘蘊量云餘行餘色亦非實我非覺性故如虗空等若言離蘊我者我既離蘊非色非心則應如虗空既不作業亦不受果而今現見有作有受離身心外復是何物量云我若離蘊無作受故喻如虗空若言俱非我者依蘊立我故云非離我非是蘊故云非即正知作瓶團泥成瓶非離團泥瓶非團泥非即團泥故知泥可言實瓶決定假則汝蘊可言實我決定無矣有為無為等者謂犢子部等彼立三聚一有為聚二無為聚三非二聚非二即我又立五法藏謂三世為三無為為四第五不可說藏我在其中以不可說為有為無為故經部亦執有勝義我非即非離即計菩薩出離生死故名勝義即借彼說例破之云若汝既知不可說為有為無為亦應當知不可說為是我非我故彼所執實我不成破小乘三種我竟又諸所執實有我體至故所執我理俱不成三總約根境識三種破謂汝所執之我是根耶境耶識耶先約識彼故曰思慮念過去現在為思念未來為慮立量云我若是識應是無常有思慮故如諸心所我若非識應是無情無思慮故如虗空等又諸所執實有我體至故所執我二俱不成次約根破根是有作用法故以作用徵詰立量云我若是根應是無常有作用故如手足等我若非根應非實我無作用故如兔角等又諸所執實有我體至正見翻令沈淪生死此約境破言汝所執我是我見分所緣境否耶若非我見所緣境者汝等云何知實有我若是我見所緣境者即是真相分現量所得如實知故非顛倒攝當迷之而沉生死悟之而證涅槃矣云何汝等所信聖教皆毀我見沉淪生死稱讚無我能證涅槃耶邪見能證涅槃正見反淪生死有是理乎此不立量者下文當出故廣百論云外道經中咸作是說著我生死離我涅槃既讚捨我令欣解脫如何固執有實我耶為顯此義故復頌曰我若實有性不應讚離我謂我若實有緣生我見即是真實不應勸捨為證實我應更殷勤勸修我見令其堅固云何勸捨真實我見令修虗妄無我見耶若無我見不稱實我汝不應說能證涅槃不稱實見證涅槃者知真趣脫此說應虗為顯斯義故次頌曰定知真實者趣解脫應虗有我若實無我我所解脫方便見應成虗有我我所違逆涅槃隨順生死見應是實若顛倒見隨順涅槃無顛倒見隨順生死云何汝論作如是言定知實者能趣解脫以此定知空無我見得涅槃故所證非虗我我所見涅槃時捨應知餘見是其顛倒又諸我見不緣實我至隨自妄情種種計度此破我執已竟總申二比量初約能緣次約所緣以將欲說出我見所緣是假相分故先審定我見不緣實我以我見自有所緣故喻如緣餘心亦無實我為我見境以是我見之所緣故喻如所餘法也我見亦是心所以其餘心所為同喻故曰如緣餘心我見即是妄見妄見所緣即是妄境與龜毛兔角等耳故曰是所緣故如所餘法也所餘法即第六蘊第十三處第十九界等是故下說出我見所緣是假相分我見既不緣實我是緣何等但緣內識變現五蘊似我之相隨自妄情周遍計度以為實我如病眼境定非實有故不可以我見所緣證立此我實有常住然諸我執略有二種一者俱生二者分別四總舉通執分二一標數總舉世間沙門婆羅門等所有我執品數雖多約而言之不出二種俱生我執無始時來至勝生空觀方能除滅二正釋分三一俱生二分別三總結今初由從無始來故不待邪教由內因力故非邪分別由恆與身俱即任運而轉具上諸義故名俱生此復二種一者第七執第八見分為內自我而親緣第八見分不著但託彼見分為本質於自心上變起影相而緣為帶質境故曰起自心相執為實我此則常常相續無有間斷二者第六緣第八所變色心蘊法或總執內蘊為我外蘊為所或別執一蘊為我餘蘊為所於自心上變起影相而緣為獨影境故亦曰起自心相執為實我此則有間斷時不恆相續此二我執無始至今任運而有不假作意分別尋伺細故難斷直至修道位中修習勝生空觀地地漸斷至金剛心方能斷盡言勝生空者揀異見道生空故名勝也生空即衆生空若觀生死苦果但見名色陰界入實法從因緣生新新生滅是實法中空無我人衆生壽者等十六知見如龜毛兔角畢竟不可得是名衆生空分別我執亦由現在至生空真如即能除滅執有內外等從緣生故曰亦由現在對無始時來外緣對內因非與身俱對恆與身俱然後方起對任運而轉唯在第六意識中有簡前第七無分別義邪教所說蘊相如從冥生覺從覺生心從心生五微塵從五微塵生五大從五大生十一根等邪教所說我相如我是思等現分別起對前俱生故名為粗初見道時即能除滅故名易斷見道位中初地初心生空遍行真如現在前時一時頓斷如是所說一切我執至一切皆緣五取蘊起三總結內外自心內蘊自心外蘊據宗鏡録有二種解彼云心外執我執法者有兩種一者如外道等執離心等別有一物是常是一名之為我此乃妄計所執其體都無二者踈所緣緣本質之法能緣之心親緣不著亦名心外此是依他其體是有又云自心外蘊第七計我心外唯有第六計我心外之蘊或是於無自心內蘊一切皆有者親所緣也不問即離計為我者影像必有故云何必有曰如能緣心將緣龜毛等無法之時由無始來熏習力故依種生時從識自證分上變起龜毛等相分及緣此龜毛相分此相見分與識自證分同一種生既依種生是依他性非體全無不同本來無體龜毛故得成所緣緣乃至如離蘊計有實我實法等亦復如是離蘊性外部無實我亦無決定實法但是有情虗妄執有以理推徵都無有體故如本來無體龜毛然我法執此時亦由無始虗妄熏習力故變起假我法相此相與見等同種亦依他起成所緣緣若言獨影境是偏計性者其體即無猶如龜毛等即此一分相分無何得論言自心內蘊一切皆有耶是故我執皆緣無常五取蘊相妄執為我者結成前義影像相分必是蘊故緣此為我義顯大乘親緣無法不能生識不成所緣緣成所緣緣必有法故然不可緣此遂執我法是有如諸蘊相是依他起性決定似有因云仗因託緣而得生故喻如幻有妄所執我是遍計執性決定非有因云橫計度故喻如畢竟無恐人不信故以契經證結焉集論云何故名取蘊以取合故名為取蘊何等為取謂諸蘊中所有欲貪何故欲貪說名為取謂於未來現在諸蘊能引不捨故希求未來染著現在欲貪名取俱舍云或有唯蘊而非取蘊謂無漏行煩惱名取蘊從取生故名取蘊如草糠火或蘊屬取故名取蘊如帝王臣或蘊生取故名取蘊如華果樹通上四總舉通執竟實我若無云何得有至於汝有失非於我宗五外難內破有三章初破我有三世難難云若無實我則世人現能憶過去識現在誦習未來益我損我為恩為怨等事念念生滅不停誰為主宰而任持此耶先約體破言汝所執我既是常住應無轉變無轉變故三世一如則是過去應如現在現在應如過去若是現在如過去者則我體常無三世恩怨亦應常無誰為憶識誦習若是過去如現在者則我體常有三世恩怨亦應常有何須憶識誦習何以故前之與後同一我體無分別故次約用破若謂我用自變我體自常者理亦不然用即體之用體即用之體不可析而二也用不離體體常而用亦常則我用不應有變體不離用用變而體亦應變則我體不應言常進退推求不得言我能憶識誦習三世恩怨等事次顯正義云有情身中一一各有阿賴耶識一類相續任持諸法種子不失與一切法互為因果熏習力故得有如是憶識誦習恩怨等事何嘗有實我為之主宰哉汝無持種受熏之識而設憶識誦習之難祇彰汝失成立我宗耳乃我宗則何失焉若無實我誰能造業至造業受果於理無違次破我能作受難此即十六知見中起者受者破詞雖以有變易無變易兩端徵詰然外計定主無變易以有變易違害常我故立量云汝所執我應是不能造業受果因云無變易故喻如虗空若言有變易已成自教相違故不立量次出正義云然諸有情能造受者皆是八種心王心所發業潤生內因外緣熏習之力故有善惡苦樂業報等事豈有實我能作受哉華嚴會意問云若準六根無我誰造誰受耶答佛說作善生天為惡受苦者此但因緣法爾非是我能作受也若言是我非因緣者作惡何不生天乃墮地獄耶我豈愛彼地獄故受苦耶我既作惡而不受樂者故知善惡感報唯因緣非是我也如論云因緣故生天因緣故墮地獄是此意也問既言無我誰感因緣若言無我但是因緣自為者草木亦稟因緣何不生天與受苦耶答內外雖但稟因緣因緣有二一善惡增上業因緣但感生天及地獄異熟等二善惡等流業因緣生天者感寶地金華墮地獄者感刀林銅柱等此是因緣業作非我能為豈謂受報不同而計有我也故經云無我無造無受者善惡之業亦不亡我若實無誰於生死至愚者於中妄執為我三破我有生死涅槃難廣百論引其說云若一切法空無我者生死涅槃二事俱失所以者何由有我故諸無智者樂著生死先造能招善不善業後受所感愛非愛果諸有智者欣樂涅槃先觀生死苦火煎逼發心厭離後方捨惡勤修諸善得正解脫如是一切皆由我成我為作者我為受者我為苦逼發心厭離捨惡修善證得涅槃此破之云汝執我常無生滅又謂我能生死輪回則害常無生滅義矣我常如虗空應非苦所惱又謂我能捨苦求樂則害常如虗空義矣故觀厭苦求樂捨此生彼則可以驗知定無實我何以故若有實我則不可移易不能去來隨緣起滅故但有諸識無始時來前滅後生因果相續虗妄熏習似我相現愚者遂執以為實我耳此條為已出其自語相違之過故不立量大涅槃經云師子吼菩薩言世尊衆生五陰空無所有誰有受教修集道者佛言善男子一切衆生皆有念心慧心發心勤精進心信心定心如是等法雖念念滅猶故相似相續不斷故名修道乃至如燈雖念念滅而有光明除破暗冥念等諸法亦復如是如衆生食雖念念滅亦能令饑者而得飽滿譬如上藥雖念念滅亦能愈病日月光明雖念念滅亦能增長草木樹林善男子汝言念念滅云何增長者心不斷故名為增長如淨名經偈云雖無我無造無受者善惡之業亦不亡失善惡之業因苦樂之果報非有人我能作能受但是識持因果不亡如古師云衆生為善惡而受其報者皆由衆生心識三世相續念念相傳如今世現行五蘊由前世識種為因起今世果今世有作業熏種又為來世現行因展轉相續為因果故又善惡之業皆由心識而起謂前念造得善惡業然此一念識雖滅而後念心識生既心識相傳不斷即能任持善惡之業而亦不亡以由識持故只為識心如幻無定故乃有從凡入聖之理厭妄求真之門則不壞因緣能含正理通上別問別答下第一別破我執竟如何識外實有諸法不可得耶問至理非有故答第二別問法執分二一總問答外道所執云何非有二別問答分四一外道二餘乘三總破前執四總舉通執華嚴鈔云至妙虗通目之曰道心遊道外即稱外道唯佛正道餘悉名外道約而言之有一十三種一有數論師計二十五諦二有勝論師計六句義三有計大自在天是一是實是遍是常能生諸法四至十有七種外道謂執梵王執時執方執本際執自然執虗空執我如此七種計執皆是常能生諸法十一十二有二聲論一待緣生一待緣顯二宗計聲體皆是常十三有順世外道謂計四是常是實能生有情死歸四大且數論者執我是思至是實非假現量所得外道中一數論分四一舉執二總破三別破四結成今初梵音僧佉此翻為數數即慧數數廣諸法根本立名從數起論名為數論論能生數亦名數論其造數論及學數論者皆名數論師本源即是迦毗羅所造迦毗羅此云黃赤色髭髮面色並黃赤故時世號為黃赤仙人此人亦修禪定有神通力知八萬劫中事八萬劫前冥然不知謂之冥諦從冥初自性生智大乃至神我開成二十五諦合為九位一冥初自性謂此外道以八萬劫前之事冥然不知之處昧為自性古稱冥性亦名勝性未生大等但住自分名為自性二智大亦名覺大大者增長之義謂冥初之際覺知增長故云從冥初生智大三我心亦名我執我慢謂由覺知生我慢心故云從智大生我心四五唯亦名五微即色聲香味觸也以色等五種由我執之心方現故云從我心生五唯五五大即地水火風空也此五種性遍一切處故名為大由極微而生故云從五唯生五大六五知根五即眼耳鼻舌身五根謂之知者以此五種皆有知覺故也因五大而成故云從五大生五知根七五作業根即口與手足小便大便謂之作業者以此五種能作業用故也亦因五大而成故云從五大生五作業根八心平等根心乃肉團心即意根也謂之平等者以此根能遍一切根境而生分別故此亦五大所成故云從五大生平等根并前五知五作業共為十一根也九神我即第八識彼不知有第八識故執神我能生諸法常住不壞是二十五諦之主也我思勝境冥性即變二十三諦為我受用我既受用為境纏縛不得解脫我若不思冥性不變即得解脫名為涅槃問自性云何能與諸法為生因答三德合故其三德在冥性中眠伏不起在大等二十三位便有覺悟故二十三一一皆以三德合成言三德者梵云薩埵剌闍答摩薩埵此云有情亦云勇猛今取勇義剌闍此為微牛毛塵等皆名剌闍亦名塵坌今取塵義答摩此云暗即暗鈍之暗三德應名勇塵暗若傍義翻舊云染粗黑新云黃赤黑舊名喜憂暗新云貪嗔癡舊名樂苦癡新云樂苦捨敵體而言即是二毒能生三受名樂苦捨黃赤黑者是其色德貪多輕光故色黃嗔多動躁故色赤癡則重覆故名黑由此自性合三德故能生諸法故自性是作者我是見者而非作者彼執非理所以者何至如何可說現量得耶二總破言若使大等一一皆攬三成即如軍如林是假非實如何可說現量得耶二千五百人為軍多樹為林若分析至盡即失軍林故云是假量云大等是有法應假非實非現量所得是宗因云多法成故喻如軍林等又大等法若是實有至轉變非常為例亦爾三別破分八一因果相如破本事即自性三事彼計大等二十三法皆是實有又計自性三分合成所謂薩埵剌闍答摩剌闍性躁警薩埵等令起種種轉變功能三法和同隨於一分變成大等轉名最勝大等諸果變故無常一物自性不變故常故此破云若大等法是實有者則亦三事等耳豈賴三事合成乎量云大等諸法非三合成是實有故喻如本事又薩埵等三亦三合成即大等故喻如大等本事既能轉變為大等大等亦應能轉變為本事何以故是實有故猶如本事大等既是無常本事亦應無常何以故即大等故如大等法廣百論云大等皆用自性為體大等變時自性應變由此自性應是無常體無異故猶如大等又云如是所執自性最勝一分有用變成大等餘分無能無所轉變是即自體應成種種成種種故定是非常如大等果相非常住又三本事各多功能至餘亦應爾體無別故三約體用相同破彼計第一薩埵其性明白第二剌闍其性躁動第三答摩其性暗昧此三一一相用衆多能起種種轉變功能故破之云功能既多則此三事體亦應多何以故功能與體無差別故體即自性也廣百論云又三自性一一皆有明躁昧等衆多作用自性作用既許體同以性隨用應成多體自性最勝無差別故是則最勝體亦應多體既成多應如大等定是無常又汝若謂三德之體不分而遍不成多者一處起用轉變之時餘一切處俱應轉變何以故能遍之體無差別故許此三事體相分別至故不應言三合成一四約體相異同破汝既許此明躁昧等體相各別如何和合共成一相合時之體與未合時無差別故不應未合時各別而合時乃變為一相也若謂三事其體雖異而相是同故和合時成一相者便有自教相違之過汝執體相定是一故體應如相同相應如體異如何可言三合成一耶又三是別大等是總至總亦應三如何見一五約總別相同破三事是別相大等是總相以三事共生一法故汝執總別既定是一總應如別是三非一別應如總是一非三云何別三成於總一若謂三德實不和合成一相者三事轉變時既不和合與未變時應無差別不應現見是一色等若謂三事和合而成一相則三事別相即應亡失而體亦應隨相而失何以故離相無體故體相既失又將何事而成一相亦不可說三事各有總別二相故雖成總相亦不失別相以大等總相即是三事之別相故若謂總相即別相者則大等總相上各各應有三事別相如何但見大等一色總相不見三德別相耶廣百論云不可說言樂等三德各有二相一總二別所以者何總相若一不應即三總相若三不應見一若謂三體各有三相至體亦應各三以體即相故六三相和合破若謂三事一一皆有薩埵等二相共相和雜難可了知故見一者此亦不然各有三相還應見三如何見一既見為一則成一相又如何知三事之有三相差別乎若三事一一皆具三相即應一一事能成色等根境差別為我受用何所闕少必待三事和合而成耶若謂必待三相和合而成應一一事皆有三體何以故體即相故廣百論云又此三德各有三相互有差別如何色等其相是一三體各有三相者謂貪中有瞋癡瞋中有貪癡癡中有貪瞋三法和雜故各見一此遮三一不齊之難也又大等法皆三合成至皆應無異便為大失七果無差別破因即能成之三事果即所成大等二十三法唯量即五唯量諸大即五大諸根即十一根意謂能成三事既同則所成大等悉一是則一切差別之相皆不得成既無差別則一根應得一切境如眼根亦能聞聲嗅香知味等或應一境一切根所得如一色唯眼亦可見耳亦可聞等如是則世間現見情與非情淨穢等物現比等覺皆應無異便成大失豈特自教相違世間相違而已哉唐三藏嘗折外道云此大等俱各以三成即一是一切若一即一切則應一一皆有一切作用既不許然何因執三為一切體性又若一即一切應口眼等根即大小便路又一一根有一切作用應口耳等根聞香見色若不爾者何得執三為一切法體以此破詞參看論義更自了然故彼所執實法不成但是妄情計度為有八結成前義勝論所執實等句義多實有性現量所得二勝論分四一舉執二總破三別破四結成今初此即衛世師計新云吠世史迦薩多羅此云勝論立六句義最為勝故或勝人所造故其能造人即成劫之末人壽無量外道出世名嗢露迦此云鵂鶹晝避聲色匿迹山藪夜絶視聽方行乞食時人以為似鵂鶹鳥故名鵂鶹仙人即百論優樓佉也或名羯拿僕羯拿此云米齊僕此云食先為夜遊驚他稚婦乃不夜乞遂收場碾糠粃之中米齊而食故時號為食米齊仙人多年修道遂獲五通謂證菩提便欣入滅但嗟所悟未有傳人愍世有情癡無慧目乃觀七德授法令傳一生中國二父母俱是婆羅門姓三有般涅槃性四身相具足五聰明辨捷六性行柔和七有大悲心經無量時無具七德後經多劫婆羅痆斯國有婆羅門名摩納縛迦此云儒童有子名般遮尸棄此云五頂頂髮五旋頭有五角其人七德雖具根熟稍遲既染妻孥卒難化導經無量歲伺其根熟後三千歲因入園遊其妻室競華相忿鵂鶹因此乘神通化之五頂不從仙人且返又三千歲化又不得更三千歲兩競尤甚相厭既切仰念空仙仙人應時神力化引騰空迎往所住山中與說所悟六句義法一實二德三業四大有五同異六和合實者說法體實德業所依名之為實德業不依有性等故德者道德業者作用動作義也實有九種一地二水三火四風五空六時七方八我九意德有二十四一色二香三味四觸五數六量七別性八合九離十彼性十一此性十二覺十三樂十四苦十五欲十六瞋十七勤勇十八重性十九液性二十潤二十一行二十二法二十三非法二十四聲業有五種一取二捨三屈四申五行大有唯一實德業三同一有故離實德業外別有一法為體由此大有有實等故同異亦一也如地望地有其同義望於水等即有異義地之同異是地非水水等亦然亦離實等有別實體和合句者謂法和聚由和合句如鳥飛空忽至樹枝住而不去由和合句故令有住等此六是我所受具未解脫已來受用前六若得解脫與六相離稱為涅槃彼執非理所以者何至應非離此有實自性二總約常無常破言汝所執六句義中若常住者為能生果為不生果若能生果應是無常若不生果應非實有量云諸常住者應是無常有作用故如所生果諸常住者應非離識實有自性無作用故如兔角等若無常者為有質礙為無質礙若有質礙應可分析若無質礙應非實有量云諸無常法應可分析有質礙故如軍林等諸無常法應非離識有實自性無質礙故如心心所如上兩宗各有二量皆初一量約所執破第二一量約唯識破又彼所執地水火風至許色根取故如地水火風三別破分四一破實等三句二破第四大有句三破第五同異句四破第六和合句今初彼計瓶衣諸物因實德業同異合故為眼所見反身所觸故是根境現量所知故此立量破云地水火風是有法應非有礙是宗因云實句義攝身根所觸故喻如堅濕暖動即彼所執堅濕暖等是有法應非無礙是宗因云德句義攝身根所觸故喻如地水火風又地水火應非有礙實句義攝眼所見故如青色等青色等應非無礙德句義攝眼所見故如地水火故曰准此應責觸言四大而色止三大者風但有觸非眼所見故也此身根所觸及眼所見因既向有礙地等實句上轉又向無礙堅等德句上轉同異俱有犯不定過身觸眼見因既犯過則謂是根境現量所知者不攻而自破此論主量意也地等且非根境況瓶衣假物乎實句地水火三皆有質礙餘六及德等二十四皆無質礙實句義中有礙常者即是地水火三諸句即餘六及德等諸句色根即眼根色根所取無質礙法即青黃長短等實假色上言有礙無礙止借以出因寬不定過此但破歸有礙有礙則可分析常義不成則所謂實有性現量所得其謬顯然矣應是無常應皆有礙皆宗皆有礙故許色根取故皆因如粗地等如地水火風皆喻又彼所執非實德等至故彼有性唯妄計度二破第四大有句非實德等即大有句彼計大有是離實德業外別有一法為體故非有實等即實德業三句彼計離實等大有是有則實等是非有故此中先約唯識破謂此大有性既離實德業外決在識內以非是實等所攝故若離實德業之大有性不離識則離有情之實德業亦不離識以非是有性所攝故遂申量云彼所執非實非德非業之大有性是有法應非離識有別自性是宗因云非是實等所攝故喻如石女兒離大有之實德業是有法亦非離識有別自性是宗因云以非有性所攝故同喻如空華二喻一是畢竟無一是幻有以有住是遍計實德業是依他故次就彼宗自許破又彼所執大有性離實德業外無別自性以彼自許大有性不離實德業故立量云大有性是有法應離實等無別自性宗因云許非無故喻如實德業等次約有法差別相違破因明云有性是有法非實非德非業宗因云有一實故有德業故如同異性應申違量云汝所執有性是無法即實即德即業宗因云有一實故有德業故喻如畢竟無此中量云離實德業之大有性應非有性宗因云汝許非實非德非業故喻如畢竟無雖小異而意則一也如有非無下即次大有例破實德業三非別有性如大有性自許非無離實德等無別有性如何復說實等離大有外有別有性若離實等有法有別有性應離非實等法有別無性既離無法無別無性豈離有法有別有住哉故曰彼既不然此云何爾故彼有性唯妄計度結成前義又彼所執實德業性至故同異性唯假施設三破第五同異句彼計實等諸法相望有同有異法體局別所以多異有性該通所以名同通局既殊故相有異由相異故異外有同是則非離實德業外有同異性也故言汝所執實德業之同異性離實德業有別自體理定不然若同異性異實德業而有則應實德業亦離同異性而有故立量互破云若此同異性是有法非實德業是宗因云異實德業故喻如德業等則應實德業是有法非實德業攝是宗因云異實等性故喻如德業實既同異性非離實德業而有則實德業亦非離同異性而有地等下次准破次彼計地望地為同地望水為異等故若知離實等體無同異性離同異性無實等體則知離堅等性無地等體離地等體無堅等性立量云堅等性是有法非地等體是宗因云異地等故喻如水火等地等體是有法非地等攝是宗因云異地等性故喻如水火等如實下次例破言實德業外無同異性如地等之外無堅等性則應同異外無實德業性如堅等之外無別地等若離實等有同異性即應離非實等有非同異性今離非實等無非同異性則實等之外又安得有同異性哉廣百論云若見諸法同異相異即於法外別立有同既見諸法同異相殊應於法外別立有異同異二相俱遍諸法異應如同離法別有設許法外有異有同此復應有餘同異性如是展轉同異無窮則不可知二相差別二皆遍故俱無窮故異應如同名同非異同應如異名異非同是故法外無別同異又彼所執和合句義至由前理故亦非實有四破第六和合句又彼所執和合句義是前陳有法定非實有為宗因云非有實等諸法攝故喻如畢竟無緣彼計由和合故諸法方得合聚而和合性體是別有非諸法所攝故破云若非諸法所攝如畢竟無以離諸法無和合義故然彼實等非緣離識至亦是隨情妄所施設四結成前義此二比量初顯所緣實等非離識體有實自性非現量境次顯能緣實等智是假智詮非現量智攝許所知故者以彼自許現量所知今去現量單取所知明是妄見成此妄境故喻如龜毛等也如德智等者實智既假德智亦然故為同喻六句俱以能所雙破如前例為詞不繁出故云廣說乃至等有執有一大自在天至亦應頓起因常有故三計自在天是萬物因即塗灰外道并諸婆羅門彼計此天凡有四德一體實二遍三常四能生諸法又計有三身一者法身體常周遍量同虗空能生萬物二受用身在色天之上三變化身隨形六道教化衆生瑜伽云彼由現見於因果中世間有情不隨意轉故作此計所以者何現見世間有情於彼因時欲修淨業不遂本心反更為惡於彼果時願生善趣不遂本心反墮惡趣意為受樂不遂所欲反受諸苦由見如是故作是思世間諸物必應別有作者生者及變化者為彼物父謂自在天故此破云彼自在天若能生者是有作法決定非常諸非常者決定不遍諸不遍者決非真實如是便成自語相違體既常遍能作能生及能變化具諸功德應一切處頓生一切法以其遍故應一切時頓生一切法以其常故若自在天更待彼欲及彼衆緣方能生者又有自教相違之過汝計自在一因生故若謂自在遍生諸法即欲與緣亦從自生不藉他者則欲與緣亦應頓起以彼一因常具足故俱舍云謂諸世間若自在等一因生者則應一切俱時而起非次第起現見諸法次第而生故知定非一因所起若執自在隨欲樂故令此法起令此法滅應非自在亦由樂欲差別生故或差別欲應一時生所因自在無差別故若欲差別更待餘因不俱起者則非一切唯用自在一法為因或所待因亦應更待餘因差別方次第生則所待因應無邊際若謂自在欲雖頓生而諸世間不俱起者由隨自在欲所生故理亦不然彼自在欲前位與後無差別故餘執有一大梵時方本際至生一切法皆同此破四四至十有七種外道一執大梵者即圍陀論師計圍陀此云明彼計那羅延天能生四姓此計梵天能生萬物提婆菩薩破外道小乘涅槃論云從那羅延天齊中生大蓮華蓮華之上有梵天祖翁謂梵天為萬物之祖彼梵天作一切命無命物從梵天口生婆羅門兩臂生剎利兩䏶生毗舍兩腳生首陀瑜伽顯揚二論廣破文繁不引二執時者即時散外道執一切物皆從時生是故時是常是一是萬物因是涅槃因廣百論云復次或有執時真實常住以見種等衆緣和合有時生果有時不生時有作用或舒或卷令枝條等隨其榮悴此所說因具有離合由是決定知實有時時所待因都不可見不見因故所以無生以無生故即知無滅無生無滅故復言常廣破如彼論三執方者即方論師計計方生人人生天地滅後還入於方故方是常是一是萬物因是涅槃因故百論云外曰實有方常相有日合處是方相等四執本際者即安茶論師言本際者即過去之初首謂計世間最初唯有大水時有大安茶出生形如雞卵金色後為兩段上為天下為地中生一梵天能作一切有命無命物是故梵天是萬物因亦似此方有計天地之初形如雞子渾沌未分即從此生天地萬物世俗亦有盤古初分天地之說五執自然者即無因論師計一切萬物無因無緣自然生自然滅故此自然是常是萬物因是涅槃因此計一切無染淨因如棘刺自纖烏色非染鶴色自白瑜伽第七云何因緣故彼諸外道起如是見立如是論答謂見世間無有因緣或時欻爾大風卒起於一時間寂然止息或時忽爾暴沙瀰漫於一時間頓即空竭或時爾果木敷榮於一時間颯然衰悴由如是故起無因見立無因論破如彼論此方老莊家言道法自然亦大類此六執虗空者即口力論師謂虗空為萬物因別有一法是實是常是一是萬物因從空生風從風生火從火生暖暖生水水生凍堅作地地生五穀五穀生命命沒還歸空是故虗空為一切萬物因是涅槃因百論亦云外曰應有虗空法亦常亦遍亦無分於一切處一切時信有等故廣如彼破七執我等者等取宿作等為宿作亦是我故宿作論師計一切衆生受苦樂報皆隨往日本業因緣是故若有持戒精進受身心苦能壞本業本業既盡衆苦盡滅衆苦盡滅即得涅槃是故宿作為一切因瑜伽第七云何因緣故彼外道作如是見立如是論答彼見世間雖具正方便而招於苦雖具邪方便而致於樂彼如是思若由現法士夫作用為彼因者彼應顛倒由彼所見非顛倒故是故彼皆以宿作為因由此理故起如是見立如是論廣如彼破涅槃三十五亦廣破此見皆同此破謂同前所立比量以能所受相徵詰則知常住之體能生之用皆如畢竟無耳有餘偏執明論聲常至如瓶衣等待衆緣故五十一十二二宗皆計聲體是常一執明論聲是常不待緣顯一執一切聲皆是常待緣方顯此為異耳明論者據廣百論云古昔黠慧諸婆羅門隱造明書言自然有唯得自誦不許他觀又云諸婆羅門實無所識為活命故於一切時誦諸明論詐現異相以動人心又明論中雖無勝義而有世俗少分禮儀世間貴勝為習學故彼雖無德亦申敬事執明論聲常者當亦是彼婆羅門種以所詮表是實義故能詮表聲亦是常住不知能詮要待所詮然後成立豈是常耶有謂一切聲是常者雖待緣發方有詮表而住是常若無常者雖衆緣集亦不發故不知有常性者決不待緣既待衆緣豈是常耶因立二比量破之明論聲應非常住宗因云許能詮故如所餘聲所餘一切聲亦應非常宗因云待衆緣故如瓶衣等有外道執地水火風至雖是無常而體實有六十三路迦耶論師計色心等法皆極微所作路迦耶此云順世外道計一切色心等法皆用四大極微為因然四大中最精靈者能有緣慮即為心法如色雖皆是大而燈發光餘則不爾故四大中有能緣慮其必無失顯揚第九云由不如實知緣起故計有為先有果集起離散為先有果壞滅由此因緣彼謂從衆微性粗動果生漸析粗物乃至極微住是故粗物無常極微常住喻伽同故此能生云云謂從四大生後還歸大言粗色者即是子微不越因量者因者父母微最初極微名為父母聚生諸色故所生者名曰子微子微雖是無常不越父母故是實有彼亦非理所以者何至如何可說極微常住首句總破所以者何下別破分二先破能生極微分三次破所生粗色分四今初行音杭伍也列也成業論云如樹蟻等行列無過言是形色非顯色也先破極微非實次破極微不生果三破極微非常住立量云所執極微體應非實宗因云有方分故喻如蟻行等又所執極微應不共聚生粗果色宗因云無方分故喻如心心所又所執極微定非常住宗因云能生果故喻如彼所生又所生果不越因量至如粗果色處無別故次破所生粗色分四初破果色不越因量量云汝執所生果應非眼等色根所取宗因云不越因量故喻如極微便違自執又出自語相違之過若謂果色與因量合非粗似粗定是根境者果既同因原是極微因應如果極微亦粗立量破云所執果色無粗德合因云同因量故喻如極微或應極微亦粗德合因云處無別故如粗果色若謂果色遍在自因至由此亦非色根所取二約果如因破先牒轉計自因即極微若謂果色遍在自因之中因體非一可名粗者因體既多果亦應多如多極微處各別故量云所執果色體應非一宗因云處各別故如所在因果既各各別在因中還不成粗色由此果色亦非眼根所取若果多分合故成粗至則汝所執前後相違三約因如果破先牒轉計若謂粗色不由極微以果多分合故成粗者則合多極微亦應不細儘可為五根現量境何用多果合成粗為既粗果色由多分成則是假法而汝謂是有實體者違自教矣又果與因俱有質礙至但是隨情虗妄計度四約因果同處破果與因應不同處是宗因云俱有質礙故喻如二極微若謂果因更相涉入如沙受水藥入鎔銅者誰人許有受水之砂入藥之銅哉設許受入諸分支離不可言一砂銅水藥體各轉變不可言常云何汝執是常是一廣百論云復次為破極微因果同處及顯因體定是無常故說頌曰若因為果壞是因即非常或許果與因二體不同處諸質礙物餘礙逼時若不移處必當變壞如是極微果所侵逼或相受入異體同居如以細流溉粗砂聚或復入中令其轉變如妙藥汁注赤鎔銅若許如前則有諸分既相受入諸分支離如相離物不共生果是則應無一切粗物又若同彼有諸細分即應如彼體是無常若許如後自說極微體有變壞何待徵難若並不許應許極微互相障隔因果別處以有礙物處必不同如非因果諸有礙物又粗色果下重縱奪破若謂因相雖多果體是一者則得一分時應得一切分何以故彼此是一故一即一切故若不許一得一切便違果體是一之理若許一得一切又違彼此各別之事故彼所執妄計而已進退即上許與不許然諸外道品類雖多所執有法不過四種此下總破四執前以九十五種束為十三宗今又束為四種華嚴疏云若計一者則謂因中有果若計異者則謂因中無果三則亦有亦無四則非有非無餘諸異計皆不出此廣百論云一切世間句義名言所表心慧所知情執不同略有四種謂有非有俱許俱非隨次應知配四邪執謂一非一雙許雙非一執有法無有等性至色等應無青黃等異此即因中有果計有法即所造之法有性即能造之性彼執下破勿一切法即有性者事理不可執一取故理雖一而事則殊故量云有法與有等性其體定一是有法體無差別是宗因云一切法即有性故喻如有性既違自教亦違世間又違現量青黃色等現量境故廣百論云數論外道執有等性與諸法一即當有句此執非真所以者何若青等色與色性一應如色性其體皆同又樂等聲與聲性一應如聲性其體皆同香味觸等類亦應爾眼等諸根與根性一應如根性其體皆同應一一根取一切境應一一境對一切根又一切法與有性一應如有性其體皆同又樂苦癡及與思我與有性一應如有性其體皆同是則汝宗所立差別皆不成就故彼所執決定非真二執有法與有等性至應如聲等非眼等境此即因中無果計先敘執彼執下破勿一切法非有性故者事理不可分為二故量云若有法與有等性其體定異是有法體不可得是宗因云一切法非有性故如已滅無既違自教又違世間廣百論云勝論外道說有等性與法非一當非有句此亦非真所以者何若青等色與色性異應如聲等非眼所行聲等亦然聲等性應如色等非耳等境又一切法非有性者應如兔角其體本無是則應同空無我論或同餘道邪見師宗豈不有性非即諸法法雖非有而有有耶所依法無能依豈有又有性上無別有性應不名有所餘諸法雖有有性非有性故其體應無是則一切所立句義皆不得成便同撥無邪見外道故彼所執決定非真三執有法與有等性至而執為實理定不成此即亦有亦無計先敘執彼執下破廣百論云無慚外道執有等性與彼諸法亦一亦異當於亦有亦非有句此亦非真所以者何若有等性與色等一同數論過與色等異同勝論失一異二種性相相違而言體同理不成立一應非一即異故如異異應非異即一故如一一異既不成有非有焉立一異相異而言體同則一切法皆應無異異相既無一相何有一異二相相待立故若謂一法待對不同名一異者即應一異二並非真或隨一假一法二相立相乖違俱言是真必不應理故彼所執決定非真四執有法與有等性至諸有智者勿謬許之此即非有非無計先敘執彼執下破非一異執同異一者言此執與前亦異亦一之執同也以非一即異非異即一故廣百論云邪命外道執有等性與彼諸法非一非異當於非有非非有句此亦非真所以者何若有等性與法非一同勝論過與法非異同數論失又一異相世共知有汝獨撥無違世間失又汝所說非一異言為但是遮為偏有表若偏有表應不雙非如立非一以顯一立一以顯非一謂之表今既雙非復何所表若但是遮應無所執如立非一以遮一立非異以遮異既為遮過而設不得更有所執有遮有表理互相違遮則非表表則非遮無表無遮言成戲論既非遮表徒成謔談汝執諸法性相非空而說雙非但為避過此雙非語亦不應論違汝所宗法性相故若諸法性一一俱非此俱非言亦不應說舉言必有俱非性故是則汝曹應常結舌發言便壞自論所宗默亦不成以俱非故語默俱失一何苦哉誰有智人而不悲愍故彼所執決定非真如是世間四種外道邪論惡見擾壞其心虗妄推尋諸法性相皆不中理競執紛紜於諸法中起四種謗謂有非有雙許雙非增益損減相違戲論是故世間所執非實破外道法執竟餘乘所執離識實有至及諸無為理非有故次破餘乘分二一問答標數二正釋所執今初餘乘於大乘百法中止許七十五法謂色法十一不相應行法十四無為法有三心所法四十六心法唯一共七十五故下破詞於不相應及無為法唯舉彼所執之數破之餘則不舉色十一者有對十無對一有對十者五根五塵彼計極微所成經部師計能成極微是實所成根等是假以實從假眼緣粗色不緣極微薩婆多計能所皆實無對一者謂法處無表色不相應十四者一得二非得三同分四命根五心無定六滅盡定七無想報八生九住十異十一無常十二名身十三句身十四文身薩婆多計不與色心相應皆是實有無為三者一虗空二擇滅三非擇滅薩婆多計離色心等實有自體心所法四十六者大地有十大善地十大煩惱地六大不善地二小煩惱地十不定地八為四十六大地十者一受二想三思四觸五欲六慧七念八作意九勝解十三摩地大善地十者一信二不放逸三輕安四行捨五慚六愧七無貪八無嗔九不害十勤大煩惱地六者一癡二放逸三懈怠四不信五沉六掉舉大不善地二者一無慚二無愧小煩惱地十者一忿二覆三慳四嫉五惱六害七恨八諂九誑十憍不定地八者一貪二嗔三慢四疑五睡眠六惡作七尋八伺或問小乘執法理在不疑既悟我空何有執我答此說宗徒非預聖者至如我等宗大乘教豈能皆悟法空理耶且所執色總有二種至二者無對非極微成二正破所執依數分三一色法分二一正舉二正釋三一正舉分二一標數對者礙也二色相對互相窒礙如木與石互相繫時體不相過互對礙住名有對義集論云謂有見者皆是有對又三因故說名有對謂種類故積集故不修治故種類者謂諸法互為能礙互為所礙積集者謂極微已上不修治者謂非三摩地自在轉色又損處依處是有對義無對反此有對色者即五根五塵十種色無對色者法處攝色據大乘教亦有五種一極略色二極逈色三受所引色四遍計所執色五定果色一極略色者以極微為體但是析彼五根五塵四大定果色至極微位即此極微便是極略色體二極迥色者即空間六般光影明暗等粗色令析此六般粗色至極微位取此細色為極迥色體又若上下空界所見青黃赤白光影明暗即總名空一顯色及門窗孔隙中所現者即總名迥色三受所引色者受者是領納義所引色者即思種現上有防發功能名所引色意云由於師教處領受為能引發起思種現上防發功能名所引色即此防發功能不能表示他故亦名無表色即以無表色為體四遍計色者即妄心遍計執色為實從所得色以得其名五定果色者定中現境即如有人作水觀外人不見人惟見水之類已上五般法處色總分三門一影像門二無表門三定果門一影像門者影者流類義像者相似義即所變相分是本質之流類又與本質相似故名影像即極略極迥二色此但是觀心析塵色至色邊際假立極微唯有觀心影像都無實體散位獨頭意識緣五根五塵水月鏡像時當情變起遍計影像相分此是假非實故與極略等同立一影像門問且如水中月鏡中像眼識亦緣如何言假唯意識緣答水月鏡像唯是法境但以水鏡為緣其意識便妄計有月有像並非眼識之境亦是遍計色收又遍計是妄心極略等是觀心同是假影像故所以總立第二無表門一律儀有表色者即師前受戒時是由此表色故方熏得善思種子有防發功能立無表色二不律儀有表色者即正下刀殺生造業時是由此有表色方熏得不善思種子有防發功能立無表色若處中有表色者即正禮佛行道及毆擊罵詈時是由此無表色方熏得善惡思種亦有防發功能立無表色餘詳本條彼有對色定非實有能成極微非實有故二正釋分二一破有對色但破能成則所成不立此總句廣如下破謂諸極微若有質礙至如何可集成瓶衣等先約質礙破量云極微是有法是假非實宗因云有質礙故喻如瓶等又諸極微如何可集成瓶衣等是宗因云無質礙故喻如非色又諸極微若有方分至故有對色實有不成後約方分破方謂方隅分謂分位謂此極微若有方分便可分析既可分析便非實有若無方分則此極微不屬色法云何和合以成粗色而能承光發影耶廣百論頌云微若有東方必有東方分極微若有分如何是極微論曰是諸極微既有質礙日輪才舉舒光觸時東西兩邊光影各現逐日光移隨光影轉承光發影處既不同故知極微定有方分既有方分便失極微如是極微即可分折應如粗物非實非常違汝論宗極微無方分常住實有造世間萬物又佛性論破云為當一塵中有六方不若有六方即成六分若無六方非謂為色既有六分即可分折若有方無分是則六塵共入一塵無量諸塵並應如是則無成大義又如一塵日光照時為照一邊為東西俱達若唯照一邊則有六分若東西俱達色則非有故知方分不實悉併是空皆可與此互相發也觸壁等足上承光發影之義和合物即壁等日光在東決不在西物影在西決不在東既柱壁等即諸極微故此極微定有方分又諸極微隨處必有方隅差別若不爾者便無共相和集之義若言衆微更相涉入無方分者則應塵塵涉入無礙是名如來殊勝妙色不成世間質礙粗相故知極微定有方分汝執有對即色極微若無方分則山川壁石皆可直入更無障隔若爾即是果位聖人所證之色決非世間障礙有對凡色可比是故極微必有方分展轉救釋竟成就一有方分義故有對色皆可分析而執為實有者其義不成五識豈無所依緣色至自識所變為所緣緣此顯正義外人問言五識所依所緣必有實色若有對非實則五識遂無所緣緣耶論主答云眼等雖有所依所緣之色而是識所變現非是心外別有極微以成根境但八識生時內因緣種子力等第八識變似五根五塵眼等五識依彼所變根緣彼本質塵境雖親不得要託彼生實於本識色塵之上變作五塵相現即以彼五根為所依以彼及彼二種五塵為所緣緣五識若不託第八所變便無所緣緣所緣緣中有親疏故然眼等下先明依色等五塵世間共見現量所得眼等五根非現量得除第八識緣及如來等緣是現量得世不共信餘散心中無現量得此但能有發識之用比知是有此但有功能非是心外別有大種所造之色此功能言即是發生五識作用觀用知體如觀生芽比知種體是有問云何而知色是內識所變曰外有對色以理推徵既不成就當知定是內識所變問既眼等是識所變何故眼等名根又名所依曰以能引發眼等識故名眼等根即以此根為俱有依生眼等識故又名所依也此眼等識下後明緣此眼等識外所緣緣理既非有應許自識所變為所緣緣言應許者是大乘自許以小乘但許離眼識本質色不許不離眼識相分色故大乘以自許言簡則免隨他一分不極成過謂能引生似自識者至勿第二月等能生五識故此破和合也經部師以外和合色亦能引生似自識相可作眼等識所緣緣故觀所緣緣論云或執和合以識生時帶彼相故非但能生者謂能緣識帶彼相起及有實體令能緣識託彼而生具此二支名所緣緣不但以能生一支便可名所緣緣也若以能生一支名為所緣緣者則因緣等無間緣增上緣皆有能生一義皆可名為所緣緣而四緣混濫無別矣勿者猶言莫得也和合與和集不同和合即金剛經所謂一合相如男女天地等以衆緣合故攬衆微以成於色合五陰以成於人名一合相其瓶甌等名和集相或謂和合即和集以瓶甌為和合皆非也眼等五識了色等時但緣和合似色之相此和合相非離極微有實自體能生識者既無實體則所生之識何自而有哉故和合相於眼等識縱作所緣且無緣義若有緣義莫得錯亂眼所見第二月亦能生五識耶立量云汝和合粗色是有法設為眼識所緣非緣宗因云汝執假色無體故喻如第二月非諸極微共和合位至色等極微非五識境此破和合中極微也正量部救云和合粗色雖則是假而有能成一一極微此是實有各得為緣能生五識故此破云非諸極微共和合位可與五識各作所緣以眼等識上不帶極微相故猶如眼識不帶眼根相其眼等五根但能生眼等五識然眼等五識即不能緣眼等五根將根為喻立量云汝和合色等能成極微是有法設為五識緣非所緣宗因云五識生時不帶彼相故同喻如五根非諸下明極微上無和合相文顯可知以無和合相故即越諸根境縱許為緣不為所緣有執色等一一極微至況無識外真實極微此破極微中和集相也據集論說和合聚集二相不同和合者謂極微已上一切有方分色更互和合如濁水中一地水極微更互和合聚集者謂方分聚色展轉集會如二泥團相擊成聚若水和砂必不成聚以水和土即成泥團可作瓶等可見水土一一極微各各具有和集之相不和集時無相可見非五識境共和集位展轉集會有粗相生此和集相與極微俱乃是實有以大乘縱許極微實有故既帶彼相又能生識此乃雙支皆是有故可與五識為所緣緣此外計意也彼執下破共和集位與未集時極微之體和集之相無差別故還是極微不成所緣故觀所緣緣論云和集如堅等設於眼等識是緣非所緣許極微相故如堅等相雖是實有於眼等識容有緣義而非所緣眼等識上無彼相故色等極微諸和集相理亦應爾彼俱執為極微相故瓶甌等物下破轉計彼遮體相是一之難計有別相能生識故如瓶甌等差別可見為所緣緣故彼論云執眼等識能緣極微諸和集相復有別生瓶甌等覺相彼執應無別非形別故別形別非實故瓶甌等物大小等者能成極微多少同故緣彼覺相應無差別若謂彼形物相別故覺相別者理亦不然項等別形惟在瓶等假法上有非極微故彼不應執極微亦有差別形相所以者何極微量等故形別唯在假析彼至極微彼覺定捨故非瓶甌等能成極微有形量別捨微圓相故知別形在假非實又形別物析至極微彼覺定捨非青等物析至極微彼覺可捨由此形別唯世俗有非如青等亦在實物微圓相者極微自相各各圓滿不外假而足者也粗相即和合色處所攝是五識境細相即極微法處所攝是意識境若粗相識可緣細相境則色境識亦可緣聲境而一識可緣一切境矣即與世間現見共知事理相違成大過失許有極微尚致如此況汝所執心外極微如龜毛等本非實有而可作五識所緣緣哉由此定知自識所變至皆識變現非極微成結成五識正所緣緣義觀所緣緣論頌云內色如外現為識所緣緣許彼相在識及能生識故內色即相分色外境即本質色且如眼根對色塵時即眼識自證分現行從自種而生變似二分其所變見分說名眼識其所變相分似外境現說名眼境為所緣緣是依他性有體法故不緣心外所執無法故見託彼生者謂能緣見分託彼實體而生即是緣義然心起時帶彼相起名為所緣別行鈔云所緣緣者謂是心之所慮處故名為所緣只此所緣境又有牽心令生是心之所託故復說名緣即所緣為緣名所緣緣緣是體所緣是用所緣即緣持業釋也然此內識變色之時隨本質色量之大小一時頓現大小相分非別變作衆多極微然後和合成一相分也所以有此極微名者為世間執粗色實有佛愍其愚故說極微令其除析以入空觀耳豈謂諸色有實極微哉雜集論云當知此中極微無體無實無性唯假建立展轉分析無限量故但由覺慧漸漸分析細分損滅乃至可析邊際即約此際建立極微問若諸極微無實體性何故建立答為遣一合想故若以覺慧分分分析所有諸色爾時妄執一切諸色為一合想即便捨離由此順入數取趣無我性故又為悟入諸所有色非真實故若以覺慧如是分析所有諸色至無所有爾時便能悟入諸色皆非真實因此悟入唯識道理由此順入諸法無我性故由此下總結餘無對色是此類故至而可說為真實色法次破無對色此類此字指極微言既名無對即無色相色法不成心法何異彼有對色以理破除識外尚無而況無對乎量云無對色是有法定非實色是宗因云極微類故許無對故喻如心心所表無表色豈非實有至假名語表於理無違次傍問分二先破表色後破無表色今初有所表示故名有表由動發勝思發動身語恭敬乞願令知所為名為有表防發功能自他不知無表示相名為無表無表色即受所引色前已具明外有對色可非實有表無表色現有表示防發功能豈非實有此問意也且身表下答破先破有宗計形有宗云身表許別形故形為身表如合掌等許有別形形即是表表善惡故表即是業此之形色依身起故名為身業論主破云若言是形便非實有形是長短方圓假色依多顯色假立長等若分析時長等極微不可得故次破正量部計動彼執動名身表以身動時由業動故論主破云若言是動亦非實有行動之時即是有為一切有為皆有剎那才得自體從此無間必滅歸無若此處生即此處滅無容從此轉至餘方豈有動義有為法滅不待因者俱舍云待因謂果滅無非果故不待因滅既不待因才生已即滅若初不滅後亦應然以後與初有性等故既後有盡知前有滅廣如彼論次復破有宗轉計彼計云別有一色名身表業既非青黃明暗顯色亦非長短方圓形色是心力大發動勝思引生此色能令手等合掌曲跽屈伸取捨即以此色為身表業論主破云此亦不然此引生色以何為性若言以動為性其失已破如前若言動因為性動因即是風界風非表色觸身而知觸唯無記不通善惡云何成業俱舍論說身表唯通善不善性不通無記以無記心勢力微劣不能引發諸強業故非顯之風既是無記非身表色非顯香味亦屬無記亦非身表類觸應知故身表業定非實有然則此業何由而起由是內心能轉變故令第八識所變手等作善作惡因生果滅因滅果生相續不斷轉趣餘方似有動作表示此心故名身表豈離識外別有一法名身表哉語表亦非實有聲性者以教中言名等是假聲是實故然名等即多剎那聲集成一字集多字為所依次能成名詮諸法體多名以後方成句身詮法差別仁王護國般若經云九十剎那為一念一念中一剎那經九百生滅從唯臍等七處一剎那間出此聲相念念滅故後聲非前聲故無詮表若云後後剎那續前前故為詮表者此亦不然後念生時若與前念為住相者生相應無亦無有滅而今現見生滅相續故知後念非前念故曰多念相續便非實故此言語者既屬聲相便屬有對外有對色前已破故然因下出正義識變似聲謂第八所變影像聲聲雖念念滅而能集成名句文身故似有表示此二正義但約心變即異小乘表既實無無表寧實至現行思立故是假有次明無表色毗婆沙師經部師執無表實有歷引契經為證詳見俱舍故此破云有表尚虗無表寧實然契經說無表色者依他分位假施設故無表有二一律儀有表色即從師受戒時是由此有表色方熏得善思種子有防惡發善功能立無表色一不律儀有表色即正下刀殺生時是由此有表色方熏得不善思種子有防善發惡功能立無表色故曰依思願善惡分限假立無表此似兼善惡說下依勝身語乃是就善一邊說善是所發惡是所防故曰善惡思種問無表色以何為體答受戒之後思種之上防惡發善功能為體問思有多種謂審慮決定動發思何思種子有此功能答於三思中取上品者初念所熏種上有此功能何以故初念所熏為無表依故問何唯初念所熏之種為無表依餘後念種不立為依皆上品故答如世皇儲立一餘非問防發功能從何時有答從第三番羯磨竟時防發功能任運增長從彼時有問此功能何時萎歇答犯捨以後及成佛時可爾萎歇問成佛已後如何萎歇答如瓶滿更不受添所以歇也問戒有幾種答總有三種謂別解脫戒定俱戒道俱戒別解脫者從師受戒別別防非名別解脫定俱者入定之時便有一分防發功能名定俱戒道俱者聖道起時亦能防發聖道即是無漏智也問此等戒法以何為體答別解脫戒思種為體問皆說防發功能為戒何故却取思及種子答既出體性須取功能所依實體問定道俱戒既依現思應自表知何名無表答現思之上防發功能豈得自知問佛戒萎歇佛應無戒且無防發何用戒為答防發功能雖不增長戒體仍存如君子帶劒亦何傷理世尊經中說有三業至唯有內識變似色生小乘引經問言世尊經中說有身口意三業今撥身語業是假有豈不違經論主答云非撥身語是無但言身語非是汝等所執實色能動身思至說名意業此出三業體業即是思思即是識以顯三業唯識非色之義思有三種一審慮思二決定思三動發思以動發思能動身發語與身語相應名身語業審慮決定二思唯與意識相應由彼意念一動之後審慮決定然後能動身發語故名意業俱舍論說二種時一籌量時二作業時籌量時唯是審慮一種思其決定動發二思俱屬作業時以雖在意地未有決定未成業道故非作業是籌量也然動發思正起身語作善作惡說善說惡是二業體說名為業亦是審慮決定二思所遊履處通生苦樂異熟果故亦名為道故知不獨身語為業為業道即意亦名為業為業道不唯意業思為自性即前身三口四皆以思為自性也七業道即身三口四身表語表皆是內思之所發故假說為業思所遊履說名業道俱舍云十業道中後三唯道業之道故立業道名彼相應思說名為業彼轉故轉彼行故行如彼勢力而造作故前七是業身語業故亦業之道思所遊故由能等起身語業思託身語業為境轉故有業之道立業道名譬喻論師執貪瞋等即是意業依何意釋彼名業道應問彼師然亦可言彼是意業惡趣道故立業道名或互相乘皆名業道是則有表無表同歸無色唯有內識變現似色爾通上一色法竟不相應行亦非實有至如餘假法非實有體二不相應行分二先總破得等非能緣故不與心心所相應非質礙故不與色相應有生滅故不與無為相應故曰不相應行二十四法中小乘唯許十四下束為六段破之所以者何徵釋非實義此十四法雖曰不與色心相應然依色心分位段立不如色心心所實有體相亦非異色心心所別有作用由此應知定非實有顯揚十八云當知心不相應行皆是假有假有之性略有六種云何為六謂若事能起六種言論何等名為六種言論一屬主相應言論二遠離此彼言論三衆共施設言論四衆法聚集言論五不遍一切言論六非常言論廣如彼釋此定非下以非異色心心所有實體用為宗宗立三比量許蘊攝故因如色心等喻或心心所及色無為所不攝故因如畢竟無喻或餘實法所不攝故因如餘假法喻許蘊攝者頌曰色攝十一全受想各當一七十三行蘊八王識蘊收謂五根六塵皆屬色蘊故云色攝十一全遍行中受自當受蘊想當想蘊故曰受想各當一五十一心所二十四不相應總有七十五法除受想二有七十三此等皆是遷流造作故行蘊攝故曰七十三行蘊八識心王皆是識故皆識蘊攝故曰八王識蘊收是故五蘊攝前九十四法唯除無為今得等法既許行蘊所攝則安得異色心等有實體用哉又既不與色心無為相應又非真如實際等實法則亦龜毛兔角等耳且彼如何知得非得至現在必有善種等故二別破分七一破得非得得者謂於善不善無記法若增若減假立獲得成就非得者一名異生性謂於聖法不得假立異生性且彼如何知得非得異色心等有實體用論主問也契經下外人答也經不說此下論主辨破梵語補特伽羅此云數取趣謂數數造業取善惡趣即異生性也十無學法謂正語正業正命正念正定正見正思惟正精進正解脫正智為第七十二解脫道時證五分法身立阿羅漢果名無學位戒定慧解脫解脫知見五分能攝十法故名十無學法異生成就善惡不成就聖法聖者成就聖法不成就煩惱凡聖各有成不成則互有得不得矣此外計也經不說下論主辨破俱舍云諸有為法若有墮在自相續中有得非得非他相續無有成就他身法故非非相續無有成就非情法故如汝所言則諸非情及他相續亦應成就所以者何契經說故如契經說苾芻當知有轉輪王成就七寶乃至廣說象寶馬寶如寶主藏臣寶主兵臣寶皆屬他身輪寶摩尼珠寶皆屬非情故曰豈即成就他身非情若謂輪王於七寶有自在業力應念而有假說成就者則前所引善惡等法何不許其有自在業力假說成就而執為實得乎若謂七寶現在有故可假說成而善惡不然者誰知善惡法亦不離現在有也何也現在之外無實法也縱不起現行而種子常存也又得於法有何勝用至得實無故非得亦無上明得無實體此明得無實用若此得是諸行生因有能生用則應現在有情具此得者於有為生滅法中應起不生不滅無為之法從來一切無情之法此既無有生因之得應永不生何俱不然已失者過去也未得者未來也言俱生者揀前後生法若過去得亦過去法若未來得亦未來法若現在得亦現在為俱生得此唯無記勢力劣故無前後生不通善惡俱舍云若謂此得亦有作用謂作所得諸法生因是則無為應無有得又所得法未得已捨界地轉易及離染故彼現無得當云何生若俱生得為生因者則汝所執生與生生復何所作又具縛者下中上品煩惱現起差別應無得無別故若由餘因有差別者即應由彼諸法得生得復何用此以上俱舍本文若謂得是諸法不失之因有情由此成就諸法者則諸可成法不離有情若離有情實不可得汝等云何執離色心有得等耶以諸有情即色心故故得於法俱為無用結破得有勝用義得實無故二句牒無得義例破非得然依有情可成諸法至於諸聖法未成就故此得非得正義種子業因也自在業力也現行業果也集論云何等種子成就謂若生欲界色無色界繫煩惱隨煩惱由種子成就故成就及生得善若生色界欲界繫煩惱隨煩惱由種子成就故成就亦名不成就色無色界繫煩惱隨煩惱由種子成就故成就及生得善若生無色界欲界色界繫煩惱隨煩惱由種子成就故成就亦名不成就無色界繫煩惱隨煩惱由種子成就故成就及生得善若已得三界對治道隨如是如是品類對治已生如此如此品類由種子成就得不成就隨如是如是品類對治未生如此如此品類由種子成就故成就何等自在成就謂諸加行善法若世出世靜慮解脫三摩地三摩鉢底等功德及一分無記法由自在成就故成就何等現行成就謂諸蘊界處法隨所現前若善若不善若無記彼由現行成就故成就若已斷善者所有善法由種子成就故成就亦名不成就若非涅槃法一闡底迦究竟成就雜染諸法由闕解脫因亦名阿顛底迦以彼解脫得因畢竟不成就故於成就善巧得何勝利能善了知諸法增減知增減故於世興衰離決定想乃至能斷若愛若恚俱舍云言生得善者不由功力修得故加行善者要由功力修得不由功力修得者若所依中種未被損名為成就種已被損名不成就謂斷善者由邪見力損所依中善根種子應知名斷非所依中善根種子畢竟被害說名為斷要由功力而修得者若所依中彼法已起生彼功力自在無損說名成就與此相違名不成就如是二種亦假非實故所依中唯有種子未拔未損增長自在於如是位立成就名無有別物此類雖多下結成非得義見所斷種即分別惑斷此惑故成就聖法若未永害非聖性法名異生性異生即六趣衆生也復如何知異色心等至分位差別假立同分二破衆同分集論云何等衆同分謂如是如是有情於種種類自體相似假立衆同分於種種類者於人天等種種差別於自體相似者於一種類性首句論主問也契經說故下小乘答也外執同分有實體者略有二師勝論執有總同句義於一切法總同言智由此發生彼復執有同異句義於異品類同異言智於此發生毗婆沙師所執與此義類不同以說一物於多轉故又縱於彼若顯不顯然此同分必有實物契經說故如世尊言若還來此得人同分乃至廣說此經不說下論主總破若同智言下展轉辨破俱舍敘外執云若無實物無差別相名同分者展轉差別諸有情中有情有情等無差別覺及施設不應得有覺即同智施設即同言故此破云若同智言因斯起故知實有者則草木等應有同分以不許有無情同分故故俱舍云又何因不許有無情同分諸穀麥豆金鐵菴羅半娜娑等亦有自類互相似故又同分既能起同智言亦應能起別同分如是展轉成無窮過若不許起別同分云何許起同智言耶故俱舍云又諸同分展轉差別如何於彼更無同分而起無別覺施設耶若謂同分為因而起同事同欲故知同分是實有者理亦不然事即身業欲即意業如殺生者望殺生者乃至諸邪見者望邪見者離殺生者望離殺生者乃至正見者望正見者皆名同事欲此皆前生習氣為因故今生起如是業豈實有殺生等同分然後起耶然依有情下出正義謂依於彼彼處受生有情同界同趣同生同類位性形等由彼彼分互相似性假立同分身心即應上事欲也復如何知異色心等至住時決定假立命根三破命根集論云何等命根謂於衆同分先業所感住時決定假立壽命衆同分者於一生中諸蘊相續住時決定者劑爾所時令衆同分常得安住或經百年千年等由業所引功能差別又依業所引第八識種令色心不斷名為命根此是正義餘乘於識暖外別執壽為命根死此生彼以為實有如世人以命盡為死詳見俱舍首句論主問也契經說故下小乘答也此經不說下論主總破又先已成下展轉辨破先已成者前所論過也先已成立離識無色何執離識有別命根乎若命根離識有則應如受等剎那生滅非實命根矣量云汝所執命根是有法非實命根是宗因云異識實有故喻如受等小乘問云既離識外無別命根只應說識云何經說壽暖識三論主答云雖是一識義別說三謂阿賴耶識相分色法身根所得名暖此識之種名壽以能持識故現行識是識故言三法義別說之非謂別有體性是則身捨暖時有餘二不必捨如無色界生如餘二捨時暖必隨捨然今此生約義別說但是一體如四正斷即四正勤也未生善令速生起已生善令其增長未生惡令彼不生已生惡令速除滅斷就惡言勤就善言義雖有四但是一精進數故以為喻問既壽暖不異識者住無心位既無有識壽暖應無何故此身不即壞爛答豈不經說識不離身無心位中身雖捨暖不捨壽識故身不壞如無色界餘二不捨既爾如何名無心位小乘問也論主答云彼滅轉識故名無心非無第八下文二定及三卷引滅定有心廣明此義此識下結成前義謂唯此本識足為三界五趣受果之體無勞別執離識之外有實命根然依親生下出正義言此者簡親生餘識種子言識者簡相應法種唯取識故言種者簡現行不取第八現行為命根故彼所簡者皆非命根今取親生之名言種上由先世業所引持身差別功能令色心等住時決定依此功能說為命根非取生現行識義以此種子為業力故有持一報之身功能差別令得決定若此種子無此功能身便爛壞阿賴耶識現行由此種故能緣及任持於眼等法亦名能持此種正能持於現行之識若不爾者現行之識應不得有及無能持餘根等法由此功能故識持於身現行內種力故生及緣持法不名命根非根本故由種生故此種不由現行有故種為諸法之根本故又現行識是所持故從所持說能持種識為命根命根之法持體非命根令六處住時決定故故種子為命根餘現行色心等非命根不恆續故非業所引故然業正牽時唯牽此種子種子方能造生現行非謂現行名命根故唯種是根又夫命根者依心假立命為能依心為所依生法師云焚薪之火旋之成輪輪必攬火而成照情亦如之必資心成用也命之依心如情之依心矣復如何知二無心定至故此三法亦非實有四破無心定滅盡定無想異熟無心定者謂已離淨欲未離上地欲由於無想天起出離想雜集論云於不恆行心心所滅假立無想定不恆行者轉識所攝滅者謂定心所引不恆現行諸心心所暫時間滅滅盡定者謂已離無所有處欲或入非想非非想處定又云欲超過有頂作止息想作意為先故於不恆行諸心心所及恆行一分心心所滅假立滅盡定此中所以不言未離上欲者為顯離有頂欲阿羅漢等亦得此定故一分恆行者謂染污意所攝無想天者謂於此間得無想定由此後生無想有情天中於不恆行心心所滅假立無想異熟首句論主問若無實性下小乘答意謂此三若無實性何以能遮心心所法令不得起由此二定能遮未來諸心心所暫不起故若無心位下論主辨破若有實法遮心不起名無心定則亦應有實法礙色不起名無色定既不許色由礙無云何執遮心是實如堤塘是假亦能遮水何須實法乃能遮心乎謂修定時下出正義定加行者定前方便也粗動心者前六轉識也不言第七者以二定同釋唯就無想義故勝期願者勝願心起期生靜慮願力漸增粗動漸細由細入微微而又微以此微心熏蒸第八成極增上厭心種子損伏粗動心心所種粗動心等亦不現行依此心心所現行伏滅分位假立二種定名種通善性故此二定俱名為善無想定前下別顯無想異熟正義謂修定時求彼天果熏成種子招彼天異熟受彼天果報故俱舍云此法一向是異熟果誰之異熟問謂無想定答無想有情居在何處問居在廣果謂廣果天中有高勝處如中間靜慮名無想天答彼為恆無想為亦有想耶問生死位中多時有想言無想者由彼有情中間長時想不起故如契經說彼諸有情由想起故從彼處歿然彼有情如久睡覺還起於想從彼歿已必生欲界非餘處所先修定行勢力盡故於彼不能更修定故如箭射空力盡便墮若諸有情應生彼處必有欲界順後受業如應生彼北俱盧洲必定應有生天之業故此下總結三法非實
