body:
  text: 金壇居士王肯堂證義復如何知諸有為相至是故四相皆是假立五破三有為俱舍論頌曰相謂諸有為生住異滅性釋曰由此四種是有為相法若有此應是有為與此相違是無為法此於諸法能起名生能安名住能衰名異能壞名滅性是體義豈不經說有三有為之有為相於此經中應說有四不說者何所謂住相然經說住異是此異別名如生名起滅名為盡如是應知異名住異若法全行三世遷流此經說為有為之相令諸有情生厭畏故謂彼諸行生力所遷令從未來流入現在異及滅相力所遷迫令從現在流入過去令其衰異及壞滅故傳說如有人處稠林有三怨敵欲為損害一從稠林牽之令出一衰其力一壞命根三相於行應知亦爾住於彼行攝受安立甞樂與彼不相捨離故不立在有為相中又無為法有自相住住相濫彼故經不說先大乘問次餘乘答此經下大乘破先總斥非第六聲下次別破別破又分三初約能所破第六聲即八轉聲中第六屬聲也俱舍云生相若無應無生覺又第六轉言不應成謂色之生受之生等此外計也又云是故生等唯假建立無別實物為了諸行本無今有假立為生如是本無今有生相依色等法種類眾多為簡所餘說第六轉言色之生受之生等為令他知此生唯色非餘受等餘例亦然如世間說旃檀者香石子之體此亦應爾如是住等隨應當知此彼論破詞也此中破意謂非第六屬聲便表生等離色等外有實自體以色受等之生住滅即色受等五蘊攝故生等為能相色等為所相非生等相異色等相不可說言堅相異地相濕相異水相故若有為體異有為相者則無為體應異無為相今無為體不異無為相則有為體亦豈異有為相哉又生等相下二約體用破謂若生等三俱有實體者應一切時齊興作用則一法一時有生住滅更互相違成大過失世間不見一法一時有生住滅唯見異法異時有三故若以用相違故無頓興之理者則體亦相違如何俱有便有自語相違之過又住異滅互相違反用不應俱而能所相不待因緣體俱本有體既如此用亦應然體用不容有二性故若謂體雖本有不待因緣而用非本有必待因緣和合而有者所待因緣從外來故定非本有所待既爾能待亦然又汝既許從因緣生又執生等復何所用若謂諸有為法是恒有故而與生滅相合則應無為法亦是恒有亦有生滅何以故有為無為同一因故立量云三有為法與生等合所相恒有故如三無為三無為法與生等合所相恒有故如三有為今既不同無為則有為所相定非恒有所相尚非恒有況能相生滅而實有哉又去來世下三約三世破為彼宗執生在未來現在已生不更生故過去已滅都無生用故以來同去破之過去已滅未來未生已滅非常未生非現體如空華無實有性量云去來世非實有性宗因云非現非常故喻如空華生即已生非同未生豈在未來滅即已滅非同未滅應非現在若以滅為非無應以生為非有又滅無住有二相相違生與住俱屬現有相不相違今彼以過現為一起未來為一起滅屬過去住屬現在生屬未來則滅與住同時而住與生異世矣豈理也哉進退之詳具廣百論然有為法仗因托緣而得生起故一切法緣合則生緣散則滅表異無為假立四相非謂實有瑜伽問云若有為法生住異滅四有為相具足可得何故世尊但說三種答由一切行三世所顯故從未來世本無而生是故世尊由未來世於有為法說生有為相彼既生已落謝過去是故世尊由過去世於有為法說滅有為相現在世法二相所顯唯現在世有住可得前後變異亦唯現在是故世尊由現在世於有為法總說住異為一有為相前三有故四句揀異小乘生在未來餘三現在如何無法與有為相難也表此後無為相何失總答也餘乘問後一既是無法如何亦預有為相中故答云表此現在生住異法後定是無為有為相有何過失且此四相各有所表無而忽有故以生表有而後無故以滅表變易不常故以異表蹔時有用故以住表此在有為雖俱名表而所表相各各有異此依剎那念念不停假立四相非約三世若約一期生死果報始終分位亦有四相初出胎時名生命終名滅生已或二三十年或七八十年只是此身相續不斷名住自少而壯自壯而老遷變不同名異故俱舍云無始以來色等諸法名言熏習種類不同及先所造諸有趣業種種差別功能轉變隨所遇緣成熟發起變生色等生等差別所言緣者謂精血等是其生緣衣食定等是其住緣毒藥災橫四大亂等是其滅緣是故四相皆是假立總結也復如何知異色心等至香味等假立三故六破名句文身瑜伽論云云何名身謂依諸法自性施設自相施設由徧分別為隨言說唯建立想是謂名身云何向身謂即依彼自相施設所有諸法差別施設建立功德過失雜染清淨戲論是謂句身云何文身謂名身句身所依止性所有字身是謂文身又於一切所知所詮事中極略想是文若中是名若廣是句若唯依文但可了達音韻而已不能了達所有事義若依止名便能了達彼彼諸法自性自相亦能了達所有音韻不能了達所揀法深廣差別若依止句當知一切皆能了達復如何知異色心等有實詮表名句文身論主問也契經說故如契經說佛得希有名句文身小乘答也此經不說異色心等有實名等為證不成論主總破若名句文異聲實有下論主廣破據俱舍論等經部師言名句文身用聲為體色自性攝所以者何由教及理知別有故教謂經言語身文身若文即語別說何為又說應持正法文句又言依義不依於文等由此等教證知別有能詮諸義名句文身猶如語聲實而非假理謂現見有時得聲而不得字有時得字而不得聲故知體別有時得聲不得字者謂雖聞聲而不了義現見有人麤聞他語而復審問汝何所言此聞語聲不了義者都由未達所發文故如何乃執文不異聲有時得字不得聲者謂不聞聲而得了義現見有人不聞他語覩唇等動知其所說此不聞聲得了義者都由己達所發文故由斯理證文必異聲等廣如彼說薩婆多亦有名由聲生名由聲顯二義故論主取生破顯云若名句文異聲實有則名句文同色香味非實能詮以離聲無別能詮故量云名句文身非實能詮異聲實有故喻如色等若謂聲能生名句文者此聲必有音韻屈曲此已足成能詮何用名等為耶正理師救云聲上屈曲是名句文體異於聲而是實有故論主破云若謂聲上音韻屈曲即名句文異聲實有名能詮者則所見色上形量屈曲亦應異色處別有實體亦名能詮若謂聲上音韻屈曲如絃管聲非能詮者則此語聲音韻屈曲亦應如絃管聲不能詮表不能別生名等矣彼又難云誰說彼絃管聲定不能詮乎論主答云聲若能詮則應現前風鈴聲等皆有詮用今此語聲與風鈴聲等無詮表不別生實名句文身故知語聲非實能詮若唯語聲能生名等而風鈴聲等不能者如何不許唯語能詮而謂絃管聲亦能詮耶外人問云若一切外聲皆非能詮據何道理定知能詮即是言語寧知非語亦有能詮論主答云語為能詮人天共了者謂人與天俱用語言有詮表用為欲界以音聲為佛事故天愛非餘者或有天中不用語為能詮如光明說法天鼓說法之類唯是色界光音以上等天不通下界故曰非餘今固人也而天語乎次假外問云既聲體即是能詮何有名等三種差別故論主申正義云然依語聲分位差別等於中有四從初至假建立名句文身一顯假差別此論主解依聲建立名句文身如梵音斫蒭此翻眼若但言斫唯言蒭未有所目說為字分位若二連合能詮法體詮於眼體說為名分位然未有句位更添言阿薩利縛名為眼有漏說為句位故依分位以立名等依一切位非自在故外又問曰何者是分位差別故答云名詮自性至為二所依二顯三用殊名詮諸法自性句詮諸法差別文即是字為名句之所依不能詮自性及差別故文者彰義與二為依彰義二故又名為顯與二為依能顯義故而體非顯字者無改轉義是其字體文是功能功能即體故言文即是字等或字為初首即多剎那聲集成一字集多字為所依次能成名詮諸法體多名已後方成句身詮法差別即雜集論云自性差別及此二言如是三法總攝一切彼二言者即是字也字即語故說之為言名句二種所依止之言也瑜伽論云名於自性施設句於差別施設名句所依止性說之為字又顯揚言句必有名名不必有句名必有字字不必有名等此三離聲至亦不即聲三明不即不離論主答難謂先有問言上來雖言名等即聲若名等是不相應行者色上屈曲非不相應聲何故爾故此答曰此三離聲雖無別體而名等是假聲是實有假實異故故名等三非即是聲非聲處攝但是差別之聲義說名等以詮義故是不相應無別種子生故言即聲外人問言若名等即聲法詞二無礙解境有何別故論答云由此法詞至亦各有異即緣此故二境有異法無礙解緣假名等詞無礙解緣實聲等故說境差別非二俱緣實雖二自性互不相離法對所詮故但取名詞多對機故但說聲耳聞聲已竟了義故以所對不同說二有異非體有異也又此二境及名等三與聲別者蘊處界攝亦有異故色蘊聲處聲界唯屬於聲行蘊法處法界屬名句文問曰聲上屈曲假即言不相應色上屈曲假應非色處攝答云聲上有教名等不相應色上無教故是色處攝又問云聲上有屈曲即以為教色上有屈曲亦應得為教故論主答云且依此土說名句文至假立三故四會相違謂且依此土依聲假立名句文身非謂一切界土亦依聲立問曰餘界土中依何立耶答云諸餘佛土亦依光明妙香味等假立名句文身以彼見聞覺知光明香味能了義故此所引即維摩詰所說經而言等者等取觸思取等上皆得假立名等三種亦是不相應攝此三法故以眾生機欲對待故假又梵云便善那此有四義一者扇二相好三根形四味此即是鹽能顯諸物中味故味即是文如言文義巧妙等目之為便善那此中四義總是一顯義故古德說名為味對法論云此文名顯能顯彼義故為名句所依能顯義故惡察那是字是無改轉義如對法說鉢陀是迹如尋象迹以覔象等此名為句理應名迹義之迹故尋此知義也順古所翻稱之為句有執隨眠異心心所至准前理趣皆應遮止七破餘執隨眠即貪等染心所隨者俱生義眠者種子義謂煩惱種子隨逐有情眠伏藏識彼執是不相應行蘊攝故論主破云貪等種子名貪等故即如貪等現行定與染心相應豈得名為不相應耶量云所執隨眠非不相應名貪等故如現貪等有餘不相應行者即後未破十法謂流轉定異相應勢速次第時方數和合性不和合性准前理趣者准前所破十四法之理趣遮止者遮止異色心等有實自性也諸無為法離色心等至離色心等實無為性三無為法分三一總破先總斥且定有下為將破無為先舉有為為例先標數下別釋如色心等者即是五識身他心智境謂色等五塵及心心所此約總聚不別分別此何識境現量所知非境所知如瓶衣等者此雖現見受用而非現量所緣是假法故但是現世所受用物問此中緣瓶等心是何量攝答非量收不親緣得法自體故非比度故非量所收不待因成者言此二法不待宗因比量成立共知是有故如眼耳等者此五色根非現量得亦非現世人所共知此眼耳等各由彼彼有發識用比知是有言證知者證成道理也以現見果比有因故果謂所生心心所法比量知有諸淨色根此非現量他心智成然今大乘第八識境亦現量得佛智緣時亦現量得除佛已外共許為論非世共悉是故但言比知是有若無為者既非現所知法又非有作用法現受用是假法今但破無為非實故此不揀設許有作用則應是無常如何執定有無為耶然諸下正顯無為不實之義所知性者謂從聞說無為名領納心中有無為性所顯性者色心有為因果義盡或緣闕時無有為義顯是無為此所知性及所顯性如色心等悉是無常故不可執離心實有量云無為是有法不應執為離色心等實無為性是宗因云所知性故或色心等所顯性故喻如色心等又虗空等為一為多至應如兔角非異心等有二別破是無為法約諸經論凡有六種一虗空無為者離一切色心諸法障礙所顯真理名為虗空無為虗空有三一識變虗空即六識上作解心變起虗空相分二法性虗空即真如體有離諸障礙故名為虗空三事虗空即所見頑空是也二擇滅無為由無漏智起簡擇滅諸障染所顯真如理故三非擇滅無為有法不由擇力起無漏智簡擇而本性淨即自性清淨涅槃是也即真如本性離諸障染不由起智斷惑本體淨故四不動無為第四禪離八患三災證得不動無為五想受滅無為從第四禪已上至無所有處已來捨受不行并麤想亦無顯得真如名想受滅無為六真如無為有二一約對得名謂真如理對事得名二簡法者即真如簡徧計離於生滅也餘乘只許初二三種離色心等實有自體先約一多破又虗空等為一為多等者等餘二種若體是一下出一體過若體是多下出多體過初出一體過中虗空容受下破虗空非一一部一品下破擇滅非一一法緣闕下破非擇滅非一若體是一遍一切處標彼宗所執也虗空若不能容受色等何名虗空既能容受色等即與色等合而為一色等既多虗空之體亦應多何言是一一法合處餘皆不合何言徧一切處若不與一法合而合餘法者則應諸法互相周徧以虗空悉入一切法故若謂虗空是一不與諸法相合而合一法者則應虗空不能容受如餘無為以餘無為不能攝受諸法故量云虗空無為是有法應非容受宗因云不與法合故喻如餘無為又色等中有虗空否有則空色雜而不分無則空色離而不徧次以擇滅非擇滅例破云若是一體者則應斷一部一品結時不但得一部一品擇滅餘一切部一切品擇滅皆得一法緣闕不生時不但得一非擇滅應得一切非擇滅何以故彼執體一則一即一切理應爾故結是思惑有八十一品分屬九部九部即九地後出多體過云若虗空等體是多應非實無為是宗因云有品類故喻如色等又虗空應非徧容受是宗因云有品類故喻如色等擇滅非擇滅准此應知餘部所執下總顯無為非實有餘部所執即後三種無為准前應破者准前一多有無等例更相徵詰也又申量總破云諸無為非異心等有是宗因云許無因果故喻如兔角然契經說有虗空等至故諸無為非定實有三顯正義一依識變假施設有者此依識變出體謂空無為初無本質唯心所變猶如極微假而無體於佛等處聞其名故而心變之聞說空等五種無為數數串習熏陶力故諸識生時變似空等影像相分為所緣境此所現相前後相似無有變易唯有一類空等相故假說為常若說本質無為者即不離於識變有也問若言識變相分說是無為者即是相狀之相隨識而為何成無為耶答此說是識變假說是無為其實非是無為無為是常住法故今此依無為體者但取隨識獨影相分為體以相似不變故假說為常耳此六無為地前菩薩識變即是有漏若地上後得智變即無漏也二依法性假施設有者此依法性出體五種無為皆是真如真如體外更無別出六種無為各皆依真如實德也此體須證人法二空無我之後方得顯故言有則墮增益謗言無則墮減損謗言亦有亦無則墮相違謗言非有非無則墮戲論謗故曰有無俱非心欲緣而慮亡口欲言而辭喪故曰心言路絕性相各別故曰非一即性即相故曰非異為法之性故曰法性無諸障礙故曰虗空擇滅者亦名數緣滅數謂慧數由慧為緣揀擇諸惑能顯滅理故唐三藏譯為譯滅擇力所得滅名為擇滅如牛所駕車名曰牛車也此以離繫為性由無漏智斷諸障染遠離繫縛證得解脫假名擇滅非擇滅者亦名非數緣滅非由慧數滅惑所得但以性淨及於緣闕之所顯故緣闕者俱舍論云畢竟礙當生別得非擇滅釋云當生者當來生法緣會則生緣闕不生於不生時得非擇滅此非擇滅礙當生法令永不起名畢竟礙言別得者謂非擇滅有實體相緣闕位中起別得故非擇滅得不因擇滅但由緣闕名非擇滅論指事明云如眼與意專一色時餘色聲香味觸等謝緣彼境界五識身等住未來世畢竟不生由彼不能緣過去境緣不具故得非擇滅釋曰謂眼緣色時亦合緣聲等以專注色故耳等不緣聲等同時聲等剎那已謝故令緣聲等識更不復生以前五識唯緣現量不緣過未而言觸等者等取法中有與能緣同時為所緣境者如他心智所緣境是也此他心智唯緣現在心王亦合緣心所以專注心王故於心所得非擇滅不動者離前三定至第四禪離三災出八難無喜樂等搖動身心所顯真理名不動滅想受滅者謂已離無所有處欲超過有頂暫止息想作意為先故諸不恒行心心所滅及恒行一分心心所滅所顯真理名想受滅真如亦是假施設者真如約詮而詮體是一此五無為依真如上假名空等而真如體非如非不如故真如名亦是假立如食油蟲不稱彼體唯言顯故譬如有蟲名曰食油實非食油不稱體故真如亦爾遮空見者說如為有遮小乘中化地部等執定實有故說為空非言無為體即空也勿謂虗幻者虗揀徧計幻揀依他即顯真如是圓成實以無虗妄顛倒法故名真如也故宗鏡錄云問如何聖教說真如實耶答今言有者不是真如名實有但說有即是遣惡取空故說有體是妙有真空故言非空非有問如何聖教說真如為空耶答為破執真如心外實有故說為空即空其情執不空真如體也通上二破餘乘竟外道餘乘所執諸法至如執外境亦是法執三總破此破外道餘乘法執已竟亦如我執例立一比量總破之彼先能後所此先所後能以我屬根法屬境故所執諸法異心心所是前陳有法非實有性是後陳宗體因云是所取假相分故喻如心心所也能取彼法之覺亦不緣彼法是宗因云是能取見分故喻如緣此能緣之覺也謂第六識緣假法時其假相分但從見分變生自無其種亦無所仗本質名獨影唯從見故以心心所緣此覺為同喻此是徧計所執性以前既明異心心所非實有性恐人遂執諸心心所是實有性故申量云諸心心所是有法非真實有是宗因云依他起故喻如幻事設有問云諸心心所既非實有何故教中說唯有識故此答云為遣外道餘乘所執離心心所別有實境是故教中說唯有識若執唯識真實有者還同妄執外境實有亦是法執由是理故但應遣彼心外之境同兔角無能緣彼心如幻事有故少分不同非謂即心亦名實有故轉識論云立唯識義者本為遣境遣心今境界既無唯識又泯即是了唯識義成也此即淨品煩惱及境界二俱無故問遣境存識乃可稱唯識義既境識俱遣何識可成答立唯識乃一往遣境留心卒終為論遣境為欲空心故境識俱泯是其正義此境識俱泯即是實性實性即阿摩羅識也古德云如緣真如作有如解即是法執若作無解雖不稱如仍因成聖釋曰若作如解即是法執者若起能解之心即立所證之理所境既立迷現量心知解纔生便成比量失唯識宗所以華嚴經云智外無如為智所入如外無智能證於如則心境如如一道清淨然諸法執略有二種至法空真如即能除滅四總舉通執蘊處界相者教中即一念而開色心即色心而開五蘊即色塵而開十二處又即五蘊而開十八界五蘊合色為一開心為四為迷心不迷色者設也十二處合心為一半對前開四故今云合謂意處全及法處一分適公曰意所取境名之為法法處有四一心所二不相應行三無為四無表色今指心所一分故云半也開色為十半對前合色為一為開也謂色聲香味觸及眼耳鼻舌身全為十言半者即法處中無表色為迷色不迷心者設也十八界心色俱開謂開色為十半如前開心為七半即六識為六意根及法處心所也為心色俱迷者設也皆是假立豈有實法而可執耶因所緣有開有合故能緣亦或總或別此法執與前我執若約大乘分別二執初地初心一時頓斷俱生二執於地地中各斷一分乃至等覺尚有二愚金剛後心一時頓盡故曰分別我法極喜無六七俱生地地除第七修道除種現金剛道後等皆無若約小乘初見道時頓斷分別我執即證初果斷盡俱生遂證四果而法執不與焉自性等相即數論等所執冥初自性等類餘文例前我執可知如是所說一切法執至依他起性如幻事等此總結內外法執自心外法即蘊處界等相本質之法自心內蘊即自心變起影像相分法或有或無者影像相分是有分別計度假法是無又第七是有第六是無一切皆有者第六識上變起影像相分必是有故如前已明然雖許此心上變起似法之相一切皆有以依他起故亦如幻有耳若所執實有是徧計執如石女兔角決定非有既立二量又引聖教以證結之廣百論云一切所見皆識所為離識無有一法是實為無始來數習諸見隨所習見隨所遇緣隨自種子成熟差別變似種種法相而生猶如夢中所見事等皆虗妄現都無一實一切皆是識心所為難若爾大乘應如夢啞撥一切法皆悉是虗不能辯說一切世間出世間法自性差別是大苦哉我等不能隨喜如是大乘所立虗假法義以一切法皆可現見不可撥無現見法故答奇哉可愍薄福愚人不能信解大乘法義若有能見可見所見能見既無誰見所見以諸能見不能自審知自有體亦不審他於審察時能見所見皆無所有是故不應執現見法決定有體以回心時諸所緣境皆虗假故所以者何起憶念時實無見等種種境界但隨因緣自心變似見等種種境相而生以所憶念非真實故唯有虗假憶念名生如曾更諸法體相回心追憶故名為念當憶念時曾所更境皆無有故能念亦無而名念者隨順慣習顛倒諸見假名施設由此念故世間有情妄起種種分別諍論競執諸法自性差別沒惡見泥不能自出若無所見亦無所聞是則一切都無所有云何今時編石為筏通上二破法執竟如是外道餘乘所執至習氣擾濁心故似彼而轉第三總結離識我法皆非實有故心心所決定不用離識色法不相應法及無為法為所緣緣以離識外皆無實體故親所緣緣必依有體真實法故若非心變色等諸法決不親緣現在下乃二比量現在者揀過未現在觸緣必有同時一聚心心所法相應現起故名為聚以八個識各有四分自見分只能親緣自相分不能親緣他識四分故曰現在彼聚心心所法非此聚識親所緣緣因云他聚攝故喻如非所緣如色非耳所緣聲非眼所緣也即一識中同聚心所亦非同聚心王親緣以王與所自體異故喻如餘非所取所取即相分能取即見分餘非所取即是不對能取者說名餘也由此二比量義可見全無外境唯有內識似外境生又引契經證之有作是難若無離識至如何說心似外境轉第四重釋外難此難即從上似字而生謂相見說為似我法者為當似誰曰以內似外以有似無約此說似也故此難云有真事方有似事依此二事共相然後可說似事為假如有真火方說有似火人以此人有似火猛赤色法方可假說此人為火我法既無復何所似豈可牛毛返似龜毛耶似既不成云何說言心似彼轉彼難非理離識我法至由此假說不依實成此釋難分二先明喻後顯法喻中一總二別總中特破真火二字為彼以真火喻所執我法故言汝之真火已破成非何勞再舉緣前廣破我法執皆不成故故依類依實假說火等皆不成也同德曰類共體曰實依類即是共法依實即是真火下分二節破之破依類云火以能熱能照為德人猛赤相無此德故即非同類若與火無共德而可假說為火人者則亦可於水等物假說火等名矣何為依類乎若謂德雖不同而人與猛赤常不相離亦可假說者則現見猛赤非人人非猛赤即猛赤在人亦有時而不現者安在其為不相離也既不共德又互相離若依類方可假說者則不應言有似火人而今常言有似火人則知假說不依似事立矣破依實云人與火共體方可言依實人與火猛赤德非共體有故依實假說理亦不成謂猛赤之德在火則能熱能照在人則身熱心煩其體各別其所依則有情無情亦各別故無共德而假說彼有水濫火名之過猶夫前耳若謂人有煖德與火相似可假說者理亦不然說火在人是猛赤相非在煖德說人似火故知假說亦不依實事立也又假必依真事立者至故於識所變假說我法名此又明假事不依真事立後結成正義宗鏡云何故名自相共相曰若法自體唯證智知言說不及是為自相若法體性言說所及假智所緣是為共相言假智者即作行解心名假智也言詮者心上解心名句文及聲上名句文是能詮皆不得所詮自相也顯假不依真唯依共相轉即此真事不說心識實體名真但心所取法自體相言說不及假智緣不著說之為真此唯現量智知性離言說及智分別此出真體非智詮及如色法等而為自性水濕為性但可證知言說不及第六意識隨五識後起緣此智故發言語等但是所緣所說法之共相非彼自相又遮得自相名得共相若所變中有共相法是可得者即得自體應一切法可說可緣故共相法亦說緣不及然非是執不堅取故又言說若著自相者說火之時火應燒口火以燒物為自相故緣亦如是緣火之時火應燒心今不燒心及不燒口明緣及說俱得共相若爾喚火何不得水不得火之自相故如喚於水此理不然無始慣習共呼故又自相者即諸法之自體相如火以煖為自相喚火之時不得煖故不得自相此煖自相唯身識現量證故非名所得共相者此以名下所詮之義名共相如詮火等法時遮非火等此義即通一切火上故名共相也能詮即言說所詮即假智此假智詮亦非離此共相外別有方便施設自相為彼所依然假智詮必依相似言聲而起聲不及處此假智詮便不流轉由能詮所詮俱不能親證自相故知假說不依真事但依似事而轉似謂增益者謂現量智了自相已於後剎那有同類智是有分別變現影像乃從相上增益其相故名為似如照鏡人形之與影宛然二人非增益乎聲依智詮唯依增益似相而轉故不可說假必依真也問既假事不依真立此假我法依何而起答云雖不依真然依內識變現而有由彼外道餘乘妄計心外實有我法為對遣此執故說似我似法是內識所變其意若曰外境雖無談汝執情外境實有故為所似耳以內似外以有似無此之謂也此段近結當文遠結前文頌中由假說我法有種種相轉彼依識所變三句通上略辨唯識分中一釋前三句頌竟識所變相雖無量種至名為異熟非謂一切二釋三能變即後三句頌此即釋頌中此能變唯三一句識所變相即牒上頌中語以該我法種種相也初能變名異熟者有三義故謂變異而熟異時而熟異類而熟種變異時果方熟故造因果熟定異時故因通善惡果唯無記因果性異故異字屬因熟字屬果因果不同作相違釋異及熟也或異之熟若異字屬果異即是熟或異熟屬現異熟即識持業釋也若異熟屬種異熟之識依主釋也雖第六亦有異熟而唯一分八識偏多故曰多異熟性二能變名思量者思謂思慮量謂量度慮度第八見分為自內我恒者無間義審者執我義思量即識持業釋也雖諸識皆有思量然或恒而不審或審而不恒唯第七亦恒亦審故三能變名了境者了謂了達雖七八識亦能了境依內門轉唯了細境唯第六識住外門故了麤相境及言明頌中及字乃前五識與第六識合為一種也前五取境必有同時意識起故次釋能變義一因能變即種子現行門種子生現行名因習氣於中有二先標後釋等流習氣者即前七識中三性種子各生自現熏第八種而令增長唯除第八不能熏故異熟習氣者由前六識善惡現行熏第八善惡異熟種子而令增長唯除第七七是無記非異熟因故前是因緣此增上緣也二果能變即前二因所生現果謂有緣法能變現者名果能變種種相者即第八識相應心所相見分等及苦樂等種種現果等流習氣為因緣下別釋前七識以三性力熏第八識成種生長即現八識三性種子各自生現名等流果所生之果與能生種性是一故因果相似名等是彼類故名流善種生善現行煩惱種生惡現行無記種生無記現行是等流果殺生得短命報放生得長壽報名假等流是增上果異熟果者由前六善惡業為殊勝增上緣招感第八酬他引業長時無間立異熟名引謂牽引謂業有力能引總報即前六識造善惡業牽引第八受善惡報相續不斷名異熟果其前六識所造之業能滿自識善惡二果名異熟生以從第八體上生故不名異熟以前六識有間斷故六識不徧無色界等無心定等六識皆不行故故第八名總報主而第六名別報主也單言異熟不攝別報言異熟生總別皆是因通善惡果唯無記故曰果異因故此異熟名雖有多義此中但取受熏持種能變善惡二果本識名為異熟非謂異時異聖變異等一切義也通上略辨唯識竟下廣辨唯識分二一明三能變二答五外問一又分三即初二三種能變今初能變分三一結前標問二天親頌三釋頌意雖已略說能變三名至且初能變其相云何一結前標問頌曰初阿賴耶識至恒轉如暴流阿羅漢位捨此天親第二半頌及第三第四頌總有十二門一自相門即初阿賴耶識二果相門即異熟三因相門即一切種四不可知門即不可知五所緣門即執受處六行相門即了七相應門即常與觸作意受想思相應八受俱門即唯捨受九三性門即是無覆無記十心所例王門即觸等亦如是十一因果法喻門即恒轉如暴流十二伏斷位次門即阿羅漢位捨下三釋頌意分二一正釋頌意二證有識體一正釋頌意分八論曰初能變識大小乘教至藏初過重是故偏說一釋自相門大小乘教名阿賴耶真諦就名翻為無沒識取不失之義奘師就義翻為藏識能含藏諸法種故為此識體具三藏義能藏所藏執藏故一能藏者即能含藏義猶如庫藏能含藏寶貝故得藏名此能含藏雜染種故名為藏亦即持義此約持種邊說二所藏者即是所依義猶如庫藏是寶等所依故此識是雜染所依處故此約受熏邊說三執藏者堅守不捨義猶如金銀等藏為人堅守執為自內我故名為藏此識為染末那堅執為我故名為藏起信鈔釋云第八能藏所藏義者且所藏義謂此識體藏是根身種子器世間所藏處也以根身等是此識相分故如藏中物像如身在室內欲覓賴耶識只在色心中欲覔摩尼珠只在青黃內次能藏義謂根身等法皆藏在識身之中如像在珠內欲覔一切法總在賴耶中欲覔一切像總在摩尼內與前義互為能所雜染者簡清淨法互為緣即更互為因果說見後條即具能所二藏義有情執為自內我者釋執藏義以第七為有情識故自內我揀他外我以色等為他外我故此即顯示下釋此藏名依自相立以藏識能攝持因果故攝謂收攝持謂執持攝是能藏所藏義持是執藏義然無能藏亦無所藏執藏二種唯能藏義過失最重是故偏說此明藏識專以能藏得名之故世親云謂緣一切雜染品法所有熏習能生於彼功能差別識為自性為欲顯示如是功能故說攝持種子相應謂依一切雜染品法所有熏習即與彼法為能生因攝持種子者功能差別也相應者是修義是名安立此識自相此是能引諸界趣生至異熟實不共故偏說之二釋果相門由前世前六脩五戒十善等業招感今生天人總別異熟樂果若前世前六作十不善業招感今生三途總別異熟苦果由此義故說名異熟由依此識相分種子假立命根由依此識身心分位假立同分若無此識則一切命根眾同分等異生勝異熟果不可得故此識果相雖多而異熟此識所專故偏說之世親云謂即依彼雜染品法無始熏習此識續生而能攝持無始熏習是名安立此識果相此能執持諸法種子至持種不共是故偏說三釋一因相門分二先總釋後別釋今初能持諸種名一切種全取他名即有財釋也餘法者即餘色心等法及二所顯不相應法或有間轉或無實體故離第八餘能持種不可得故此識因相雖多而持種義他識所無故偏說之世親曰謂即次前所說品類一切種子阿賴耶識由彼雜染品類諸法熏習所成功能差別為彼生因是名安立此識因相右攝論所說三相與此小異故存世親之釋以便參攷初能變識體相雖多略說唯有如是三相總結略說三名天親云決定藏論中明本識有八相異彼廣說故言略說有三種後別釋一切種分四一正明種相二明種子二義三明種子六義四能所熏一切種相應更分別至非無記性所攝異熟一正明種相初句標次句徵又次句正指種體此與下明非一異本識即第八第八自證分上一分親生現行功能謂之種子世親云攝持種子者功能差別也能攝持是識功能能生現是種子功能一切雜染品法不同故言差別又第八識從種子生故名果報識能攝持種子故亦名種子識又本識是集諦故名種子是苦諦故名果報體用因果者本識是體種子是用種子是因所生是果此之二法理應如是不一不異本識望種於出體中攝相歸性故皆無記種從現行望於本識相用別論故通三性若即是一不可說為有因果法有體有法若一向異應糓麥等能生豆等以許因果一向異故不爾法滅應方有用以許體用一向異故用體相似氣勢必同因果相似功能狀貌可相隨順非一向異然言不一不異恐同菩提子計有法與有等性非一非異故又言雖非一異而體是實有不同假法假法如畢竟無不能生果非因緣故外人難云此本識與所生諸法既非一異應如瓶等泥團與瓶非一異故必許瓶體是相狀假則汝本識同瓶是假識中無漏真如種子亦應是假則違自宗真勝義諦量云此與諸法是假非實宗因云不一不異故喻如瓶等論主答云此說種子體是實有者唯依世俗諦中說故不同真如勝義諦說以真如性離非一異戲論種故種子雖依下釋有漏種不同真如義言種子雖依第八為體即是第八相分非餘是第八見分所取故雖非一異而是有體實法不可言無諸有漏種子是第八所緣真如無漏種子非彼因中所緣俟轉依時鏡智圓明方得緣故此有漏種與本第八識體無別故性類是同唯是無記若能所生法皆通善等三性謂此種子本能熏習現行之因及後所生現行之果皆通三性故言因果俱善等性即是功能差別門說非依體門性唯無記此約有漏種說若無漏種非異熟性所攝故故非無記體性不順本識體故體既不同不可相即又性類別能治所治漏無漏殊不可相即外人又難云若無漏種非異熟性何故彼說皆異熟種皆異熟生二十二根者即五色根男女二根命根意根五受根信等五根三無漏根彼難三無漏根同異熟故論主答云雖決擇分說皆異孰種不與第八同無記性二十二法皆善性故謂此諸法依異熟識故名異熟種如眼等識依異熟故名異熟生皆是異性相依決不同性或無漏種下又作一義釋異熟名謂無漏種子由熏習力轉變成熟立異熟名非是無記第八異熟故知無漏唯善性攝一正明種相竟此中有義一切種子至如是建立因果不亂二明種子有本有新熏二義分三一本有二新熏二正義兼本有新熏今初即清目等師唯立本有謂有漏無漏俱本性有不從熏生由熏習力但令本有增長成熟如契經下引經證瑜伽下引論證惡叉聚者毒樹果也一枝三子生必同科經中取喻惑業苦三不相離義一切種子皆悉具足者染淨二種皆本有也闕三菩提種者清淨種子具而不發也三種菩提者一真性二實智三方便真名不偽性名不改能照真性之智稱理不虗名為實智善巧隨機化用自在名為方便般涅槃者此云入圓寂即無漏法因也今引瑜伽中說從無始來有此法因一切種子具足無此法因便闕三種菩提種子如此等文誠證本有不一而足五種性者謂異生種性聲聞種性菩薩種性如來種性外道種性楞伽云云何知聲聞乘無間種性若聞得陰界入自共相斷知時舉身毛孔熙怡欣悅及樂修相智不脩緣起發悟之相是名聲聞乘無間種性緣覺乘無間種性者若聞說各別緣無間舉身毛竪悲泣流淚不相近緣所有不着種種自身種種神通若離若合種種變化聞說是時其心隨入是名緣覺乘無間種性如來乘無間種性者謂自性法無間種性離自性法無間種性得自覺聖無間種性外剎殊勝無間種性若聞此四事心不驚怖者是名如來乘無間種性不定種性者謂說彼三種時隨說而入隨彼而成各別種性者謂一闡提也三無漏根者一未知欲知根九根和合信法二人見諦中未知欲知二知根信解見得二人思惟中九根和合轉名根三知已至無學中九根轉名知知者即是真見道故引地獄具此三根者亦證種子本有故本性住種詳見下文由此等證無漏種子法爾本有例有漏種亦不熏生第八識中本有種子由諸轉識熏令增長不由別別熏令生起種起現時種因現果現起種時現因種果如是建立因果不亂若許新熏者漏熏無漏無漏熏漏善與不善亦互相熏因果亂矣有義種子皆熏故生至依熏可生非己有體二新熏即難陀所執謂有漏無漏俱熏故生非本來有如麻香氣華熏故生者即胡麻中所有香氣必假華熏方得香也西方若欲作塗身香油先以華香取與巨勝子聚為一處淹令極爛後取巨勝壓油油遂香氣芬馥比來胡麻中無香氣因華熏故生如契經下引經證論說下引論證內種外種者攝論云種子有二一外種子但是假名以一切法唯有識故二內種子則是真實以一切法以識為本此二種子念念生滅剎那剎那先生後滅無有間故此法得成種子何以故常住法不成種子一切時無差別故復次云何外種子如糓麥等無熏習得成種子由內外得成是故內有熏者外若成種子不由自能必由內熏習感外故成種子何以故一切外法離內則不成是故於外不成熏習一由內有熏習得成種子此云或有者外種是依報乃眾生共相業種所感亦名熏習或無者以自有根種展轉相傳故名言等三種習氣詳見第八卷引此以證有漏種生必由熏起無漏種生下意牒上義例顯無漏亦熏習生說聞熏習下證成無漏亦熏生義等流者同是無漏也謂聞無漏正法熏成無漏種子名出世心種子性出世心者即是見道手杖論云出世之智雖不曾得但以墮在自相續中所有似說二無性智共許從此熏習之處而作生因此聞之熏是極清淨法界等流之體性故法界即是如來法身我法二無性解是法界所流果法謂法身界即因也是出世間諸法之界謂能持彼熏習性故及斷煩惱所知二障所有餘習名極清淨其聞熏習是似彼果彼為增上緣而得生起故同彼體性故如有說云諸初發心菩提薩埵所有正聞熏習種子雖曰世間應知即是法身所攝室羅縛迦鉢羝迦佛陀應知即是解脫身攝是故定知雖是世間而能親作出世間心種子也有情本來下破前清目等說有五性差別故定執有法爾種子之義而言依障建立者意在成就新熏理故以斷有漏即熏無漏如瑜伽說下引證依障建立義於真如境者以真如是迷悟依諸染淨法依之得生故言於真如境上有二障種者不得入圓寂立為異生性即不定性闡提性二乘不斷所知唯斷煩惱斷有利鈍故分為二聲聞根鈍三界九地地各九品品品別斷獨覺根利三界諸惑合為一聚九品別斷為二種性如來二障永斷二死永亡覺性圓滿名佛種性由此故知種性差別依障建立非關無漏種子有無瑜伽所說地獄成就三無漏根是種非現亦依熏生非本有義有義種子各有二類至此即名為習所成種三護法正義兼本有新熏分三一出正義二破本有三破新熏今初生蘊處界即是功能此功能差別即是種子一切種子與第八識一時而有從此能生前七現行現行頭上又熏種子世尊下總通前清目所引兩經二論之義諸有情等即第一經義餘所引證即所引第二經與二論始起中世尊下總通前難陀所引一經二論之義初一經義諸論亦說下即二論義本性住種習所成種二名見瑜伽論彼論菩薩地種性品云云何種性謂略有二種一本性住種性二習所成種性本性住種性者謂諸菩薩六處殊勝有如是相從無始世展轉傳來法爾所得是名本性住種性習所成種性者謂先串習善根所得是名習所成種性此中義意二種皆取又此種性未習成果說名為細未有果故已習成果說名為麤與果俱故此單就菩薩種性言之故有六處殊勝等言其實有漏無漏皆有本性住種性也護法意云有漏無漏種子皆有新熏本有合生現行亦不雜亂若新熏遇緣即從新熏生若本有遇緣即從本有生若偏執唯從新熏或偏執但是本有二俱違教若二義俱取善符教理古德問此總未聞熏時此本有從何而生答謂從無始時來此身與種子俱時而有如外草木等種又古德解熏種義諸法雖有新舊二種當生現時或從新生或從舊生名為二種非謂二種於一念中同生一現若爾即有多種共生一芽之過以此唯知色等相分種並同於此又問八識之中既具本有新熏之義何識是能熏因所熏果答依經論正義即是前七現行識為能熏因緣之因熏生新熏種子第八識是前七現行識所熏生因緣之果又問本識等雖無力能熏自種而能親生自種故現行本識等得自生種為因緣者既不熏自種如何能生自種又熏與生何別答熏者資熏擊發之義生者生起從因生出之義謂本識等雖無力資熏擊發自種之義而有親生自種之義如有種性者法爾本有無漏種子雖有生果之能若不得資加二位有漏諸善資熏擊發即不能生現須假有漏諸善資熏方能生現又如本識中善染等種能引次後自類種子雖有生義無自熏義如穀麥等種雖有生芽之能若不得水土等資熏擊發亦不能生其現行本識雖有生種之能然自力劣須假六七與熏方生由是義故本識等雖非能熏而能生種故與親種得為因緣五根塵等諸根分亦應然此解今依因位現行望自親所熏種能為二緣即是因緣增上緣唯除第八及六識中極劣無記非能熏故今按此文現於親種得為因緣中既除第八及六識中極劣無記非能熏故望自親種無因緣義若言本識及六識中極劣無記能生自種得為因緣者便犯異熟有能熏過違聖教失又問如前六識所變五塵相分不能自熏新種須假能變心緣方能熏自種故五塵相分得為能熏其極劣無記亦假能變心緣何故不同五塵相分得為能熏答今按有為法分為三品一者上品如七轉識及相應等一分能緣慮故力最強悉有力自熏二者中品如五塵相分等雖有熏力而力稍微假心與力彼方自熏三者下品即極劣無記如極羸病無力之人不能自起縱人與力扶持亦不能起本識等類亦復如是本無熏力謂心與力亦不能熏由是義故極劣無記一向無力故非能熏與五塵相分不同彼自有力但力相劣不能獨熏假心相助自有半力故是能熏由是義故今正解者第八識聚及此所變異熟五根相分并異熟浮根等及異熟前六識等並無新種以其極劣非能熏故從本有舊種所生其長養五根及此浮根及等流五塵等相分前六識所變者皆可各有新本二種若唯本有轉識不應至故唯本有理教相違二破清目等獨執本有非理謂若唯本有無新熏者前七王所亦具能熏義不應與第八為因緣性頌中法字即前七轉識識字即第八識諸法於識藏能攝藏也謂與諸識作二緣性一為彼種子二為彼所依識於法亦爾所攝藏也謂諸轉識亦與阿賴耶為二緣一於現法中能長養彼種子二於後法中轉攝植彼種互相生故顯揚論云一於現法長養彼種者謂如依止阿賴耶識善不善無記轉識時如是如是於一依止同生同滅熏習阿賴耶識由此因緣後後轉識善不善無記性轉更增長轉更熾盛轉更明了二於後法轉攝植彼種者謂彼熏習種類能引攝當來異熟無記阿賴耶如是為彼種子故為彼所依故長養種子故攝植種子故應知建立阿賴耶識與諸轉識互為緣性即此中互為因果義也如炷與焰者謂一剎那燈炷為依發生燈焰是則燈炷為焰生因即此剎那焰復能燒所依燈炷是則燈焰為炷燒因內炷生焰如種生現內𦦨燒炷如現熏種此舉增上緣喻因緣義如束蘆者如二束蘆更互依持令住不倒若於爾時此能持彼令住不倒即於爾時彼能持此令住不倒此以俱有依喻因緣義唯依此二謂種與現或曰能所熏也若謂種子本有由熏令長即經論中說因緣義者則善惡業與異熟果亦可謂之因緣乎為善惡業與異熟果是增上緣四緣不容相濫也又諸聖教說有種子由熏習生即不言唯熏令長今執本有皆乖聖教矣由前違理由後違教故曰理教相違若唯始起有為無漏至各有本有始起二類三破難陀等獨執始起非理謂若唯新熏無本有者上品無漏無記第八此上二類無新熏理又無本有從何種生問何為有為無漏因緣答即四德種子如攝論云轉依名法身由聞熏法四法得成一信樂大乘是大淨種子二般若波羅蜜是大我種子三虗空器三昧是大樂種子四大悲是大常種子此聞熏習及四法為四德種子四德圓時本識都盡四德本來是有不從種子生從因作名故稱種子此聞熏習能損滅本識為對治本識與本識性相違故不為本識性所攝故云四德圓時本識都盡若不淨種子則熏習生增益本識也此中大意言若本來無無漏種性則眾生永無成佛分不應有漏為無漏種若有漏為無漏種則無漏亦應為有漏種而諸佛等應起雜染還作眾生矣分別論者即後三卷所引上座部經分別論者是也分別論說心性本淨等語一往觀之似有漏心性即是無漏不須別有無漏種子細而察之則心性本淨一語即是心空所顯真如而為無漏四德之因故無漏法非是無因而生定有種子在也且汝所謂心性者何所指耶若指空理空即非情何為心因空是常法豈為法種體前後無轉變故釋所以為常法之故也量云空理非諸法種子以體前後無轉變故喻如虗空若即是心心體本一而有漏無漏轉變者即同數論冥性常一而二十三法轉變之謬執矣量云性即是心相雖轉變而體常一故喻如數論又無漏是善心通三性心是無漏因不善無記心應是無漏善若許二心是善應與信等相應若不許彼相應便應非善心體善名且不可得况無漏乎即有漏善心亦不應為無漏因何以故既名雜染即與惡心等故有漏不應為無漏種善等應為不善等種如前破故量云有漏善心是有法性非無漏是宗因云是雜染故如惡心等若曰有漏心具無漏性則應無漏心亦具有漏性矣而可乎何以故一性之中差別因緣不可得故又異生心是無漏種則異生位所起現行悉是無漏應名聖者何名異生若謂異生之性雖是無漏而異生之相尚在染位不名無漏無斯過者是亦不然異生之相既是有漏則心種子亦非無漏何故汝論說有異生唯得成就無漏種子乎種子成就現行亦成何以故種子現行性相同故淨則俱淨染則俱染不容有差別也然契經下釋心性本淨正義言心性者即是真如以真如是心之真實性故一說心體上本無煩惱故名性本淨不同前破有漏之心性是無漏故名本淨也真如無為非心之因亦非種子能有果法如虗空等故非有漏心性是無漏名本性淨也由此心性本淨之故諸有情類無始時來有無漏種不由熏習法爾成就後至資糧加行位中藉聞熏力熏令增長故見道位斷分別惑無漏現起必仗此真如清淨無漏種子為因而成現行無漏現行既起展轉熏成一切智種由此義故定有本住新熏二類種子無漏既爾有漏應知諸聖教下通前所引瑜伽內種定有熏生之義以明有漏不待熏生然本有種亦由熏習令其增盛方能得果者明教說熏習是增上緣非說因緣熏生內種也其聞熏習下通前所引聞熏習聞淨法界等語明無漏種亦有熏生義其聞熏習聞正法時不唯熏起有漏法種亦能熏起本有無漏法種展轉生出世心出世心者即是見道聞熏習中有二種緣義熏生有漏感變易生死勝異熟果為出世法作增上緣至修道位此種可斷熏生無漏與出世法為正因緣此因直至佛果位中無有間斷非所斷攝問若有漏種是增上緣何故能熏出世心種答此無漏種正因緣性微細幽隱不能了知故假託麤略顯明有漏性中勝增上緣方便說為出世心種其實出世心種是本有無漏正因緣也依障建立下通前所引依障建立種性別義非涅槃法即異生性法以諸異生無涅槃故無漏法種能害二障故無彼種二障永不可害二乘種性唯斷煩惱不斷所知故所知障永不可害根有利鈍故分二種佛無漏種具者彼二障種俱可永害由此無漏種或有或無故障有可斷不可斷二義若不由無漏種子有無彼二種障依何為因而有斷有不斷耶然無漏種微細幽隱難可了知故約二障顯而易見者明種性差別耳豈謂全無無漏種子哉若謂法爾有此障別則亦應法爾有無漏法種而彼不許何哉若無漏法種非本有者則三乘聖道永不得生是誰能斷二障種子而說依障立種性別乎既諸聖道永不得生則彼所云依熏可生非己有體之義亦不成矣況諸聖教說有本有種子今執唯始起彼義謂何由前違理由後違教故曰理教相違由此應知諸法種子各有本有始起二類結成正義可知通上二明種子二義竟然種子義略有六種至是共相種所生果故三明種子六義上二義是種子原本此六義是就已成種子後說一剎那滅者生已無間即滅壞故顯是有為有轉變義於轉變位能取與果方成種子問剎義揀去何法不得名種答揀無為法及長時四相并外道常我所以者何以一切時其性如本無差別故無能生用難云若剎那滅為種子者應前念種望後念現或因一念自他相望皆與為種答第二義揀要果俱有果俱有者與自現果俱時現有方成種子故無性云何者俱有已滅生果不應理故如死雞鳴是故應許種子與果俱時而住一此與果不相違故如蓮華根雖後俱有然非一二釋云謂此種子要望所生現行果法俱時現有現者謂顯現現在現有三義名現即顯現言簡彼第七第七不名種子果不顯現故現在簡前後現有簡假法體是實有方成種子和合簡相離前後即過去未來相離謂一切法與法不相應者現行種子雖是類別互不相違一身俱時有能生用即後章所云能熏生種種起現行如俱有因得士用果非如種子自類相生前後相違必不俱有即後章所云種子前後自類相生如同類因引等流果因果俱即現種異類因果不俱即種子自類此即雙成二義謂現在因有是果俱有未生已滅是前後義明種子名但依種生現立不依種生種立故但應說與果俱有故世親云言俱有者謂非過去亦非未來亦非相離得為種子何以故若於此時種子有即於爾時果生故難云種因生現要與現果俱時而有方得名種現因熏種亦與種果俱時而有應亦名種答有第三義要恒隨轉恒隨轉者謂要長時相續其性一類方成種子究竟位即金剛心道恒隨轉真諦譯為隨逐究竟位譯為治際天親云治謂金剛心道阿梨耶識於此時功能方盡故名際外種子至果熟及根壞時功能則盡是故三名隨逐至治際遮彼轉識現熏種時雖一念與種果俱有非恒隨轉問能熏現與所熏種何非恒隨答間斷之識三性互起非長相續一類而轉故能熏現不得名種問若爾第七不間應得名種答漏無漏間不得名種問若云一類如何說有有壽盡相答約生果有限名有壽盡相種體非斷難云若恒隨轉得名種子應善等種生染等現答有第四義揀要性決定謂隨能熏善惡無記決定無雜生各性果名性決定遮彼異性為自類因故世親云言決定者謂此種子各別決定不從一性一切得生從此物種還生此物問若異性因不名種子如何說有因通善惡果唯無記答彼增上緣此說因緣難云若自性因生自性果名種子者應此性因一時頓生此性多果答有第五義揀要待眾緣其種雖有要須等待眾緣和合方起現行始成種子親因緣增上緣等無間緣所緣緣此名眾緣心種待四緣色種待二緣謂因緣增上緣若不待緣而成種者則一因應為一切因以待眾緣成故不漫為因問誰說一因頓生多果答謂有外道執自然等頓生多果又餘部小乘執緣恒有今眾緣正遮此二所執以明有生未生者乃緣合未合耳難云若同性待緣生一性果應善色種生善心果餘性準此答有第六義揀要引自果謂自種子但引自果要別別色及別別心各各引生自色心果方成種子如阿賴耶識種子唯能引生阿賴耶現識如稻穀等唯能引生稻穀等果問色心互生是誰所執答謂有外道計一因能生一切諸果是故遮之問無性第七具前五義應名種子答闕果俱有第八現識雖具恒隨亦缺果俱唯本識下結成本識中一分差別功能具上六義方成種子決非餘義所能成故其外種子如稻穀等皆是眾生共受用業之所招感內識所變依世俗說假名種子耳此種下明內外種子俱有生引二因能生芽等乃至果熟是外生因能生果報乃至命終是內生因外種能引枯後相續內種能引喪後屍骸由引因故多時續住若一種子唯作生因非引因者收置倉中麥等種子不應久時相似相續喪後屍骸如青瘀等分位隨轉亦不應有生因已謝果應滅故若說剎那轉轉相生前剎那為後剎那作因得相續住者若爾最後不應都盡既無此二義故知別有引因此二種因譬如人射彎弓放箭放箭為生因彎弓為引因放箭得離弦遠有所至若但以放箭為因不以彎弓為因則箭不得遠若言前剎那箭生後剎那箭故箭得遠則箭無落義種子亦爾由生因盡故枯喪由引因盡故滅盡內種必由熏習者如無多聞熏習之因必無多聞之果外種熏習有無不定故置或言如以炭與牛糞毛等次第生彼苣蕂青蓮華根及以蒲等非苣蕂等與彼炭等俱生俱滅互相熏習而從彼生如是外種或無熏習如巨勝與華鬘等俱生俱滅由熏習故生香氣等如是外種或有熏習是增上緣非因緣攝若辦所生果必以內種為彼因緣由稻穀等外法種子皆是眾生感受用業熏習種子依阿賴耶力所變現是故外種離內無別亦是多人共業所感故曰共相依何等義立熏習名至令種生長故名熏習四能所熏習分四一問二總答三正釋依何等義立熏習名問也所熏至故名熏習此總答也熏者發也或猶致也習者生也近也數也即發致果於本識內令種子生近生長故何等名為所熏四義至可是所熏非心所等三正釋分三一所熏二能熏三總結今初何等名為所熏四義別徵也一堅住性下別釋也所熏四義唯第八具所以第八獨為所熏四義者一堅住性從無始之始至究竟之終一類相續為堅住性夫為所熏識者且須一類堅住相續不斷能持習氣乃是所熏今前六轉識若五位無心時皆間斷故既非堅住非是所熏一云轉識謂七轉識兼含心所若許七識能持種者初地已破四惑應失一切有漏種子已轉七識成平等性猶有有漏種者明是八識能持言風聲等者此揀根塵以間斷相顯故偏語之理實等字等取根塵及法處所攝色等一切皆揀至無色界即無色故入滅定等心亦無故名不堅住此亦遮經部師將色心更互持種論主云且如於無色界入滅定時色心俱間斷此時將何法能持種又如五根五塵皆不通三界亦非堅住如何堪為所熏性又第七識在有漏位雖不間斷在十地位中亦有解脫間斷謂得無漏時不能持有漏種以有漏無漏體相違故以第八識雖是有漏以在因中體無解脫唯無覆性即不妨亦能持無漏種得名所熏應立量云前七轉識是有法非所熏宗因云不堅住故同喻如電光聲風等問若言有堅住性即是所熏者只如佛果第八亦是堅住性應名所熏答將第二義簡曰無記性夫為所熏者須唯是一類無記即不違善惡性方受彼熏今佛果第八既是善性即不容不善及無記性非是所熏以佛果圓滿故如似沉麝不受臭穢物熏若不善性者即是煩惱又不容信等心所熏互不相容納故其所熏性如寬心捨行之人能容納得一切善惡事若惡心性人即不中第八識似寬心捨行之人能容一切習氣有此義故方名所熏若如來第八無漏淨識唯在因中曾所熏習帶此舊種非新受熏以唯善故違於不善等又云善染如沉麝韭蒜等故不受熏無記如素帛故能受熏如善不容於惡猶白不受於黑若惡不容於善如臭不納於香唯本識之含藏同太虗之廣納矣問若言有堅住性及無記性二義便名所熏者且如第五心所同心王具此二義應是所熏又如無為亦有堅住性義為所熏何失答將第三義簡曰可熏性言自在者正簡難陀許第八五心所能受熏論主云心所不自在故依他生起非所熏性言性非堅密者即簡馬鳴菩薩真如受熏論主云無為體堅密如金石等決不受熏夫可熏者且須體性虗踈能容種子方得馬鳴救云我言真如受熏者以真如是性第八是相性相不相離若熏著相時兼熏著性或攝相歸性故真如受熏何失如將金石作指鐶等護法破云熏相不熏性如火燒世界不燒虗空今唯是第八心王體性虗踈方可受熏如衣服虗踈方能受香等熏問若言有堅住性無記性及可熏性三義即是所熏者應可此人第八識受他人前七識熏以此人第八是可熏性故答將第四義簡曰與能熏共和合性今將此人第八望他人前七無同時同處和合義故非是所熏亦遮經部師前念之識熏後念義他身即簡同處無有以他身識為我所熏故剎那前後即簡同時前念識體與後念識相不相及故唯異熟識具此四義可是所熏非心所等此總結也非心所者即第八同時心所等取所餘如上所揀何等名為能熏四義至具此四義可是能熏二能熏何等名為能熏四義徵也一有生滅下別釋且外人問無為法得名能熏否答將第一義簡曰有生滅以生滅法有能生長之作用故今前七識有生滅有生長作用故是能熏問若爾者且如業感異熟生心心所及色法不相應行等皆有生滅亦非作用應是能熏答將第二義簡要有勝用謂善惡有覆強盛之力名為勝用其業感異熟生心心所等劣弱無強盛作用能熏色法雖有強盛又無緣慮勝用不相應行二用俱闕此非能熏又勝用有二一能緣勝用即簡諸色為相分熏非能緣熏二強盛勝用謂不任運起即揀別類異熟心等有緣慮用無強盛用為相分熏非能緣熏由斯內色等有強盛用無能緣用異熟心等有能緣用無強盛用不相應法二用俱無皆非能熏即緣勢用可致熏習如強健人能致功効故問若有生滅及有勝用即名能熏者且如佛果前七識亦具此二義應是能熏答將第三義簡要有增減增減者損益之義佛無損益故非能熏疏喻說云應剛即剛合柔即柔能成辦事第七末那至無漏位亦有增減唯除佛果言有勝劣者前佛應勝後佛應劣以前佛熏得無漏種子多故問若言具有生滅有勝用有增減三義即名能熏者且如他人前七識亦有上三義應與此人第八為能熏性答將第四義簡要與所熏和合而轉揀自他不得互熏前後不得互熏同所熏第四義上二皆云共和合者和合即是相應異名唯七轉識至可是能熏結也所以能所第四合者有二義故一以二種第四但能所異言全似故二用此文別為總結故論結云如是能熏與所熏識俱生俱滅熏習義成等問七能熏中熏第八四分之中約熏何分答前五轉識能熏阿賴耶相分種子第六意識能熏第八相見分種子第七末那唯熏第八見分種子問前七識四分何分能熏答見相二分能熏種以此二分有作用故問相分是色何能熏種答但是見分與力令相分熏種如梟附塊而成卵㲉又見分是自證分與力問能熏前七皆有王所亦同第八唯王非所否答王所皆能問前七心所何故同王亦能熏耶答四義具故問第八心所何不同王亦所熏耶答前已揀故缺自在義所以非所難曰心所不自在心所非所熏心所不自在心所非能熏答已具義不具義故何煩再問我問前義豈可重繁答為因據有力心所亦能熏心所有力故受熏須報主心所非所熏所非報主故難曰為因言有力心所便能熏為果應有力心所亦所熏答為果無力又過失多所以心所非是所熏何知無力及有過失答既有過失知是無力問何過失答頓生六果故若第八識王所一聚六皆受熏凡一能熏熏六箇種後遇緣時六種頓生六箇現行問設生六果何便是過答如一有情頓生六箇第八現行成六有情故是大過問一設成六何成大過答聖教所說其眾生界無有增減既違聖教又無此理故成大過難能熏第七一聚王所有十八法緣第八時齊熏一十八箇質種何無頓生十八果失答能熏雖多一處受熏唯生一果如一麥中有多塵共生一芽此亦如彼應法合云麥殻一而塵眾共生一芽持處一而種子多同生一果其或麥粒成多自爾藂苞競秀若也受熏非一何疑眾果齊生如是能熏與所熏識至是謂略說一切種相三總結如熏苣蕂者苣蕂本來是炭多時埋在地中便變為苣蕂西方若欲作塗身香油先以華香取與苣蕂子聚為一處淹令極爛後取苣蕂壓油油遂香氣芬馥故攝論云復次何等名為熏習熏習能詮何謂所詮謂依彼法俱生俱滅此中有能生彼因性是謂所詮如苣勝中有華熏習苣勝與華俱生俱滅是諸苣勝帶能生彼香因而生又如所立貪等行者貪等熏習依彼貪等俱生俱滅此心帶彼生因而生或多聞者多聞熏習依聞作意俱生俱滅此心帶彼記因而生由此熏習能攝持故名持法者阿賴耶識熏習道理當知亦爾能熏識等下明能熏所熏俱時和合種現相生為親因緣言三法者前後種子為二法中間現識為一法望前種子是能生望後種子是所生是故因果展轉同時下喻同時義前後燋炷喻前後種中間光焰喻現行識蘆束相依喻不相離法喻兩齊故曰理不傾動應立量云種現是有法因果同時宗因云展轉相生故同喻如炷焰或云更互相依故喻如二束蘆俱有因同類因即六因中二因士用果等流果即五果中二果也此第八識六因中有四能持種子義邊是持種因若因種子俱時而有即俱有因若望自類種子前後相引即同類因若望同時心所等即相應因無餘二因者異熟因是善惡性此識無記若徧行因是染謂見疑無明等此識非染於五果中具四唯除離繫望自種子是等流果望作意等心所是士用果望第七識為增上果望善惡因即異熟果此單就種現言故只舉其二耳種生現如俱有因得士用果即因果同時者即前異類不相違種引種如己類因得等流果即因果不同時即前自類相違云何士用果謂諸作者假諸作具所辦事業士謂士夫用謂作用此人士用若法士用者因法為作者緣法為作具如士夫用從喻彰名云何等流果謂習善等所引同類或似先因後果隨轉因果相似名等是彼類故名流此二即前種生現現熏種種引種以因果同時故種生現熏合而為一故攝二耳餘法即現引現故云三類親因緣四類真等流也欲明其義當閱開蒙彼中難云種子生現行因種與果俱種子引種子因應與果俱何理不同耶答種望現果是異類體不相違許同時種望種果是同類自體相違時須異問何理同類便說相違異類不違耶答如子望母子不是母是異類故同時俱有母自望母名為同類故於一時無二身並故種引種雖是自體定不同時若許自體同時生者有無窮過如一種子同念並生自一種子所生種子當念又生如是展轉同念並生無窮種子豈有此理如父果必以能生子豈有同念父自生父也故種引種現引理不同時種生現現熏種却同時何以故種引種現引現約剎那四相前後相引乃橫說故不同時也種生現現熏種約頭上脚下生莖結子乃豎說故却同時也是故不同問種生現現熏種如父生子子復生孫是親因緣殊無凝滯其種引種何理說為親因緣耶答前念既滅後念已生即前念體親引後念知是親因緣譬如輥彈前輥至後後彈即是前彈之體豈不親耶其種現相生別辨體者尚說為親此種引種前念後念即是一體豈不是親問如現引現亦是前念親引後念應是因緣何故却說為真等流答疏出已有種子生故謂前念種子生起頭上前念現行其種輥至第二念時還生頭上第二念現故知後念現行不是前念現行親生如戴華人向前行時其華不曾自向前行隨人向前也問三類親因緣四類真等流請以喻釋不同之理答種生現如炷生焰現熏種如焰生燋炷種引種如炷前後自相引生現引現如焰前後自家相引炷親生焰焰親生燋炷此易見者若炷引炷者其炷脚下更無有物能生炷者即知前炷親引後炷此亦名親其焰引焰脚下已有前後燈炷能生焰故即知後焰非前焰親引若前後焰自親引生何故炷盡焰便隨滅耶固是前焰不能親生也故非因緣只是等流止是相似名真等流不是親生故非因緣是謂略說一切種相通結前來一切種相應更分別下四科之義通上一釋三名竟下二釋行相分二一問答標名此識行相所緣云何謂不可知執受處了此識行相所緣云何此總問也謂不可知執受處了此總答也了即第五行相門執受處即第四所緣門不可知即能所緣行相之內差別之義問答標名竟下二正釋分二一釋執受處了分二了謂了別即是行相至行相仗之而得起故一總釋了謂了別者即第八識能緣見分見分取境有了別用故名行相處謂處所下此第八所緣相分以八識恒取器世間相為境故第八自證分上一分生現功能謂之種子有根之身名為根身根身所依世界如器名器世間相名分別習氣者釋種子也相即業習氣屬相分名即名言二種習氣屬見分分別即我法二種習氣屬徧計即五法之三也色根及根依處者釋根身也色根即勝義根所依處即色根所依之處此二皆是識所執受攝為自體同安危故此二者正指種子及根身也執受各具二義執二義者一攝義二持義言攝者即攝為自體言持者即持令不散受二義者一領義二覺義領者領以為境覺者令生覺受安危共同根身具執受四義一攝為自體同是無記性故二持令不散第八能任持此身令不爛壞故三領以為境此根身是第八親相分故四令生覺受安危共同若第八危五根危第八安五根安故若器世間量但緣非執受即受二義中領以為境又言非執受者緣無攝為自體持令不散令生覺受三義不似他根身名非執受即無受四義中領以為境一義問何以器界不似根身第八親執受答以與第八遠故所以不攝為自體又器界損時第八亦不隨彼安危共同所以不執受若髮毛爪齒膀胱宿水等雖近已同外器攝所以第八亦不執受由此第八或持或緣應具四句一持而不緣即無漏種二緣而不持即器界現行三俱句即內身根塵四俱非即前七現行問第八何不緣前七現行答有多過故不緣若變影像即犯第八緣假過若親緣即犯唯識義不成過親取他心故西明云若變影像即有情界增過以變起前七現行故即有兩重第七等又解以心法要種而生今異熟第八微劣設緣得前七亦不能熏種故不緣也問第八何不緣長等答是假故不緣問無為是實第八何故不緣答若實無為因位不證若假無為又非彼境阿賴耶識等者言第八以因緣力得生自體即復自變三類性境為自所緣而了別之見分又仗此所緣相分而得生起也所緣之義前已略陳所變之義後當順釋此中了者謂異熟識至了別即是識之見分二別釋分四一別釋行相門此一了字只是一見分耳為見分必須有所見影像故立相分又必須有本體故立自證分自證分又必有本體故立證自證分四分足然後了字明故以四分釋一了字初明立二次明立三三明立四而安慧一分於二分中破之今當先明四分一相分二見分三自證分四證自證分相分有四一實相名相體即真如是真實相故二境相名相為能與根心而為境故三相狀名相此唯有為法有相狀故通影及質唯是識之所變四義相名相即能詮下所詮義相分是於上四種相中唯取後三相為相分相又相分有二一識所頓變即是本質二識等緣境唯變影像不得本質二見分者論云於自所緣有了別用此見分有五類一證見名見即三根本智見分是二照燭名見此通根心俱有照燭義故三能緣名見即通內三分俱能緣故四念解名見以念解所詮義故五推度名見即比量心推度一切境故於此五種見中除五色根及內二分餘皆見分所攝三自證分為能親證自見分緣相分不謬能作證故四證自證分謂能親證第三自證分緣見分不謬故從所證處得名此四分義總以鏡喻鏡如自證分鏡明如見分鏡像是相分鏡後弝如證自證分此四分有四師立義第一安慧菩薩立一分自證分謂自證分從緣所生依他起性有種子生故說為有見相二分不從緣生因徧計心妄執而有故說為無第二難陀論師立二分謂即一切心皆有見相二分見相二分即能所二緣也若無相分牽心心法無由得生若無能緣見分誰知有所緣相分耶即有境有心等成唯識也安慧難云汝立相分豈不心外有境何名唯識難陀言見分是能緣相分是所緣攝所從能還是唯識若云相分是妄情有者即第八所緣識中相分種子是相分攝即種子是能生自證現行親因緣法如種子相分是妄情者則所生現行自證分亦是妄情不違種子識義耶若不許自證分是妄情者即能生種子亦是實有即因果皆實證相分亦是實有既有相分即有見分能所既成即二分成立唯識也又五根是第八識相分若相分是徧計豈有徧計根能發生五識耶安慧云不假五根發生五識五識俱自從種子生也問若不假根發生但從種子生者汝許五識種子是第八相分否答許是第八相分難既爾即種子是徧計能生五識亦是徧計也安慧救云種子但是第八識上氣分有生現行功能故假名種子但是習氣之異名非實也難云諸聖教從種子生者名實依他立者名假豈有假種子生實現行若是假種子者如何親報自果耶若種子是假法者即因中第八識因緣變義不成若非因緣變者即違一切安慧絕救第三陳那菩薩謂前師安慧立一分即但有體而無用難陀立見相二分但有用而無體皆互不足故總前體用立三分即立量果義護法菩薩又以量果義增證自證分而立四分其說詳見論中今當次第釋之初立二分云然有漏識至說名見分者謂依他二分似徧計所執二分又以小乘相分名行相能取所緣故見分名事是心心所自體相故今似心外之境名似所緣是心外法此中無故所變相分為所緣耳若明相分未是顛倒向心外取方為倒耳又言見者是能緣境義通心心所非推求義推求義者唯慧能故次破安慧唯立自證分先破無所緣云若心心所無所緣相應不能緣自所緣境謂緣色之心應不能緣色也或應一一能緣一切謂隨一識等能緣一切境也以眼識無所緣而能緣於色餘識無色緣亦應能緣色既餘不能緣一切明知無所緣者是義不然此中正義緣自境時心上必有帶境之相如鏡上面似面相生次破無能緣云若心心所無能緣相應不能緣同於虗空以虗空不能緣故或虗空等亦是能緣此反難也謂心心所法無能緣而能緣所緣此虗空等無能緣亦應緣所緣故總申正義云故心心所必有能緣所緣二相如契經說即密嚴經也一切唯有覺者即唯識也所覺義皆無者即心外妄執實境是無能覺所覺分者能覺是依他實見分所覺是依他實相分各自然而轉者見分從心種子生相分從相分種子生起故知須立二分唯識方成此偈上半明無外境下半明有見相二分各各自從因緣所生名自然而轉下結正義先出難陀立二分之非言彼不立自證分者以心外本質為所緣境王所所變影像為相分即以王所之體名見分此總以見分體相為見相二分也又為彼釋云何故彼以外境為所緣猶彼不立自證分即以外境為所依根及所緣境行相相似者王所所變相分同是影像故事雖數等而相各異識受想等相各別故者事即見分數即心所言心王與心數雖同以見分為體平等無異而了別領納緣慮之相各各不同故以見分體相分見相也由彼不立自證故境不自內出直以見分緣本質即以見分體相為見相也次出陳那立三分之是達無離識所緣境等者由彼達自心之外無別有境境是內識自證分所變故以自變相分為所緣而以能緣見分為行相識以了別為行相故即相見所依自體名事此事即自證分相離於見無別自體但二功能故應別有一所依體若無自證應不自憶心心所法如不曾更境必不能憶謂如見分不更相分之境則不能憶要曾更之方能憶之若無自證已滅心所則不能憶以曾不為自證緣故則如見分不曾更境今能憶之明先有自證已曾緣故如於見分憶曾更境故次下立三分云然心心所一一生時以理推徵各有三分能量所量量果別故相見必有所依體故相分為所量見分為能量即要自證分為證者是量果也喻如尺量絹時絹為所量尺人為能量記數之智名為量果今見分緣相分不錯皆由自證分為作果故今眼識見分緣青時定不緣黃也如見分緣不曾見境忽然緣黃境時即定不緣青若無自證分即見分不能自記憶故知須立三分若無自證分即相見亦無若言有二分者即須定有自證分自證分喻如牛頭二角喻相見二分如集量論頌說似境相所量者即相分似外境現能取相者即是見分能取相分故自證即是體也彼三者一能取相二自證三即能量及果此三體無差別果是何義成滿因義言無別體者同一識故則離心無境也次立四分云立宗者心心所若細分別應有四分立理者若無第四分將何法與第三分為證耶見分是心分須有自證分自證是心分應有第四證故曰心分既同應皆證故汝陳那立三分者為見分有能量了境用故即將自證分為量果汝自證分亦有能量照境用故即將何法與能量自證分為量果耶即須將第四證自證分為第三分量果也故曰諸能量者必有果故恐彼救云却用見分為第三分果故云不應見分是第三果云云意明見分通於三量三量者謂現量比量非量即明見緣相時或量非量不可非量法為現量果或見緣相是比量及緣自證復是現量故自證是心體得與比量非量為果見分非心體不得與自證為量果也故曰見分不證第三證自體者必現量故此四分中下申上義相分見分於外門轉名為外性自證分證自證分唯是內證名為內性故下頌云眾生心二性初一分是所緣後三分是能緣故曰通一相分是見分家親所緣緣見分即自證分親所緣緣自證分是證自證分親所緣緣故曰第二但緣第一等宗鏡云見分外緣虗疎通比非二量故即不取見分為自證量果內二分唯現量故互為果無失夫為量果者須是現量方為量果比非定非量果喻如作保證人須是敦直者方為證若略虗人不能堪為保證第三四分既是現量故得相證無無窮失意云若以見分為能量但用三分亦得足矣若以見分為所量必須第四為其量果若通作喻者絹如所量尺如能量智為量果即自證分若尺為所使智為能使何物用智即是於人如證自證分人能用智智能使人故能更證亦如明鏡鏡像為相鏡明為見鏡面如自證鏡背如證自證面依於背背復依面故得互證亦可以銅為證自證鏡依於銅銅依於鏡也引證密嚴經偈云云心二性者即是內二分為一性見相二分為第二性即心境內外二性能取纏者即是能緣麤動是能緣見分所取纏者即是相縛所緣縛也見種種差別以見分通三量故論解頌意可知如是四分下總結四分唯一見分第三第四果體一故證自證分攝入自證分則止是三分即陳那所立也第三四與第二俱是能緣見分攝故合而為一與第一為二則止是二分即難陀所立也相分即見分上所現影像故又合而為一則止是一分即安慧所立也又引入楞伽經偈證唯一心如是處處唯一心者外境無故唯有一心內執著故似外境轉定無外境許有自心不離心故總名一識故識行相即是了別了別即是識之見分結釋了字義也所言處者謂異熟識至鬼人天等所見異故一別釋所緣門分三一釋處字處即有情依報謂異熟識下釋共變之義此有四句一共中共變如山河等非唯一趣獨能用故二共中不共變如己田宅及鬼見猛火人見為水之類三不共中不共變如眼等根唯自識依用之緣境非他依故四不共中共變如自浮塵根他亦受用故此中意言由自種子為因緣故本識變為器世間相唯外非情此即能造及所造色在外處故言外大種非心外法且諸種子總有二種一是共相二不共相何為共相多人所感故雖知人人所變各別名為唯識然有相似共受用義說名共相實非自變他能用之若能用者此即名緣心外法故又唯識義鏡云共中共者多識同變名之為共變已同用重名為共又唯識鈔云謂多趣有情識所變色同在一處互相涉入其相相似同共受用名共中共初之共字約所緣緣後之共字約增上緣即無主山河等是若有主者即共中不共所攝此言共相者即共中共也雖諸有情所變各別者天見天處人見人處鬼見鬼處等此即共中不共雖各各別而相相似大千之處所無異如眾燈明各徧似一者此釋共果同在一處不相障礙謂外器相如眾燈明共在一室各各徧室一一自別而相相似處所無異此如何知各各徧也一燈去時其光尚徧若共為一是則應將一燈去已餘明不徧又相涉入不相隔礙故見似一置多燈已人影亦多故誰異熟識此揀通局謂前義為局後義為通也誰之異熟識變為此相問也有義一切言聖凡共變此月藏義也若爾則凡聖淨穢無揀別故諸佛菩薩應變染穢土而諸異生應變淨妙土矣以一切言包聖凡故又無色界天已厭離有色生無色界矣又變此欲染穢土何用故此器世間相乃現居此土及未來當生此土者之異熟所變非一切也由現居故生居穢而佛居淨故無諸佛變穢異生變淨之失由當生故故無無色聖者變下土之失經但依少分故說一切耳此又一義也護法破云若現居當生者識變此界則世界壞時已無現居當生者復用誰識成立此界乎又無色界天即未許必不下生而無理頌變此土以為下生之地故曰預變為土此復何用也設許無色界人變成色身受用色界然其所依器界尚與異地器界麤細懸絕不相依持即能變此為彼亦復何益前言聖者此言異生前言必不下生此言預變為土蓋無色界天果報既盡有墮三惡道者況下生乎於是申正義云所變世界本為色身依持受用故爾變現若於己身有依持受用於己有益便變為彼由是義故無色界人設生他方無色界時彼異熟識亦得變為無色自地而得依持受用若彼土雜居設生此土雜居彼識亦得變為此土雜居而得依持受用故器世界將壞初成之時雖無現居及當生者而此器界亦得現有既言無有情云何復言現有曰若不現有即眾生界盡何緣復有眾生復成壞相續耶莊椿云世界成壞無窮有二因緣一由眾生同業所感謂同一迷心三毒惑業感現依報惑業未盡依報何窮若無所依何名受報故令世界成壞連續二由諸佛願力所感謂佛有弘願度盡眾生眾生既無窮佛願亦無盡由是所感依報連續爾然則染淨不同同歸唯識矣此上所言皆共中共變者其共中不共相准此可知故不復言鬼人天等所見異者謂人見是水鬼見膿河或成猛火天見琉璃魚龍窟宅共一水體不共見故諸種子者謂異熟識至如真如性不違唯識二釋執受分二一釋執受種子有漏種子同異熟識是無記性故第八見分領以為境故是所緣無漏種子唯是善性不隨第八成無記以相違故不領為境故非所緣雖非所緣而與八識不相捨離如真如性是識實性不違唯識故第八識有持而不緣者無漏種子是也有亦持亦緣者有漏種子是也有緣而不持者器世間是也有不緣不持者前七現行是也有根身者謂異熟識至彼餘尸骸猶見相續二釋執受根身根即勝義根身即根依處即浮塵根前器界是諸有情共業所感共所受用故曰共種此之根身是諸有情各別業種所成故名不共相種變似色根者清淨大種所成勝義根也名不共中不共故唯識鈔云一不共中不共變如眼等五根唯自第八於中有末心第一念託父母遺體時變名不共唯自第八變故又唯自受用復名不共如眼識唯依眼根發眼識乃至身識依身根等二不共中共變即內浮塵根初唯自第八變名不共變生已後他人亦有受用義復名為共雖此根身是不共種所成然於不共種中復有一分共相種子成熟之力能於他人身處亦變似彼他人浮塵根為已受用不爾應無受用他人之義問若許受用他人浮塵者何名唯識以心外取法故答受用他人浮塵時自識先變一重相分在他人身上若受用時還受用自相分心外無法得成唯識問本識各變自根還變他根否答有二師義有師云不但變自根亦能變他根以辯中邊論中說似自他身五根現故既曰他身五根即是能變他人浮塵勝義根也有師申正義云此本識唯能變似他人浮塵根為我受用決不能變他人勝義根為我受用以他淨色根無我受用理故若無用亦變何不變七識耶以無緣慮用而得緣故然則說自他根現文如何通耶曰言自他者謂自他八識各各自變為根耳非自變他根也一則無用不變他根二由不定說言自身本識變他根故不可為證生他地謂凡位將捨此身而生他地者也般涅槃謂聖位入圓寂者也生他地者般涅槃者其識固已舍舊即新彼餘尸骸無能執受便應滅壞然不滅壞猶見久時相似相續猶是自識引因之力非他身變故知但能變似依處決不能變他人勝義也前來且說業力所變至及墮法處所現實色三結顯二變分二上言業力所變器身此言定力所變器身即墮法處色也前來且說眾生業力所變器身界地自他各有差別不能移易以彼眾生定業所感故若是聖者定慧神通等力所變器身界地或自身為他或他身為自或自界為他或他界為自則不決定若約所變身土自受用故窮未來際無有盡時故多恒相續若約放光動地等事為利他故隨眾生緣感之力得發起故多分蹔時是故不定下總結四類性境略說本識所變之境有漏種子一也有根之身二也五塵器界三也墮法處所現實色四也以定果色亦是法處色所攝故亦名定自在所生色如十徧處定乃至魚米肉山長河酥酪大地黃金等皆此色攝何故此識不能變似至彼識亦緣此色為境此明本識二變中是因緣變也問云此識既能變似依處而為所緣何故不變似心心所相應無為等為所緣耶有漏識變下皆是答詞因緣變者謂由先業及名言實種即要有力唯任運心非由作意其心乃生即五八識隨其增上異熟因為緣名言種為因故變於境分別變者謂作意生心是籌度心即六七識隨自分別作意生故由此六七緣時影像相分無有實體未必有用初隨因緣變必有實體用即五八等所變之境後隨分別變但能為境非必有用即第七識等又解初唯第八異熟生故所熏處故能持種故變必有用後餘七識所變色觸等皆無實用似本質用如鏡中光於三境中性境不隨心因緣變攝獨影帶質皆分別變異熟識變等顯變色等從實種生故所變法必有體用若相分心心所如化心等故不緣之緣便無用解深密經說諸變化心無自依心有依他心佛地論云無自緣慮實體之心有隨見分所變相分似慮之心如鏡中光此即分別變四句分別者一因緣變非分別變即五識心心所及第八識心王為所緣相分從自種生故二唯分別變非因緣變即有漏第七識及第八五心所是為所變相分唯從分別心生故三俱句即有漏第六及無漏八識以能通緣假實法故四俱非即不相應行是以無實體故不與能緣同種生故問變心心所是假相分第八不緣三種無為與不相應何不變緣答若實無為因位未證若變無為亦無實用故不變緣不相應法分位假立亦無實用亦不變緣故異熟識不緣心等但緣實色然此亦約有漏位說若無漏位第八異熟轉成鏡智雖無分別而鏡體澄淨故諸影像雖無實用亦從彼現不爾諸佛不名正徧知故故有漏位此異熟識在欲色界皆緣三類性境若無色界唯緣漏種不緣身器以厭色故無業果色故根身器界十有漏色皆非所緣唯墮法處定果實色是彼所緣彼界異熟以此色為境故亦具三緣通上釋執受處了境不可知者謂此行相至無想等位當知亦爾二別釋不可知門此有二說一謂行相微細難知故不可知行相即了別即能緣見分也一謂內根既微細難知外器又廣大難測故不可知即所緣相分也所以者何謂阿賴耶識於欲界中緣狹小執受境於色界中緣廣大執受境於無色界空無邊處識無邊處緣無量執受境於無所有處緣微細執受境於非非想處緣極微細執受境由此識緣境微細世聰慧者亦難了故故曰不可知也云何下徵如滅下約滅定以顯不可知以滅定中恒行心所與不恒行心所悉皆滅盡尚云識不離身如有心等以有微細一類相續異熟心在故滅定中此識相顯取此以見八識行相微細幽隱甚深難了應信為有勸生信也遂申量云滅定有識有情攝故如有心時無想下例明
