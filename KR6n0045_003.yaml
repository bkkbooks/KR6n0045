body:
  text: 金壇居士王肯堂證義此識與幾心所相應至以是遍行心所攝故三釋相應門分二先問起次舉頌答次釋先總釋金剛道前皆名未轉聖凡生死流轉還滅升沉定散名一切位於此位中恆與此五心所相應以五心所是遍行心所攝故決定相應雖復不增亦不可減定俱生滅名遍行故若廣説者遍四一切四一切者一性一切即善惡無記三性二地一切即九地三時一切時即同一剎那時也此作意等五心所皆同時起故名時一切四俱一切即遍諸心等與八識俱意云此作意等五遍行法八識心王俱起時必有同時相應五數又如八識俱起時皆有遍行五數故名俱一切即四一切是所行所遍觸等五數是能行能遍遍者是圓義行者是遊履義緣境義觸謂三和分別變異至如受等性非即三和二別釋五所初釋觸先正釋謂根下次轉釋先釋三和觸謂三和者即根境識體異名三不相乖返更相涉入名為隨順根可為依境可為取識二所生可依於根而取於境是故此三更相隨順如位依人而得建立人復因位而行政令今依三生令三和合故説為位次釋分別變異生故名變異如心生諸法皆名為變異似故名分別如識似彼生即名分別彼宗鏡云此三之上皆有順生一切心所功能作用名為變異瑜伽三有二種變異性一異性變異性由有相似生故二變性變異性由不相似生故分別之用是觸功能謂觸之上有似前三順生心所變異功能説名分別分別即是領似異名如子似父名分別父根變下次釋疑疑云觸既分別三之變異何故集論等但説分別根釋此如文宗鏡問何故三和唯根獨勝答一由主故有殊勝能名之為主二由近故能近生心及心所故三由遍故不唯心所亦能生心故四由續故常相續有境識不爾故境體雖能生心心所以非主故又非近故偏闕二義不名為勝心雖是主近生心所不能生心不自生故非遍也偏闕一義故非勝境識皆不續識有境生故俱缺續義非得勝名唯根獨勝故集下引證次釋令心心所觸境為性和合一切心及心所令同觸境是觸自性故曰令心心所觸境為性次釋受等所依為業既有似順生起心所功能則受想等依之而起故以受想思等所依為業下會通經論起盡經説受想行蘊一切皆以觸為緣故而得生起由斯故説二和生識三和生觸四和生受想行而不言思者以行之一字總該七十三法故五蘊論云行蘊有七十三數五十一心所中除去受想二蘊餘四十九法合不相應行二十四法共有七十三數皆名行蘊今言受想行蘊一切者是除觸法則有七十四法以觸為緣識觸受等二三四生者謂根境二法生識根境識三法生觸根境識觸四法生受受等以下一切諸法皆四法生瑜伽唯言思不言行蘊者思於行蘊為主舉思一法攝餘七十二法俱舍亦云行名造作思是業性造作義強故為最勝是故佛説若能造作有漏有為名行取蘊但舉一思便攝行蘊問何故心所法中除去受想餘皆行蘊答受著諸欲想著諸見味受力故貪著諸欲倒想力故貪著諸見又生死法以受及想為最勝因由耽著受起倒想故生死輪回由此二因故別立受想為蘊集論但説觸為受依者以觸境時必有領納受所依近引發勝故所以偏説問觸自性是實是假答此觸自性是實非假六六法中心所性故身足論云六六者謂六識六觸六受六想六思六愛也如眼觸所生受乃至意觸所生受眼觸所生愛乃至意觸所生愛故又是四食中觸食性故又七十四法皆以觸為緣故又十二緣中觸緣受故如受想等各別有性非即三和若即三和應同得等立量云觸所自性非即三和六六法中心所性故是食攝故能為緣故如受等性作意謂能警心為性至應非遍行不異定故次釋作意先正釋心未起時警心令起是作意體性心既起已引令趣境是作意業用次轉釋謂此警覺應起心種者明此作意在種位能警心也設有問言作意為在種位能警心為在現行能警心即答言在種位能警心以作意自性明利雖在種位若有境至而能警心心所種令生起現行喻如多人同一室宿外邊有賊來時衆中有一人為性少睡便能警覺餘人此人雖自身未起而能警覺餘人令起亦如內心相分雖與見分同起法爾有能牽心功能今作意亦爾其作意種子既警彼諸心心所種生現行已作意現行又能引心現行令趣前境即此作意有二功能一心未起時能警令起二若起已能引令趣境作意亦能引起心所而但言心者心是主故如言王來非無臣佐等有説下出偏義回趣異境者正緣此境時引轉向餘也持心令住者專注一境也有心令心回趣異境為作意者有以持心一境為作意者二俱非理若令心住不異別境定心所故若言回趣應非遍行所攝性故受謂領納順違俱非至名境界受不共餘故次釋受先正釋受以領納為義領謂收領納謂容納若領納違境則起心欲離若領納順境則起心欲合若領納非違非順境則起心平平雖不欲合亦不欲離此受性也為欲所依故能起愛是受用也有作下敘異見一境界受者即前領納違順俱非者是二自性受者即是彼所執領納俱生觸者是觸與受俱生謂之俱生觸此受不納外境唯納俱生之觸即以觸為自性名自性受唯自性受是受所緣自相之境不與心王共緣故若境界受王所共緣故以緣境界者名境界受緣俱觸者名自性受也論主破云受雖曰依觸而生而觸以三和分別變異為性受以領納為性各各自能緣境故同列為五數受定不緣俱生觸也豈有父生子而子納父者哉若謂此受似觸而生故受能領觸名自性受者則觸為因而受為果果似因起名為領彼凡似因果皆應領因領故名受應皆受性觸既是受因應名因所生受不得名自性受以觸非受之自性故若謂自性受如王觸如國邑受能領觸如王食諸國邑所生受體名自性受非以觸為自性者理亦不然以彼執領納俱生觸為自性故今以觸所生受名為自性則受無有自證之境彼執俱生觸為自相境故若謂受雖領觸不捨受之自性即領自性名自性受者則一切法皆不捨自性皆是領自性亦皆可謂之自性受乎次明境界受為受自相然謂境界受共餘相者理亦不然如領順境時其順境相定屬於己名順境受此領受時不領違捨若領違捨定不領順豈共餘相哉想謂於境取像為性至方能隨起種種名言次釋想初正釋顯揚論云想者謂名句文身熏習為緣從阿賴耶識種子所生依心所起與心俱轉相應取相為體發言議為業次轉釋先安境相高下美惡方施種種名字言説彼有如是相名為瓶衣等安立即是取像異名想能安立自境分劑若心起時無此想者應不能取境分劑相謂此是青非青等作分劑而取其相名為安立由此取像便起名言此是青等性類衆多故名種種思謂令心造作為性至驅役自心令造善等次釋思初正釋次轉釋善品等者謂善品不善品非善非惡品正因等者謂正因邪因非正非邪因顯揚論云思者謂令心造作得失俱非意業為體或為和合或為別離或為隨與或為貪愛或為瞋恚或為棄捨或起尋伺或復為起身語二業或為染污或為清淨行善不善非二為業得即正因失即邪因問作意與思有何分別曰心恆動行名為作意思惟籌量可行不可行令心成邪成正名為思惟作意如馬行思惟如騎者馬但直行不能避就是非由騎者故令其離非就是思惟亦爾能令作意離漫行也此五既是遍行所攝至所緣事等故名相應次總結此五法心起必有故是遍行故決定與藏識相應廣釋在第五卷此觸下釋相應義問心與心所各有行相何名相應如第八以了別為行相受以領納為行相等答此觸等五與異熟識行相雖異而定同時起同依一根所緣亦等自體相似故名相應今約見分為行相影像相分為所緣自體名事等者相似義體各惟一境相相似故所緣事皆名為等以觸等五相託本識相生所緣既相似故名為等唯識為宗不約本質名為所緣亦非影像名為行相時謂剎那定同一世依謂根俱無有間此識行相極不明了至如無記法善惡俱招四釋受俱門有三釋先約行相以定捨受捨受五相與此第八行相皆同故為相應一不明了二不能分別違順境相三微細四一類五相續轉不明了者是捨受相若苦樂受必明了故不能分別順違境相者取中容境是捨受相若是餘受取順違境故微細者相不顯故若是餘受行相必粗一類者無易脫故若是餘受必是易脫此行相定故成一類相續轉者無間斷故若是餘受必有間斷此恆相續故唯捨受若能分別違順境相非真異熟異熟者取境定故若粗動者如餘心非異熟主顯行相難知異餘識也由此五義必有故便能受熏持種相續又解此識極不明了曾無慧念慧念行相極明了故不能分別順違境相顯唯捨受非苦樂俱及簡不與善染等並相續而轉顯無有欲今有希望方有欲起此相續故無有欲也由此五義第二義正顯唯捨受義所餘四義因簡別境等故唯與捨受俱次約體性以定捨受此識相應受唯是異熟性異熟性者隨先業轉不待現緣既隨業力不待現緣故唯捨受苦樂二受非真異熟不任業力要待現緣故非此識之所相應次約執藏以定捨受此識一類恆無轉變末那恆執為自內我若苦樂受轉變無常寧可執以為自內我以第七識亦是捨受是故唯與捨受相應問此五遍行受何別開不及餘四答受體雖一義用有三是故別開餘四不爾例如無記有覆無覆義用不同故亦別開外人難云此識既與捨受相應是無記寂靜法如何又為惡業果耶汝前既許善業能招捨受則惡亦應然故答云捨雖寂靜不違善惡二種故得為惡果不同禪定寂靜能斷障染故於苦樂俱不相違此無所能為故通惡業惑餘七轉識設起苦樂此識皆俱以捨不違苦樂品故若或苦樂不俱於人天中應不受苦果以相違故三惡趣中應不受樂果亦相違故此中苦樂皆是別招故捨不違立量云捨受善惡俱招不違苦樂品故如無記法不違苦樂者此與轉識同一剎那三受俱轉如何此識非別境等至有間斷故定非異熟此相應簡別問此異熟識何故但與遍行相應不預別境五位答以別境等互相違故謂別境之欲希望所好樂事此識任彼善惡業轉無所好樂故不與欲相應勝解是印證守持決定之事此識昏昧不能印證持守亦無決定故不與勝解相應念是明記過去曾習之事使不忘失此識昧劣不能明記故不與念相應定雖影像相分剎那新起至加行時所觀本質前後相續但專注境此識任運不作加行專注本質恆緣現在影像所緣但新新起且定行相一一剎那深取專注趣向所緣此識浮踈行相不爾故不與定相應慧為簡擇德非德事此識微細昧略不能簡擇故不與慧相應且別境者別別緣境而得生故此識唯是一類相續故不與別境相應也此識唯是異熟無記非善性故不與善十一相應非惡性故不與煩惱等相應惡作等四雖通無記非一切時常相續故定不與異熟相應然不遮異熟生異熟生中有此四故通上釋相應竟法有四種謂善不善至此非善惡故名無記五釋三性門標舉三性分為四法先問起能為此世他世順益故名為善能為此世他世違損故名不善障礙聖道隱蔽自心説名有覆無覆反此非善不善故名無記次舉頌答次釋先釋是無覆無記初異熟性故謂此本識於上四法唯第四攝流轉屬染還滅屬淨由業故生死流由苦故生死轉由道故還由滅故滅異熟既是善應不生不善恆生善故即無流轉惡趣之義惡趣翻亦然既恆生惡應無還滅以故異熟定非善染二性此約異熟顯無記也次善染依故此識既是果報之主既恆是善應不為惡依是惡亦應不為善依互相違故由非善染故能為善染依此約善染所依顯無記也次所熏性故此識是所熏性以非善染而能受善染熏若是善染應非受熏熏習既無即無種子種子若無即是無因因既無故其果亦無故曰染淨因果俱不成立此約所熏顯無記也具上三義證知第八唯是無覆無記性攝言無覆者覆謂染法有障礙義有蓋蔽義障礙聖道不得生起蓋蔽真心不得清淨此識無此二義故名無覆言無記者謂善因感可愛之果惡因感非愛之果彼二皆有殊勝強盛之體可記可別此識無此二義故名無記無記有三一相應無記謂諸無記心心所法二不相應無記謂無記色不相應法三真實無記謂虗空非擇滅又廣辨四種無記一能變無記即無記心心所法是二所變無記即諸色法及諸種子等是三分位無記即二十四不相應行中有假無記法分位立者是四勝義無記即虗空非擇滅無為是又就第一能變無記中更有四種無記一異熟二威儀三工巧四變化異熟無記者異者別異即因果性別因通善惡果唯無記熟者成熟此唯屬果因果合説名為異熟無記者不能記別當果名為無記或於善惡中無所記別名無記此業感真異熟無記即第八識業即善惡二思感者集義招義為此現行思能造作感集當來總報識等五果種子又能招感當來異熟五蘊現行果故名業感言真者實也簡命根雖是異熟而且是假又真者常也體常相續更不間斷遍界地有者名真異熟無記又若法體是異熟從異熟識起而無間斷遍界地有者名真異熟亦名異熟生若法體是異熟從異熟識起有時間斷又不遍界地者但名異熟生不得名真異熟即簡六識體若體非異熟又有間斷又不遍界地雖從異熟識起不名真異熟但得名異熟生若威儀工巧變化等雖有能作而不招善惡等果故名無記觸等亦如是者至隨所應説非謂一切六釋心所例王門謂如阿賴耶識唯是無覆無記性攝此釋是字諸凡相應心所必與心王同一性故故曰亦如是判為心所例王門也此單就無覆無記言也此為正義又一説通前所緣門行相門不可知門是觸等五心法皆與相應不但無覆無記故説亦如是言又一説通因相門一切種亦在其中以亦如是言與阿賴耶無簡別故故破之云觸等五所依識而有如臣依王非若王之自在也且觸等五即與善染諸心所同何能受熏如何同識能持種子故知受熏持種必是異熟而五所不預也遂申量云觸等不能受熏依識不自在故如貪信等又若觸等亦能受熏則應一有情五所一王共有六種種體既六果從何種而生終不應言六種共生一果多種一芽未曾有故若言果生唯從一種則餘五無用何同受熏又不可説一一種中次第漸生六果以王所熏習同時勢力均等無次第故既不可説次第生果又不可説六種一時頓生六果若六種一時頓生六果則一有情一剎那頃六眼識等亦可一時頓生耶外人辨云誰言觸等亦能受熏持諸種子耶論主云設若不許故熏持種如何謬執觸等亦如賴耶名一切種子外人救云阿賴耶識緣種子時相應觸等變似種相領以為境名一切種非如心王真能持種心王緣種子時五心所必同緣故如無色界無色可託以為本質其觸等心所必有所緣不緣種子而緣誰耶若託王三境為質而緣即是疏所緣緣故曰親所緣緣定應有故以證成觸等必緣種子也此似種相不生現識如似根等非識所依亦如似火無能燒用只成所緣緣不成因緣即無受熏持種義其遮前難意出於此似眼根等者本識緣眼根等相應觸等託根為質變似眼等非識所依以有親根為所依故論主破云觸等所緣似種似根等相必須賴耶既受熏已然後得有種子根等執持領受若第八未曾執受真實種子則觸等似種依何變起且所緣乃是第五門於後執受處方應與本識相例言之何於三因相門即預言之耶故知前説一切種言必指受熏持種義若不指受熏持種而但所緣上説者則執受中又有種子作所緣説何耶是本頌有重言失矣又彼所説亦如是言通前一例更無簡別者則心王能了別觸等五所亦應能了別心王與觸等相應觸等亦應各與觸等相應豈理也哉由此故知亦如是者隨所應例而例之非謂一切無簡別也阿賴耶識為斷為常至因果相續緣起正理七釋恆轉如暴流即因果法喻門先釋法阿賴耶識為斷為常問也謂阿賴耶識若常則無轉變若斷則不相續如何會通得合正理故答云非斷非常以恆轉故恆故非斷轉故非常何謂恆曰此識無始時來一類相續等故一類者常無記義相續者未曾斷義界趣生本者即是依此識故施設三界五趣四生是引果故識是界趣生之本所以能施設者以彼賴耶是無記性能堅執持一切有漏種子令不散失故何謂轉曰此識無始時來念念生滅等故新新不住因滅果生果生因滅前後變異非常非一因果性故簡非我也有生滅故簡常非自性也常一之法無因果若無因果即是斷常以是常故如虗空等應不受熏若不受熏即無涅槃生死差別若受熏須具四義一無記二堅住三可熏四非常一是四相應可為轉識熏也是知由恆故轉由轉故恆由恆故能持種由轉故能受熏恆以體言轉以用言恆以遮斷滅之見轉以遮確定死常立量云阿賴耶識是有法非斷非常是宗因云恆隨轉故同喻如暴流以彼暴流波相水相不相捨離故云阿陀那識甚微細習氣種子如暴流如暴流下次釋喻相續長時即非斷有所漂溺即非常又如暴流雖風等擊下喻果生非斷風等喻衆緣波浪喻轉識而恆相續顯非斷義又如暴流漂水上下下喻因滅非常漂水上下喻善惡種即內因習氣上生人天猶如漂草下沉三塗猶如溺魚魚草等物喻善惡五趣以五趣中苦樂受由觸而生故曰外觸揀非內觸也恆相隨轉顯非常義如是法喻下雙結法喻此法喻正約現在第八一剎那間為因為果遮斷遮常成緣起義緣起之理即非斷常宗鏡七十一云緣起者順性無分別即是相即相融顯平等義正順第一義諦體也過去未來下此破薩婆多部一切有部雪山部等所立法有我無宗也彼宗設難謂汝言果生因滅者有生滅即有去來即非實有云何非斷斷豈得成緣起正理彼意謂因果之道須三世相續不斷方成因果過去為因現在為果現在為因未來為果大乘過未無體現唯一念如何得成因果相續耶論主答云汝言過去未來皆是實有可名非斷既曰非斷便是死常安得非常常亦豈成緣起正理我非好為辨説斥他過以成己義但不推破迷謬邪宗難顯大乘深妙緣起前之辨析意在於斯且汝不解大乘現在因果相續緣起正理執為斷滅我更為汝重明梗槩然我前言因滅果生是約現在前因滅位即有後果如種生芽如形現影因果體異生滅事殊同在一時更非前後非謂待因滅盡而後果生也若待因滅而後果生可成斷滅今因果同時種現相生更無前後安得斷滅正如稱之兩頭低昂時等稱喻本識兩頭喻因果低昂喻生滅時等喻剎那不異如是因果念念皆爾相續如暴流水何假過未是真實有方成非斷小乘復難云若因果不約三世唯立現在因滅果生為因果者因是現在所後果猶未生後果既未生此因是誰因如未生子不可名父果是現在果前因亦已滅前因既已滅此果是誰果既因中無果果中無因是成斷滅安得謂之離斷離常論主答云若非同時因滅果生而執因時已有後果果既本有何用因為因本辦果果為酬因因義既無果義寧有無因無果豈離斷常故顯揚論云若謂因中有果者我今問汝因果二相為異不異若不異者即無決定因果二體由此二相無差別故而言因中有果不應道理若異相者因中果體為未生相為已生相若未生相者於彼因中果猶未生而説是有不應道理若已生相者則果體已生復從因生不應道理是故因中非先有果然要有因故待緣而生由斯理趣汝義不成若欲因果義成必依現在有法作用而得顯示故我前云果生因滅相續如流如稱兩頭低昂時等今汝以三世因果而生詰難此非預我大乘緣起唯識正宗所以者何由汝執體用因緣皆是本來實有墮在死常常無轉變因果定無是故應信大乘現在生滅緣起正理何謂大乘緣起正理即一切法自相離言因之與果皆是假説自無始之始至無終之終無去無來唯有現在一念觀現在法有酬前相假説現在為前因之果觀現在法有引後用假説現在為後果之因故將現在一念説成因果相續不斷耳云何引後用曰有能引生當果之用當果雖無而現在法有引後用用者功能行者尋見現法之上有此功用觀此法果遂心變作未來之相此似未來實是現在即假説此所變未來名為當果對此假當有之果而説現在法為因此未來果即觀現在法功能而假變也其因亦爾觀此現法有酬前之相即異熟變相等觀此所從生處而能變為過去實非過去而是現在假説所變為現法即對此假曾有過去因而説現在為果而實所觀非因非不因非果非不果且如於自性離言故非實是因有功能故非定不同果亦如是有餘部説下此破大衆雞胤等七部所執法無去來宗也彼計實有現在法及無為法其過未法體用俱無雖無去來就於現在一法體上有生滅二時之相故有因果恆相續義謂現在法如擊石火極迅速者猶有初生後滅二時況稍遲者初生起時酬能引因即名為果何假曾因對説現果後變滅時引所生果即名為因何假當果對説現因雖有初後生死二時此之因果法體唯一後所有法應知亦然又前引果之因正滅此後酬因之果正生此之因果體相雖殊即滅即生而時是一前後交互相續如流遠離斷常成緣起理豈有智者捨此而信餘宗之説哉此宗立現在一體二時皆是實有者一以避餘乘三世無體之過一以出大乘過去未來之假豈知終墮斷滅之見而不能出也彼有虗言下論主破詞先破初後二時俱生現在故云何容一念而有二時次破生滅同在現在故云生滅相違寧同現在以現在一念屬生不屬滅故若謂念滅屬現在者則應念生屬未來若謂一念有故名生是現在者則應一念無故名滅寧非過去若謂過去之滅屬現在有則應現在之生屬過去無若謂生時名現在有則應滅時名現在無由是而推現在一念具有生滅二時決無是理又次破二相一體云生滅二相敵體相違生相無滅滅相無生如何可説一體而有生滅二相即以世間苦樂論則苦時無樂相樂時無苦相豈容現在一念而有苦樂二相具在者乎又次破二時一體不應同立若謂生滅是一則生不異滅滅不異生不應復立二時若謂生滅是異則生屬現在滅屬過去不可謂是一體故顯揚云若謂去來是實有者去來二相與現在相為異不異若不異者立三世相不應道理若異相者性相實有不應道理又此二世法為常無常若言常者墮於三世不應道理若無常者於三世中恆是實有不應道理故生下結破經部師下此破經部説假部所立現通假實宗也彼立現在之法在蘊為實在界處為假但依六識三毒建立染淨因果相續不斷以彼不許有阿賴耶識能持種故不知因果相續理必受熏從熏成種從種起現現又熏種是相續義今既無受熏持種之識則相續之説亦秪虗言耳由此應信下結勸生信此識無始恆轉如流至爾時便入無餘涅槃八釋阿羅漢位捨即十二伏斷位次門先問起次舉頌答謂諸下次解釋阿羅漢因果位次有五一資糧位其位有三一五停心二別相念三總相念若欲出於三界必以此三種觀法而為資糧也五停心者一多貪衆生不淨觀二多嗔衆生慈悲觀三多散衆生數息觀四愚癡衆生因緣觀五多障衆生念佛觀別相念總相念者謂四念處一觀身不淨二觀受是苦三觀心無常四觀法無我若各觀察則名別相念若總觀察則名總相念三界者欲界色界無色界也二加行位其位有四一暖位如木鑽火未見火出先得暖相以喻加行位人未見智火已得暖相二頂位觀行轉明如登山頂悉皆明了三忍位忍即忍可之義謂於苦集滅道四諦之法忍可而樂修也四世第一位於理雖未能證而於世間最勝謂此四位加功用行取證道果也三見道位即聲聞初果也謂斷三界見惑而見真空之理故名見道也初果即須陀洹也四修道位謂修四諦道法斷欲界思惑而證第二第三果故名修道也第二果即斯陀含第三果即阿那含也五無學位即聲聞第四果阿羅漢也此位斷三界見思惑盡真理究竟無法可學故名無學也梵語阿羅漢華言無學又云無生詳見天台四教儀集注此中阿賴耶識至阿羅漢位方究竟捨以彼已斷三界見思煩惱分別俱生我執種現皆已盡故此中所説阿羅漢位非但聲聞之第四果通攝三乘無學果位以阿羅漢有三義故所謂殺賊應供不生三乘無學皆有此義通得此名粗重即種子此識含藏雜染種子究竟離故説之為捨三乘者謂緣覺乘聲聞乘菩薩乘彼三乘人至無學位俱無煩惱事業皆同故釋成云皆已永害煩惱賊故以彼煩惱劫法財故名之為賊應受世間妙供養者堪作福田故永不復受分段生者唯有變易死故分段生死者隨因緣力壽命短長有定齊限故名分段變易生死者由悲願力改轉身命無定齊限故名變易如改粗身為細質易短壽作長年覺知報盡為死入定還資為生云何知然以瑜伽論決擇分及集論所言而知之阿羅漢獨覺即鈍利二根斷煩惱有二種一斷現行一斷種子成阿羅漢時種現俱斷菩薩登八地時但斷現行名阿羅漢成如來時方斷種子外人問云若謂菩薩得菩提時頓斷煩惱者則菩薩位煩惱未斷應皆成就阿賴耶識何故論説不退菩薩不成就阿賴耶識耶論主釋云決擇分言不退菩薩者謂二乘斷盡煩惱證無學果而回趣大乘者也必不退位起煩惱障故名為不退趣大乘故名為菩薩耳故應攝在此阿羅漢中同不成就阿賴耶也故二論不同義則是一又不動地以上菩薩如善慧法雲等覺皆是不退一切煩惱修道所斷俱生障也永不行者則永遠離諸現纏也法駛流者法執漂溺如暴流也任運轉者能於駛流得自在也能諸行中起諸行者一行攝一切行也剎那剎那轉增進者念念流入薩雲海也以此四因證不動等名為不退我見愛等謂我癡我見并我慢我愛即俱生惑也此謂本頌彼謂不退謂此菩薩雖未斷盡異熟識中煩惱種子而緣此識我見愛等現行已伏不執內我故亦永捨阿賴耶名名阿羅漢有義初地下此出偏義有師指初地已上菩薩已證分別我法二種空已得根後二種智已斷分別我法二種障已修一行一切行為利生故雖有現行煩惱而無過失此等菩薩亦名不退然此菩薩雖未斷俱生已斷分別由斯亦得捨賴耶名亦名阿羅漢故集論下引證集論全文云諸菩薩已得諦現觀於十地修道位唯修所知障對治道非煩惱障對治道若得菩提時頓斷煩惱障及所知障頓成阿羅漢及如來此諸菩薩雖未永斷一切煩惱然此煩惱猶如呪藥所伏諸毒不起一切煩惱過失一切地中如阿羅漢已斷煩惱呪喻禪定藥喻智慧毒喻煩惱雖有種子被禪定智慧所伏以故不為煩惱過失彼説非理下論主破詞謂七地以前雖斷分別尚有俱生我見等執第八為自內我如何得捨阿賴耶名若斷分別名為捨者則預流等亦斷分別應亦名捨以預流果永斷分別我見愛故外人救云地上菩薩得殊勝智已有正知故雖起煩惱不為過失豈可與預流等相較量耶復破云雖地上菩薩斷分別惑不起諸見於第六識能起正知不生過失而第七識中俱生未斷任運執藏寧不與彼預流等同故知彼説前七地中名阿羅漢決定非理然此中言捨者謂彼俱生煩惱種子悉已斷盡不執為我證阿羅漢名之為捨非捨一切第八識體以彼異熟未空尚持俱生法執種子故若無此種爾時便入無餘涅槃何不名佛乃名阿羅漢果也耶然第八識雖諸有情至心等通故隨義應説次明第八異名先牒上正釋捨者捨名不捨體故又廣説多名積集義是心義集起義是心義以能集生多種子故或能熏種於此識中既能積集復起諸法故説此識名為心義阿陀那者有三義一執持謂能執持諸法種故二執受謂能執受色根依處故三執取謂能執取結生相續故所知依三自性者染淨諸法為識所知此為彼依名所知依或學大衆者所應知故種子識者此識因中持新舊漏無漏種子念念受熏故果中唯持舊無漏種不受新熏故此種子識與心義別取第八現名種子故故古德云前名心者望種積集此種子識唯望能生故不立也以上四名皆通凡聖阿賴耶者依自相立名攝藏雜染為自相故一切異生謂於聖法不得名異生性聲聞有學七地已下菩薩皆共此名三乘無學無此名故異熟識者依果相立名此是善惡業果位以善惡業果為因即招感得此引果故前世業為因因是善惡今世感第八識是無記異熟即果果異於因故名異熟又具四義一實二常三遍四無雜是名真異熟識問第八真異熟識如何名引果答為善惡業為能引第八為所引是能引家之果故名引果故是總報主前六識名為滿果有一分善惡別報來滿故此滿業所招名異熟生非真異熟也不具四義唯第八是引果真異熟識具四義故此通異生二乘無學十地菩薩皆有異熟識名唯除如來以如來唯善無無記故解脫道中即成無垢識名阿摩羅即果中第八識一純無漏不攝一切染法種子故不與雜染種現為所依故唯與鏡智相應名無垢識如契經説下引如來功德莊嚴經證無垢識名義言淨無漏界漏即垢染既言無垢識則有識矣圓鏡智相應者明有心王與所相應非所獨立也阿賴耶名下釋成頌意問云既第八識有種種名何故唯説捨阿賴耶答以阿賴耶具三蘊義異生位中過失重故最先捨故此中偏説過失重者與雜染法互相攝藏亦為有情執藏為我故説此識名阿賴耶最初捨者未捨餘名先捨此故是故先捨異熟識體菩薩金剛道後方捨無學位中入無餘時捨無垢識體無有捨時若夫心等通一切位者隨義而説不必局也古德云阿賴耶識名為藏義良以真心不守自性隨熏和合似一似常故諸愚者以似為真取為內我我見所攝故名為藏又能藏自體於諸法中又能藏諸法於自體內二種我見永不起位即失賴耶名又云第八識名者八地已上無阿賴名唯有異熟識第七但執異熟識為法又第八識本無阿賴耶名由第七執第八見分為我令第八得阿賴耶名若不執時但名異熟識第八或名為心者由種種法積集種子故名為心雖受熏持種積集集起義得名心者唯自證分也喻如倉庫能藏諸物能持一切種子故後令種子生起現行與種子為依持生起二因也即知第八受熏持種得名心也因中持新舊種子故名為心果位持舊種一切無漏種子故名心也此亦名持種心或名質多此名有為心或名牟呼栗多此云真實心即是真如此是無為心或名阿陀那此云執持識能執持種子根身生相續義即是界趣生義此通一切位又廣釋一集起名心者即第八識集諸種子起現行故言集諸種子者即色心人天三界有漏無漏一切諸法種子皆是他第八識能集猶如世間人庫藏言起現行故者為三界五趣有漏無漏一切色心等現行皆從第八識生起即第八識是能集起一切色心等種子是所集起今但取能集起名心今正取第八心王自證分名集起心相分是色見分是用證自證分落後邊故為自證分能集諸法種子令不散失復能起諸種現行功能從無始來更不間斷故獨有集起義即知第八自證分與識中種子為二因便是此中集起二義一為依持因即是集義二與力令生起因即是起義二積集名心者亦第八識中持諸三界五趣種子故第八得名含藏積集即第八自證分能持舊種故名積又能集新熏故名集即知積集集起以解心第八識獨名心為正義故故云能遍任持世出世間諸法種故是藏識義即自證分是能任持能積集一切種子是所任持所積集前七名轉識者轉為改轉是不定義即三性三量三境易脫不定方名轉識今第八唯是一類無記又唯性境唯現量故名不轉識又集起名心亦屬第七轉識集者為集前七現行言起者即前七現行各自有力能熏生新種名起且如眼識緣色時必假同時意識共集熏種餘四識亦爾問若明了意識與五同緣所名共集且如獨頭意識緣十八界時不與餘識同緣亦熏起種何有共集之義答由第七為所依第六方轉熏種亦名共集三緣慮名心者謂能緣慮自分境故即八箇識名能緣慮自分之境緣謂緣持慮即思慮若緣慮以解心是通名前五識唯緣五塵是自分境除諸根互用及佛果位第六識緣十八界及三世法并一切有漏無漏世出世間法為自分境第七識緣第八見分為自分境第八識緣三境為自分境是頓常緣三境以第八是常識境常有故不同前六識有間斷所緣境又非常有其第八正義若欲界繫者即緣欲界根身器界為自分境若種子即通緣三界為自分境上二界亦爾只除無漏種不能緣以有漏無漏種不相順故由是但能持而不能緣以持義通緣義狹喻如赤眼人把火亦如頂上戴物但持而不緣只持令不散不離識故然第八識總有二位至鏡智遍緣一切法故又因前説七名約為二位一約因位為有漏位性唯無起相應唯五心所境但有三以執受中是種子根身二境處是器界一境二約果位為無漏位性唯是善相應心所增十六數遍行合別境五善十一合二十有一與一切心恆相應故既云一切即通漏無漏故亦有五遍行常樂證知所觀境故與欲相應於所觀境恆印持故與勝解相應於曾習境恆明記故與念相應世尊無有不定心故與定相應於一切法常決擇故與慧相應極淨信等常相應故與善十一法相應無染污故不與根隨二十六所相應無散動故不與不定四所相應因果位中皆唯捨受故云此亦唯與捨受相應問因中非善非惡得與捨受相應今果中既與善所相應何故相應唯與捨受答佛果位中雖行一切善若空谷答響春工肖物平等轉故無著心故得與捨受相應問若爾何故因中唯與遍行相應果上復加別境善十一答因中唯緣三類性境故唯五所果上能緣一切境故與別境善十一相應以大圓鏡智無法不照無法不現故云何應知此第八識至離第八識皆不得有三證有本識分五一總問二總答三引聖教四顯正理五總結云何應知此第八識離眼等識有別自體總問也聖教正理為定量故總答也此第八識非是世間現量所見之境唯憑聖言量及以真正道理而知有之謂有大乘下引聖教分為六段今初阿毗達磨此云無比法引此經有二頌初頌以能持種生現義言無始時來界以能變為身器執受根身與一切法為增上緣依義言一切法等依以與有漏流轉法為依持用故言由此有諸趣以與無漏還滅法為依持用故言及涅槃證得為此識自性微細難知故以因緣依持之作用而顯示之先以因緣用顯此識界是因義此釋初句為第八識從無始至今能持一切漏無漏色心等諸法種子又能與漏無漏種子力令生現行即第八與一切種子為依持生起二因故名為因依是緣義此釋次句為第八識能變為身器作有情依與一切漏無漏現行法而為所依以能執受五色根身與前七識現為俱有依故即第八識能與一切現行色心等法為增上緣依也然所以為因者謂能執持諸種子故所以為緣者與現行法為所依故具此二義故能變為彼及為彼依云何變云何依謂變器界為根身依變根身為五識依變第七為第六依故曰即變為彼及為彼依也且小乘不信有末那復立量以示之立量云末那意識依俱有根轉識攝故如眼等識末那意識同是轉識既同前五有俱有根第八理應是識性故亦應第七作所依根前七依八第八為因前七為緣八依第七第七為因第八為緣是故第八有因緣用次以依持用顯此識由有下釋第三句順流轉法即有漏位中善惡法也由第八識持善惡種起現受熏故令有情流轉生死然惑業生皆是流轉而獨言趣者以趣是果苦樂顯勝故偏説也或諸趣言雙通能所以惑業是趣之資糧器具為能趣亦得趣名諸惑下結及涅槃下釋第四句言順還滅法者即一切無漏善法也有説此證得涅槃是説能證得道之人不説所證涅槃以涅槃法依無垢識不依藏識故或此但説所證是修行者尅期求證故有義雙説就能證之道言還就所證之滅言滅故雙説為正也頌言涅槃即顯所證之滅頌言證得即顯能證之道由能下結又此頌中下重釋頌意界是自性義初句是顯自性恆有次句顯無始來有此識性能與一切染淨法為總依止後二句顯染淨別依止此以後三分總別或以後三分三性第二句是依它起第三句是遍計執第四句是圓成實今此下總結以上所説義若無第八識皆不得成即彼經中復作是説至非諸轉識有如是義此即前經第二頌前三句顯第八識含藏諸法種子得阿賴耶名第四句顯為菩薩乘説得真見道方名勝者由第八識自證分能持種故名種子識以能攝藏諸雜染法故名阿賴耶此第八識非如數論勝性轉為大等之説相雖轉變而體是一果雖生滅而因常一也阿賴耶識含藏法種從種生現從現生種因果二體非即是一以種屬第八現行屬前七故能依諸法與所依識俱生俱滅非即是異以因滅果生果生因滅故故異邪執能顯正理與雜下約三藏釋解見前文已入下次釋第四生便繫屬彼故亦如磁毛石吸鐵鐵如父母精血二點第八識如磁毛石一剎那間便攬而住同時根塵等種從自識中亦生現行名為執取結生故雜集論云相續力者有九種命終心與自體愛相應於三界中各令欲色無色界生相續謂從欲界沒還生欲界者即以欲界自體愛相應命終心結生相續若生色無色界者即以色無色界自體愛相應命終心結生相續如是從色無色界沒若即生彼若生餘處有六種心如其所應盡當知又此自體愛唯是俱生不了所緣境有覆無記性攝而能分別我自體生差別境界由此勢力諸異生輩今無間中有相續未離欲聖者亦爾臨命終時乃至未至不明了想位其中能起此愛現行然能了別以對治力之所攝伏已離欲聖者對治力強故雖未永斷然此愛不復現行彼由隨眠勢力令生相續中有初相續剎那唯無覆無記以是異熟攝故從此已後或善或不善或無記隨其所應除彼沒心以中有沒心常是染污猶如死有生有相續心剎那亦唯無覆無記若諸菩薩願力受生者命終等心當知一切一向是善由此執持三義故名句得真現觀者現觀有六謂思信戒智諦邊智諦究竟現觀地前名似地上名真即菩薩見道後所起根本後得智也得此智已能證能解阿賴耶識方名勝者世尊正為彼説此識或地前亦名勝者資糧位中已能信解唯識性相發起最勝猛利樂欲希求見道轉依世尊亦為彼説非轉識等有如是義結顯頌中唯詮第八解深密經亦作是説至唯第八識有如是相此第三解深密經偈阿陀那者此云執持執持有三一執持諸法種子令不散失二執持色根及根依處即身即浮塵根令不爛壞三執取結生相續者即有情於中有身臨末位第八識初一念受生時有執取結生相續義結者繫也屬也於母腹中一念受此識為阿陀那言無性者不信第八為諸法自性故若無第八即無佛性故名無性闡提也西天外道由不信此識為諸法本或執冥性或執大有性或執常性或執斷性為此漂蕩令不出離故不能窮其底故名甚深趣寂聲聞不達其相計六識三毒為諸法本為此沉溺而不覺知故不能通達故曰甚細是一切法真實種子下釋第二句緣擊便生者如眼識九緣生等經云廣慧阿陀那識為依止為建立故六識身轉謂眼識耳鼻舌身意識此中有識眼及色為緣生眼識與眼識俱隨行同時同境有分別意識轉有識耳鼻舌身及聲香味觸為緣生耳鼻舌身識與耳鼻舌身識俱隨行同時同境有分別意識轉廣慧若於爾時一眼識轉即於此時唯有一分別意識與眼識同所行轉若於爾時二三四五諸識身轉即於此時唯有一分別意識與五識身同所行轉廣慧譬如大暴水流若有一浪生緣現前唯一浪轉若二若多浪生緣現前有多浪轉然此暴水自類恆流無斷無盡又如善淨鏡面若有一影生緣現前唯一影起若二若多影生緣現前有多影起非此鏡面轉變為影亦無受用減盡可得如是廣慧由似暴流阿陀那識為依止為建立故若於爾時有一眼識生緣現前即於此時一眼識轉若於爾時乃至有五識身生緣現前即於此時五識身轉凡即無性下釋後二句頌凡愚對前勝者説無性云懷我見者不為開示恐彼分別計執為我何容彼類分別彼類分別計執窮生死際行相一類無改易故唯第八識有如是相總結頌意唯詮八識入楞伽經亦作是説至如增一等至教量攝四引入楞伽經頌即牒上意而言第八如海外境界風飄動心海恆起種種轉識波浪然則波相有間斷海水常相續轉識有間斷第八恆相續故知別有如海藏識也以眼等識轉易間斷不能為作諸識依止無如大海恆相續轉起識浪義故此等無量大乘經中下總顯聖教量散見不一何止前來所引數偈諸大乘經皆順無我而違我執避流轉而趨還滅讚三寶而訶外道表五蘊十二處十八界而遮二十五諦六句義等是大乘法理無顛倒樂大乘者方許開示不但大乘如小乘部中增一等經皆至教量攝亦密言説此名阿賴耶詳見下文為小乘不信有阿賴耶故委曲開導如此立量云諸大乘經至教量攝契經攝故如增一等又聖慈氏以七種因至極成有無有對治異文故五引慈氏七因既引現在釋迦又引未來慈氏以證大乘是佛所説一先不記者謂小乘人説大乘經不是佛説佛滅度後有餘人為壞小乘正法故説此大乘慈氏破云何故世尊先不授記言諸可怖事者佛於經中説末法世時有諸魔王入我法中著我袈裟破我正法法必盡滅諸如是等佛先授記若大乘經是佛滅後壞法者説何故不同諸可怖事預先記別二本俱行者大乘小乘被二等機本俱流行機既有二乘何唯一何許小乘是佛所説獨言大乘不是佛語三非餘境者謂大乘教唯大根器智慧人知非餘人境界故不為彼説説亦不信四應極成者今佛餘佛同一佛故若謂大乘是餘佛説非今本師釋迦佛説則大乘經是佛所説其理極成無容異議五有無有者若許有大乘應信此經是佛所説離此等經別求大乘不可得故若無大乘小乘亦無所以者何以離大乘無成佛理誰出于世説大小乘故許小乘是佛所説非大乘教理不應然六能對治者智有二曰如理如量曰根本後得曰一切道種如理根本道種即無分別智如量後得一切即有分別智無分別智不依於心不緣外境了一切法皆是真如境智無異故依大乘勤修行者乃能引得此智此時起時乃能正對治根隨煩惱非佛所説其孰能之七義異文者大乘所説理趣幽深淺涉其文未了其義遽生誹謗謂非佛語此則愚者之咎耳莊嚴論有頌即頌此七義先不記是第一因俱行是第二因非餘所行境是第三因極成是第四因有無有是第五因對治是第六因異文故是第七因餘部經中亦密意説至定唯顯此阿賴耶識六引小乘四部密意説者恐彼分別起執故暗指而不顯言今論主標出皆是此第八識大衆部是小乘經中部名阿笈摩是大衆部中經名此經言根本識即是第八識言根本者依此識而生眼識等如依樹根而有莖有條有葉故非意識能為眼識等所依止以不恆故不能為根生莖等故二上座部説有有分識便是第八識此有分識體常不間斷遍三界有故曰三有分者因義即三有之因皆由此識三化地部中説有窮生死蘊即是第八識蘊有三種一者一念頃蘊謂一剎那有生滅法二者一期生蘊謂乃至死恆隨轉法三者窮生死蘊謂乃至得金剛喻定恆隨轉法緣此第八遍三界九地恆常有故但有生死處即常遍為依直至大乘金剛心末煩惱盡時方捨故名窮生死蘊謂色界無色蘊故不窮生死受想滅故受想不窮生死不相應行離此色心不可得故行蘊不窮生死然則窮生死蘊捨第八而誰耶四一切有部説此識名阿賴耶有愛樂欣喜四種阿賴耶謂第七末那貪彼第八總別緣彼為三世境立此四名愛是總緣餘三別緣謂樂過去我欣現在我喜未來我謂此第七與彼第八有情如此故認假為真念念貪著為真愛處決不執取五蘊為真愛樂以生苦處者雖於自蘊極生厭逆而於自我未嘗捨離故知所厭在蘊所愛在我五欲亦非真愛著處為生初禪者不愛五欲而愛我故樂受亦非真愛著處以修四禪具靜慮者雖離妙樂如棄雜毒然猶愛我勿令彼樂染汙於我故身見亦非真愛著處謂初果以至三果斷分別惑身見不生未盡思惑猶執內我故轉識亦非真愛著處謂修滅盡定者雖厭前七猶執我故色身亦非真愛著處無色界中雖不愛色亦愛我故不相應行亦非真愛樂處無實體故問云現見有情愛著諸蘊及樂五欲等何非愛處答是依蘊等愛阿賴耶非愛蘊也如人愛著其家以為我家其家火焚棄之而走為愛其身此亦如是五取蘊等俱餘師所執故歷破之陳譯攝論云復有餘師執是如來説世間喜樂阿梨耶如前所説此中有五取陰説名阿梨耶復有餘師執樂受與欲相應説名阿黎耶復有餘師執身見説名阿黎耶如此等諸師迷阿黎耶由阿含及修得是故作如此執由隨小乘教及行是師所立義不中道理若有人不迷阿黎耶約小乘名成立此識其義最勝云何最勝若執取蘊名阿黎耶於惡趣隨一道中一向苦受處於彼受生此取陰最可惡逆是取陰中一向非可愛衆生喜樂不應道理何以故彼中衆生恆願取陰斷絶不生若是樂受與欲相應從第四定乃至上界皆無此受若人已得此受由求得上界則生厭惡是故衆生於中喜樂不稱道理若是身見正法內人信樂無我非其所愛於中不生喜樂此阿梨耶識衆生心執為自內我若生一向苦受道中其願苦陰永滅不起阿梨耶識我愛所縛故不曾願樂滅除自我從第四定以上受生衆生雖復不樂有欲樂受於阿梨耶識中是自我愛隨逐不離復次正法內人雖復願樂無我違逆身見於阿梨耶識中亦有自我愛由此愛著處名比度諸師執名義不相稱若取此名比度第一名義相稱故引彼所立名成立本識則為最勝通上三引聖教竟已引聖教當顯正理結上起下四顯正理分十一一持種心二異熟心三界趣生體四有執受五壽暖識三六生死時有心七引緣起依八引識食九引滅定有心十引染淨心十一總結謂契經説雜染清淨至故持種心理應別有一持種心分二一出正義二破執今初雖謂顯理亦引經中佛所説義以理比量故引經説集起名心之義謂經言集起者集有漏無漏種子起染淨現行故名為心若無第八彼經所説持種之心不應有故為轉識間斷不當契經所説心義立量云前七轉識是有法非可熏習不能持種是宗因云在滅定等有間斷故根等作意善等類別易起脫故不堅住故喻如電光言滅定等者等取五位無心言根境作意者生識之緣各別言善等類別者善惡等性亦別由類各別故易起易脫又以各別故六種轉識不定俱生不俱生故無定相應無相應故何有能熏所熏焉能持種耶唯第八識常無間斷堅住可熏契彼經言持種心義立量云此第八識是有法是可熏性是宗因云一類堅住恆無間斷故喻如苣蕂等一類簡類別無間斷簡有間斷恆簡易脫堅住簡不堅住次總推若無第八受熏則彼所起染淨現行不熏成種既無種子則應所起現行之功竟成虗棄何以故以無第八受熏故若前七不能熏第八不受熏則無因種既無因種亦無現果所起染淨是無因生與彼外道自然之執何以異哉次推色不相應不能持種立量云色不相應非所熏習不能持種非心性故如聲光等以色法非情不相應假法故次推轉識心所不能持種立量云轉識相應諸心所法是有法不能持種受熏是宗因云易脫起故不自在故非心性故喻如識間斷所亦如王易脫起故既名心所無自在義又非心體如何能持種受熏耶四者既不能持種則持種之別有心其理明矣有説六識無始時來至故彼亦無能持種義二破異執分四一破執第六為所熏蓋小乘執前六識及彼貪等煩惱前後分位熏習成種不由第八也先敘計言依根境等前後分位者謂前六識別別所依別別所緣別別作意及煩惱隨煩惱等前後各有分位不相雜亂事雖轉變而類無別是所熏習能持種子者謂雖作意煩惱隨煩惱等熏習諸識見色聞聲各各不同而諸識類前後是一無有差別是則煩惱等為能熏識類為所熏亦能持種由斯染淨因果皆得成就何要建立第八受熏持種彼言無義下論主辨破先約假實破言汝所謂識類者實耶假耶實則同於外道以彼執冥性勝性皆實有故假則便無勝用豈有假法能持實種故攝論云若立眼識貪等煩惱及隨煩惱俱生俱滅此由彼熏成種非餘即此眼識若已謝滅餘識所間如是熏習熏習所依皆不得等次約三性破初破善惡立量云若此識類善不善性應不受熏許有記故喻如擇滅如何受熏以諸擇滅揀擇善惡故若無記性者此六識身必起善惡善惡起時無記心斷類亦應斷如何受熏不可謂事雖善惡而類可無記也類可無記應是別類若是別類必同別事何成所熏能熏所熏類必同故三約間斷破若謂識類可能持種至無心位六種轉識皆已間斷此類定無將何持種誰為受熏四約漏無漏破若謂識類能受熏者應阿羅漢熏成有漏諸異生性熏成無漏以不立第八聖凡皆同無記識類故立量云阿羅漢心受諸染熏類無記故如異生心又異生心受無漏熏類無記故如阿羅漢五約根識互熏破若謂識類無別則眼等六根例眼等識應互相熏攝論云若謂此識種類如是雖不相應然同識類亦得相熏如是例餘應成過失謂餘種類例亦應爾以眼等根同淨色類亦應展轉更互相熏此意説言眼耳兩根同有淨法二淨展轉應互相熏餘亦如是然汝不許雖同淨法異相續故不得相熏識亦應爾雖同識類何得相熏六約事類前後破若謂事類前念熏於後念成互熏者理亦不然以彼二念不俱有故既不俱有非定相應猶如他念與自念隔無有能熏及所熏性以能熏所熏必俱時故攝論云譬喻論師欲令前念熏於後念為遮彼故説言二念不得俱有無二剎那一時而有俱生俱滅熏習性故釋曰眼識不得熏習眼識何以故一時中二眼識不得並生若不並生則無俱滅故熏習義不成是故眼識等不為欲等大小諸惑所熏亦不為同類識所熏立量云六識事類非互相熏前後二念不俱有故喻如隔念汝執六識俱時而轉為所熏性為能持種由前理趣皆不得成有執色心自類無間至非所熏習前已説故二破經部師執色心前後自類相生不由第八先敘計謂彼執言從前剎那色能為種子後剎那色因彼而生前剎那心能為種子後剎那心及相應法因彼而生此中因果義立不必受熏何用復執阿賴耶識為諸法因故先所説集起名心為染淨種為證不成先斥次破種從熏習而得生長自類既無能所熏義即無種子現行可得如何可執前為後種若無種子則間斷者應不更生如無色界沒色復生時前色種子能生後色理不得成色久斷滅無色種故從無想沒想心生時及滅定等出心生時前心種子能生後心皆不應理以久斷滅無心種故若執前剎那色心為種子能生後剎那色心二乘羅漢應無後蘊終不能得無餘涅槃色心兩因永斷盡故由彼不以八識為種而以死位色心為後種故死位既無色心以何為種而生後蘊其誰復證無餘涅槃殊不知前色望後色前心望後心容有等無間無有因緣也亦不應執色心二法展轉互為種生色法不能熏心種心法不能熏色種如前根識等不互熏故有説三世諸法皆有至一切因果皆不得成三破薩婆多部所執三世諸法皆是實有為因果性過去諸法能感為因現在諸法所赴為果現在能感為因未來所赴為果三世因果自然感赴何勞別執第八持種大乘難云若無第八能持種者何故經説集起名心能持種子故此答云經説心為種子者以彼能生染淨諸法勢力最強故説心能持種先斥次立量破云過去未來非真實有非常現故如空華等又量云過去未來非因緣性無作用故如空華等既過未不屬現在又非常法又無能生之用豈可執為親生種子而生諸法故知若無第八持種則剎那生滅不相關涉一切因果何由得成有執大乘遣相空理至彼心即是此第八識四破一類大乘菩薩執破相宗空理撥無第八識似比量者即非量也論主破云衆生著相迷真實理佛説空法遣彼著心愚者不知為對治故執遣相空為究竟法依似比量不能正解撥無此識及一切法違害前引諸大乘經便謂無能斷之智無所斷之惑無所證之果無能修之因但有言説都不可得豈不違害聖教成大邪見何以故以外道毀因謗果亦不謂全無如兔角然但執因果非是實有若謂生死涅槃一切諸法皆非實有菩薩不應為斷幻化生死勤集夢影資糧期證空花佛果譬如有人欲除幻敵用石女兒以為軍旅誰有智者行此事耶故應下勸信宗鏡云不達真異熟正唯識人多執俗有真無強生異見不知諸佛密意執遣相空理以為究竟此乃破遍計情執是護過遮詮便撥依他圓成悉作空花之相若無依圓本識及一切法皆則無體既非實有成大邪見又契經説有異熟心至彼心即是此第八識二異熟心前持種心約因此異熟心約果異熟心即第八識謂前世中以善不善為因招感得今生第八異熟心是果先引經證若無下次立第八為異熟心謂眼下次破眼等非異熟心立量云眼等諸識非異熟心有間斷故非一切時是業果故如電光等又立量云異熟不應斷而復續無斯事故猶如命根命根既非斷而復續異熟可知問眼等六識亦有一分善惡滿業所招名為滿果是別報主何非異熟立量答云眼等六識業所感者是有法是異熟生非真異熟是宗因云非恆續故喻如聲等故知定有真異熟心酬牽引業為總報主遍而無斷內變為身外變為器作有情依令諸有情內依根身外依器界身器離心理非有故若無此心誰變身器不相應法無有實體故不可變諸轉識等非恆有故亦不可變若無此心復依何法恆立有情不相應行意指命根及衆同分下約身受推破又諸異生若在定中無思慮時身便輕安則生樂受若不在定有別思慮身便勞損則生苦受然令此身生苦樂受皆由第八執受此身若無第八執受此身彼位如何有此身受不應在定後時身有怡適不定後時身有勞損以除佛之外其餘在善不善位者必應現有真異熟心持此身故恐彼難云若爾佛起善心等位必應現起真異熟心方生怡適輕安身受故此釋云如許佛有起異熟時即非是佛是有情攝以金剛道後異熟已空故佛無垢識能持身受此不説者非所急故由是下結成前義又契經説有情流轉至故知別有此第八識三界趣生體前明因果相酬此言趣生之體以有因果必有體故次言之先引經證若無下次立第八是趣生體謂要下次推前七非趣生體謂第八識為三界九地五趣四生之體若無此識即一切有情不應有故然趣生體要具四義一實有二恆三遍四無雜第八具上四義可立正實趣生言無雜者彼此異熟不相濫故若無具足四義真異熟法為趣生體而立餘識則趣生體應皆混雜如住人趣胎生法中忽起他趣餘生法故次推色法非趣生體諸異熟色者是第六善惡業所感無記異熟果色及前五識中一分善惡業所感無記果色皆不遍趣生以無色界無彼色故次推二善非趣生體諸生得善者謂先修習為因緣故後於此中生便即得名俱生善不待修成性中本具故仁王護國般若經云衆生識初一念異木石生得善生得惡惡為無量惡識本善為無量善識本集論二中説十三善法一自性善即信等十一心所乃至十三等流善等今生得善即第七生得善也何等生得善謂即彼諸善法由先串習故感得如是報由此自性即於是處不由思惟任運樂住業所感善者是過去修善業所感者此二種善雖遍趣生亦無雜亂但有間斷而非一類恆有亦非趣生不相應行是假立故無實有義唯異熟心心所具四義故是正實趣生也此下推出趣生之體若無此異熟法為趣生體者生無色界起染善心皆同佛果應非趣生以無異熟趣生體故攝論云生無色界若離異熟染污善心應無種子染汙善心應無依持染污善心者謂能愛味名為染污有等至故名為善也又即於彼於無色界若出世心謂無漏心正現在前謂生無漏餘世間心謂有漏皆滅盡故一切永滅爾時便應滅離彼趣彼趣所攝異熟無故不由功用自然應得無餘涅槃能治現前一切所治皆永斷故設許有趣生體攝有漏種子生無色者忽於有漏心中發起無漏彼世間心爾時皆滅則彼無色趣生之體不由功用便應捨離自然證得無餘涅槃所攝異熟空故若許無色空異熟識者便違唯佛一人無趣生體若不立異熟為趣生體既犯前不遍不恆等失又犯無色無趣生失若立異熟諸失皆無由此理故佛非趣生所以者何佛無異熟無記法故亦非界攝所以者何界是有漏如來諸漏已永盡故界因界果是苦集諦世尊已捨苦集諦故界是因義即有漏種諸戲論種佛永斷故是故如來不屬趣生其餘皆是趣生體攝故知下結成前義又契經説有色根身至彼心即是此第八識四有執受趣生無雜由有執受故次言之先引經證若無下次立第八為執受心謂有色界中有情有五色根及內五塵是第八親相分唯第八識能執受若是餘識即無此能五色根者勝義根也彼依處者浮塵根也過去未來已滅未生故無執受唯現在世有實體故定有執受有執受故決定應有能執受心先推異熟是能執受唯異熟心是由先世善惡二業所招引者是無記性非善染等故於善惡趣中一類能遍相續執受有色根身眼等轉識無執受義為有難云佛無異熟諸佛色根應非執受故又釋云此無如是義之言意顯眼等轉識皆無一類等義非顯能執受唯異熟心以諸如來無漏色身有無垢識能執受故故執受名通一切位若爾何故前云唯異熟心一類能遍相續執受有色根身釋云然有漏身唯異熟心是能執受故契經中作如是説以契經為有漏説非無漏故非謂諸佛無漏色身無執受也次立量破轉識無執受義立量云諸轉識等不能執受有漏色身現緣起故如風聲等現緣起者假現在緣而得生起謂眼識九緣等次破三性非執受立量云彼善染等不能執受有漏色身非業引故如非擇滅以三性是自力招非業所引正如非擇滅無為是自性清淨非由智力斷惑所顯三破異熟生非執受立量云異熟生者不能執受有漏色身非異熟故非遍依故不相續故如電光等四破心所非執受立量云諸心所法不能執受與諸心識定相應故喻如唯識轉識既不能執受轉識心所亦不能執受故五破色與不相應行亦非執受立量云諸有色根不相應行不能執受有色根身無所緣故如虗空等無所緣者以彼色根不相應行非能緣心故不能緣所緣不能緣所緣安能執受故應下結顯彼經説執受心即是第八又契經説壽暖識三至彼識即是此第八識五壽暖識三言不但持根身且持壽暖故次言之先引經證若無下次立第八是持壽暖識壽暖識三者據小乘釋壽者謂出入息即風大也暖者即火大謂業持火大地大等色而不壞爛也識者即剎那覺知心也據大乘釋謂阿賴耶識相分色法身根所得名暖此識之種名壽以能持識故現行識是識今依小乘釋之論義方明謂壽暖乃風火二大假合若無久住識持之行亦安能相續久住乎如諸轉識有間斷故有轉變故此決不能常持壽暖持壽暖者非異熟識而誰立量云諸轉識是有法不可立為持壽暖識是宗因云有間有轉無恆持用故喻如聲風等又立量云唯異熟識定可立為持壽暖識無間無轉有恆持用喻如壽暖問云契經説壽暖識三更互依持或是詮有間轉識何由定知詮無間轉者答經説壽暖識三更互依持若壽暖二法既是一類無間相續而識獨是有間轉者豈得符合三法更互依持之理故以理推必是無間轉識也外又問云既説三法一類相續更互依持則此三法或皆應遍皆無間轉或皆不遍皆有間斷何故唯許暖不遍界不許識有間轉此以理推不為過難以無色界無暖相故論主答云謂若是處具有三法於中必有一類無間無轉恆相持者為異熟識若無此識則於壽暖無恆持用前以理推定知三法所説之識必是一類無間異熟非詮轉識有間轉者縱使舉暖不遍三界而為詰難豈壞前理以捨暖時餘二不捨餘二若捨暖必隨捨故我以前持壽暖者為無間異熟其理極成若謂三法中持壽暖者必是有間轉識非無間者則三法中所持壽暖既唯有漏能持之識亦是有漏定非無漏若生無色界起無漏心者有漏六識既已不行不知更用何識能持彼有漏壽耶由此故知有異熟識能持壽暖也以第八因中恆屬有漏故又契經説諸有情類至故知定有此第八識六生死時有心現持根身暖壽猶有疑混唯有受生及命終時法後來先一毫不得假借故次明之先引經證若無下次立第八為散有心宗鏡問受生命終既依本識生時死時復住何心答夫論生滅之事必住散動之心經云有念即魔網不動即法印魔網立生死之道法印成涅槃之門故知散亂寂靜二途皆依本識而有即此所云必住散心非無心定之旨也散則非定有則非無故散有心非無心定若無第八生死散有心不可得謂生下推生死時無轉識謂生死昏昧悶絶之時明了意識必不現起如人熟睡極悶絶時明了意識必不起故立量云生死位時明了意識是有法必不起現是宗因云身心昏昧極悶絶故喻如睡無夢明了意識獨指第六言也又眼耳鼻舌身意六種轉識見分相分皆不可知如當是時六種轉識尚現行者必有見相二分顯了可知如餘時矣而今不然故知別有心也量云又此位中六種轉識是有法定不現行是宗因云行相所緣不可知故喻如無心位又此位中六種轉識若定現行行相所緣有必可知故喻如餘時言餘時者尋常時也以六種識尋常現起行相所緣皆可了知至於生死位時定不現行故行相所緣皆不可知下推生死心定是異熟問死位第六行相所緣既不可了名為無者死位異熟行相所緣亦不可知云何非無答真異熟識極微細故行相所緣俱不可了非謂無心名不可了以此異熟是酬前六善惡引業為總報主一期生死相續不斷恆無轉變是故色心散壞此識不壞名散有心非無心也一期者一報始終時也下破小乘執受生位無散有心彼以第六為散有心故先敘外計受生位中定無五識所以者何意識取境或藉前五為明了門方取境故或藉他言教方取境故或藉定力而取境故此皆生位意識之因今生位三因既不可得故受生位意識亦無云何説言受生命終必住散心下破云若受生位諸因無故意識不起則諸有情生無色時既無五識又無他教後時意識永不復生若謂雖無五識他教以定為因得引起者此亦不然定心亦由散亂意識方得引起五識他教彼界定無引定散心無由起故既無散意定心亦無定心無故意識亦無然今無色在定散心時時現起何得言無若謂彼定不由散意引起而由意識尋常久串熏習定力後生彼界率爾現起則彼初生無色界時亦應串習率爾現起無色既爾即欲色界初受生時串習意識亦應現起何獨不然若謂初受生時串習意識由昏昧故未即現前者即此昏昧便是不可了知生死散心何勞別説有意識在耶有餘部執生死位中別有一種微細意識行相所緣俱不可知非此所謂第八而何若名意識不極成矣以第六識行相所緣可了知故又將死時下引經論破死位無散意識雜寶藏經頌云頂聖眼生天人心餓鬼腹傍生膝蓋離地獄腳板出此驗六趣差別也攝論頌云善業從下冷惡業從上冷二皆至于心一處同時捨此明善惡兩途也若無第八識彼經論中冷觸漸起事不得成以轉識爾時雖附此身不執身分故眼等五識各依五根非共依故或俱不行悶絶位故第六意識不住此身所見之境亦無定準皆亂緣故由彼一向遍寓此身雖恆相續不能為主亦不執受不應冷觸由彼漸生下明唯異熟識為命終心唯異熟識由先世善惡業力恆遍相續執受身分由彼執受身有暖觸捨執受處冷觸便生以壽暖識三不相離故冷觸起處即是非情雖是第八所變亦可緣彼為境而不執受同於器界矣故知下結顯第八是散有心又契經説識緣名色至故彼識言顯第八識七引緣起依前約正生正死位此約中有投胎位此位在命終之後受生之前先引經證若無下次立第八為名色外識識緣名色等皆經中語識即第八識名即受想行識四蘊色蘊色蘊二法者識是一法名色共是一法如束蘆者如立二束之蘆二頭相依方得安立去東西倒去西東倒名色與識互依其義亦然梵語羯邏藍此云凝滑又云雜穢父母不淨為雜深可厭惡為穢而言等者此上初位等餘四位所謂頞部曇此云胞也閉尸此云軟肉也健南此云堅肉也鉢羅奢佉此云支節也瑜伽云若初七日內已凝結前內稀名羯羅藍二七日內表裏如酪未至肉位名遏部曇三七日內若已成肉仍極柔軟名閉尸四七日內若已堅厚稍堪摩觸名健南五七後皆屬形位即此肉團增長支分相現名鉢那賖位從此已後髮毛爪現名髮毛爪位從此已後眼等根生名為根位從此已後彼所依處分明顯現總名形位此之名色與識相依而住不相捨離立量云名色與識更互為緣相依住故如二蘆束既以非色四蘊為名則名支之中已有識竟云何復有識與名色互為緣耶即此明知有第八也故論主云眼等轉識攝在名中此識若無説誰為識故以第八為識支也恐有救云名中識蘊是眼等五識支即是第六識故故次論云亦不可説名中識蘊謂五識身識謂第六羯羅藍時根未具足境未現前無五識故大小共許初七日內無五識故故大乘以第七識為名中識縱許名中之識是前五而名外之識是第六者即諸轉識有間斷故無力恆時執持名色寧得説與名色為緣故能持名色定是第八也俱舍亦云名謂非色即是四蘊然其識蘊意在第六又俱舍説唯約位説在於識後不説與識同時互依瑜伽問云已説一切支非更互為緣何故建立名色與識互為緣耶答識於現法中用名色為緣故名色復於後法中用識為緣故所以者何以於母腹中有相續時説互為緣故用識為緣於母腹中諸精血等名色所攝受和合共成羯羅藍性即此名色為緣復令彼識於此得住四蘊何獨皆稱為名第一師釋云在胎蒙昧未辨苦樂微有名而已此依分位六處之前識支之後可爾既二相依從生至死皆名色攝何得稱名俱舍論云名唯行攝何四皆名總有四釋四蘊稱名之意一師云隨所立名根境勢力於義轉變故説為名問云何隨名勢力轉變答謂通種種勢共立名於彼彼義轉變詮表即如牛馬色味等名問此復何緣標以名稱答於彼彼境轉變而緣解云已上論文此師意者如今時名隨於古昔名之勢力得於義轉變詮表或詮此境或詮彼境名為轉變名既如此四蘊亦然謂受等四蘊隨根境勢力於境轉變而緣轉變如名故標名稱言轉變緣者謂緣此緣彼名轉變緣也第二師云又隨類名此解意者謂一切法不通二類一者色類二者非色類四蘊與名同非色類以似名故四蘊名名第三師云隨名顯故此解意者謂色法粗著不須名顯如眼見也四蘊微細要須名顯必藉名故故標名稱也第四師云有餘師説四無色蘊捨此身已轉趣餘生轉變如名故標名稱解云此師約捨身名轉變初師據緣境名轉變轉變雖同二釋別也上皆俱舍論疏不斷得失若取易知第二三師理易顯明任情去取
