front:
  text: 成唯識論證義自序唯識證義何為而作也為慈恩之疏亡失無存學唯識者倀倀乎莫知所從而作也然則不名補疏何也曰補疏則惡乎敢吾敢自信無一語之與慈恩抵捂乎哉有一語與慈恩牴牾而謂之補疏烏乎敢且吾猶冀古疏之萬一復出云爾其名證義何也曰取大藏中大小乘經論及華嚴疏鈔宗鏡錄諸典正釋唯識之文以證成論之義而非敢以己意為之註也所以然者為八識四智行相微細難可了知乃聖智所知之境非凡夫心量可測故不以至教量定之未有不郢書而燕說者今之師心自用解釋紛紛能無一得乎哉然有一語之不經印證不通商略則皆非量而不為比量烏能窺測現量境界也耶心一而已裂而為八為九不病支離何也曰一心之德名為真如真如具有不變隨緣二義以不變之心言一不可得況有八乎以隨緣之心言八萬四千不足以盡之乃以八為支離哉夫真心即事即理即相即性即空即色即智即如即圓融即行布即真如即生滅所謂一法界也迷一法界而宛然成二矣由是能取為見分所取為相分見分為自內我相分為他外我我相一立而此相遂為舉意動念之根於是乎起一念作一事雖淑慝攸分薰蕕各別而要之同歸於有我即勉力而修六度萬行亦凡夫之六度萬行而非聖人之六度萬行也流浪生死之海不得出離轉徙白黑之塗無時休息三教聖人深知病根在此故不約而同曰無我蓋善醫者必藥其病根而去之不得不同焉耳大學言正心必先誠意誠意必先致知而致知在格物物者對我而言之也物我對峙如二山然彼此各不相到格者到也峙則宛然成二到則一矣故格物亦無我之別號也向非我為之崇則心何待正之而後正意何待誠之而後誠哉孟子以孩提之愛親敬長為良知良能而他日又曰大人者不失其赤子之心者也赤子之心有俱生而無分別正七識用事時也喜則人固愛其親謂之俱生貪怒則獸亦憎其親謂之俱生瞋以此為仁義與孔門無我之旨悖矣西方聖人憫賊與子之難辯而真與妄之易淆也故不得已而分一心為八九識就其迷一法界處而立為第七識就其舉心動念處而立為第六識就其不變之體受熏持種處而立為第八識又以第八識之行相微細難可了知也就其在外門轉處而分為眼耳鼻身五識以對色聲香味觸而成色心二法以使人了知第八識本無垢以第七識執之而垢故得賴耶名聖人捨之故立聖人之第八識為第九識謂聖人不得已而強分之可也然實有迷一法界處寔有舉心動念處寔有不變之體持種受熏處寔有在外門轉處則謂八種識自然而然而非聖人強分之亦可也此如黃帝岐伯論陰陽著藏腑經絡之原委俞跗之湔腸浣胃扁鵲之洞見五臟癥結華陀內照之圖醫者不知此則亦不可以言醫而療病起死人矣故學道者不明唯識之旨則雖聰明辨才籠蓋一世而終不免為儱侗真如顢頇佛性今談道者滿天下而見道者絕無一人非此之故哉然此九識舉其體則一第八識足以該之何者五識即相分六七識即見分八識即自證分而九識即謂自證分也舉其用則一第六識足以盡之何者三性三量三境五十一心所無不具而凡聖染淨無不備故由散入定由凡入聖皆由六識能觀之力非餘識能也則雖分八分九而亦何甞不一乎又何支離之有或曰俗詮之刻也子序之集解之刻也子又序而若深許之則證義可以無刻矣而汲汲事力疾校訂涸精竭慮以阽于危雖曰為法捐生能免噉名之疑哉曰吾向於答蘊璞簡中及之矣談佛法於今之世猶大市中賣平天冠有何人理著吾以老病一措大博得會禪之名滿天下欲何為乎俗論之作吾甞預商訂焉及其刻則從與不從蓋參半也集解之見與吾合處為多而不合處亦時有之吾見之未定者不敢不舍己而從而吾見之已定者亦不敢以苟同也此證義之所以刻也向使余不病得與二師反復研究辯論以歸於一以成一家言則證義果可以無刻而竟至不惜捐生校訂以為流通計若與二師競名然者豈余之得已哉學者鑒吾之誠而一刳心焉即它日龍華會上之羔雉而此冊亦吾之縞帶紵衣也吾即且夕溘先朝露勝於鷺鷥駕鴻凌倒景而朝太清不啻多矣萬曆癸丑六月十九日死灰居士王肯堂宇泰甫力疾自序
